exceptions:
  hazards:
    - description: 室外楼梯——从停车区到公寓需走两段楼梯。携带行李时请多加小心；雨天或结冰时务必谨慎通行。
      severity: minor
    - description: 阳台——位于较高楼层，下方为公寓楼群，存在一定落差。请正常注意安全。
      severity: minor
    - description: 毗邻在建工地（预计2026年底竣工）——通往垃圾桶的小路可能凹凸不平或受施工影响；工作日白天约07:45至18:00有大型机械及打桩设备作业，噪音较大。耳塞可在市区的 Life Pharmacy Wilkinsons 购买。
      severity: minor
    - description: 道路交通噪音——公寓朝向弗兰克顿路，卧室内可听到车流声（双层玻璃有所隔音，但无法完全屏蔽）。睡眠较浅的客人建议自备耳塞。
      severity: info
    - description: 航线噪音——房源位于皇后镇机场航线正下方，白天偶有飞机经过产生噪音。
      severity: info
  house_rules:
    - category: parking
      heading: 停车说明
      bullets:
        - "**专属停车位 6A** 为本公寓专用车位——免费使用，位于台阶下方。"
        - 如您抵达时发现 6A 车位已被他人占用，请告知我们，可暂时停放至其他空余车位。
        - "**市区停车**：湖滨免费停车（车位有限），Camp Street 及 Man Street 设有收费停车场，Man Street 亦有部分免费车位（请留意蓝色标牌上的时限规定）。"
        - "**临时/日间停车**：Goldfield Heights 周边街道停车不受限制。"
    - category: body-corporate
      heading: 业主委员会规定
      bullets:
        - "**阳台禁止晾晒衣物**——业主委员会规定。请使用室内晾衣架，或公寓楼群内独立建筑中的共用烘干机。"
        - "**阳台禁止吸烟或使用电子烟**——业主委员会规定（室内全面禁烟规定同样适用）。"
    - category: rubbish-recycling
      heading: 垃圾与回收
      bullets:
        - 垃圾桶位于公寓楼群内——具体位置请参阅厨房桌上的黑色手册。
        - 房源已备有绿色垃圾袋。
        - "**本公寓楼群已不提供回收设施**——所有废弃物请投入普通垃圾桶。"
    - category: parcel-delivery
      heading: 包裹收件
      bullets:
        - "如需在入住期间收取包裹，请使用以下地址：**Mountain Club, 85 Beach Street, Queenstown 9300**（收件人填写 **SnowbirdHQ**）。"
        - 此举可避免快递员将包裹遗留在楼群公共区域。
  access:
    front_door: >
      第一步——从停车场出发：找到专属车位 6A，沿右侧台阶上行，再走第二段台阶即可抵达阳台。

      第二步——找到您的房间：6A 是到达阳台后右手边的第一扇门。

      第三步——取钥匙：密码箱安装在前门右侧。输入提前两天发送给您的门禁密码（请确认数字对齐），然后向下拉开槽口取出钥匙。同一把钥匙可开启前门和阳台门。
    back_door: ''
    garage: ''
    other: ''
  notes:
    - 公寓警报系统在您入住期间不启用。
    - 公寓内已安装烟雾探测器和灭火器。
    - 如遇紧急情况，请从前门撤离并走两段楼梯下行。紧急集合点位于停车区内距建筑物安全距离处。
    - 厨房桌上的黑色手册内含 Wi-Fi 信息、电器使用说明及垃圾桶位置。
    - "**厨房桌上的欢迎礼品：** 为您准备了 Boat Shed Cafe 咖啡兑换券及 Canyon 啤酒兑换券——请尽情享用。"
    - "**施工告知：** 毗邻公寓楼正在施工（预计2026年底竣工）。工作日白天07:45至18:00噪音较大；施工现场在阳台上清晰可见，且会部分遮挡一侧湖景。"
  usage_sections:
  - category: internet
    heading: 网络 / Wi-Fi
    body: >
      网络名称及密码已在上方快速参考栏中列出。调制解调器位于电视右侧、灰色转角椅下方——如遇网络连接问题，请尝试重启设备。Wi-Fi 信息同样可在厨房桌上的黑色手册中查阅。

  - category: heating
    heading: 取暖
    body: |
      - **热泵**（客厅）：遥控操作——可用于制暖和制冷。寒冷天气下请关闭门窗。
      - **板式暖气**位于卧室衣柜内——为卧室提供额外供暖。
      - 卧室内可听到道路交通噪音（朝向弗兰克顿路）。双层玻璃有所隔音，但无法完全屏蔽——睡眠较浅的客人建议使用耳塞或白噪音应用程序。

  - category: location
    heading: 周边出行
    body: |
      - 公交车站就在马路对面（Connectabus——约10分钟可达皇后镇市区）。
      - 皇后镇机场约10分钟车程。
      - 沿湖岸步行至附近咖啡馆及 Cargo Brewery：约15分钟。
      - 步行至皇后镇市区：经路边人行道约45至60分钟。湖边步道目前暂时关闭。
      - 打车（Uber）至市区约需15至20新西兰元。

  - category: appliances
    heading: 电器使用说明
    body: |
      - **洗衣机**（顶开式，位于浴室）：房内无烘干机——已备晾衣架。公寓楼群内独立建筑中设有共用投币式烘干机。
      - **燃气灶**：正常操作使用。
      - **电烤箱**：厨房右侧墙上的电源总开关必须打开，烤箱方可正常加热。请注意，烧烤档标签已磨损脱落。
      - **热泵**：遥控操作（制暖+制冷）。请在客厅使用。
      - **板式暖气**：位于卧室衣柜内——为卧室提供额外供暖。
      - **熨斗及熨衣板**：位于浴室内。
      - **电视**：Freeview 接收棒连接 HDMI 1。共有两个遥控器——较大的遥控器用于开关机及信号源切换（按"信号源"→ HDMI 1）；较小的遥控器用于 Freeview 及 Netflix 操作导航。
      - **吸尘器**：置于玻璃推拉阳台门旁。
