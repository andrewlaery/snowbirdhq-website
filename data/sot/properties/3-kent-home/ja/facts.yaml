# yaml-language-server: $schema=../_schemas/facts.json
schema_version: 1
slug: 3-kent-home

# 3-Kent-Home = whole-house listing (combines upstairs + downstairs).
# Insurance + Resource Consent capped: 8 (upstairs) + 4 (downstairs) = 12.
# Solves the upstairs/downstairs sound issue when one party books both.
capacity:
  max_guests: 12
  max_adults: 12
  min_age_lead_guest: 25

bedrooms:
  - name: '上階 — 寝室1（マスター）'
    bed: TBC
    ensuite: false  # TBC
    notes: '上階アパートメント。ベッド構成は次回査定時に確認予定です。'
  - name: '上階 — 寝室2'
    bed: TBC
    ensuite: false
    notes: '上階アパートメント。'
  - name: '上階 — 寝室3'
    bed: TBC
    ensuite: false
    notes: '上階アパートメント。'
  - name: '上階 — 寝室4'
    bed: TBC
    ensuite: false
    notes: '上階アパートメント。'
  - name: '下階 — 寝室1'
    bed: TBC
    ensuite: false
    notes: '下階アパートメント。'
  - name: '下階 — 寝室2'
    bed: TBC
    ensuite: false
    notes: '下階アパートメント。'
  - name: '下階 — 追加ベッドスペース（「.5」）'
    bed: single
    ensuite: false
    notes: >
      窓のないスペースにシングルベッドを設置しています（お子様専用 — ドアなし）。
      オーナーは「2.5ベッドルーム」の「.5」と呼んでいます。
bedroom_count: 6.5
bed_count: 7  # Conservative — actual layout TBC
bathroom_count: TBC
beds_summary: '確認中 — オーナーによる査定待ちです'

amenities:
  - Wi-Fi
  - 駐車場無料
  - 床暖房（全室）
  - ヒートポンプ
  - ガス暖炉
  - 食洗機 ×2台
  - 洗濯機
  - 乾燥機
  - スマートTV
  - Sky TV
  - コーヒーメーカー
  - ガーデンアクセス（クイーンズタウンヒル・ウォーキングトラック）
  - マウンテンビュー
  - オーナー専用施錠収納（一部エリアはゲストのご利用不可）

features:
  - underfloor_heating
  - gas_fireplace
  - garden
  - walking_track_access
  - lockable_owner_storage

parking:
  spaces: 1
  type: '私道'
  garage: false
  garage_remote: false

check_in:
  start_time: '15:00'
  end_time: '22:00'
  method: 'TBC'  # smart-lock or keypad to be confirmed; current Goodstays uses keypad
  instructions: 'TBC: チェックイン手順は2026年7月1日のサービス開始前に各物件ごとに追加される予定です'

check_out:
  time: '10:00'

wifi:
  network: 'Monkeymousewifi'
  password: 'bendalong'

house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 250
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false

booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: moderate
  instant_bookable: true

pricing:
  base_nightly: 0  # TBC — pricing strategy still being negotiated with owners
  cleaning_fee: 0  # TBC
  extra_person_fee: 0
  weekly_discount: null
  monthly_discount: null
  currency: NZD

exceptions:
  hazards:
    - description: >
        上下2フロア構造で、上階と下階のアパートメントをつなぐ内部階段があります。階下への音が伝わることがあります（コンクリート床は厚めですが、靴音は聞こえる場合があります）。階段をご利用の際はお気をつけください。またお子様からは目を離さないようお願いいたします。
      severity: minor
    - description: >
        全室に床暖房を完備しており、床面が温かい状態を保ちます。設定温度は20°Cで、温度変化に時間がかかります（温まるまで・冷えるまでの目安は約2日間）。コントロールパネルの操作はご遠慮ください。
      severity: info
    - description: >
        クイーンズタウンヒルのウォーキングトラックに隣接しています。裏庭からトラックへアクセスできますが、お子様から目を離さないようにしてください。トラックは傾斜が急です。
      severity: minor
  house_rules:
    - category: amenity-rules
      heading: 設備のご利用ルール（全館）
      bullets:
        - "**床暖房は各部屋20°Cに設定されており**、ご滞在中は**温度調整ができません** — システムの温度変化には約2日かかります。"
        - "**一部エリアにオーナー専用の施錠収納があります** — 明示または施錠されていますので、ご使用はご遠慮ください。"
        - "**屋外クッション**：翌日や次のお客様のために濡れないよう、夜間は屋内にお持ちいただけますようお願いいたします。"
        - "**ダイニングテーブル**：ご用意しているランチョンマットとコースターをご使用ください — テーブルへの熱いものの直置きはご遠慮ください。"
        - "**食洗機用洗剤**：**備え付けの食洗機専用粉末洗剤のみ**をご使用ください。液体洗剤を使用すると故障の原因となり、修理費用が発生する場合があります。"
    - category: parking
      heading: 駐車場
      bullets:
        - 敷地内の私道に駐車スペースがございます。
        - Kent Street沿いに路上駐車もご利用いただけます。
  access:
    front_door: 'TBC: 玄関のアクセス手順は2026年7月1日のサービス開始前に各物件ごとに追加される予定です。'
    back_door: ''
    garage: ''
    other: ''
  notes:
    - "**消火器**はキッチン脇の**パントリー内**、窓近くの右隅に設置しています。"
    - "**ヒューズボックス／配電盤**は**1階（上階）バスルーム向かいのコートルーム**内にあります。"
    - "**ガス暖炉のアイソレーター（遮断スイッチ）**は**暖炉ユニットの裏側**にあります（通常の壁スイッチでは操作できない仕様です）。"
    - "**Wi-Fi中継器**は上階にあります — インターネットが遅い場合は、一度Wi-Fiをオフにしてから再接続してください。お客様の端末が最も強い電波を自動的に選択します。"
    - "**自動クリーニングオーブン** — 洗剤類は使用しないでください。画面上の指示に従ってセルフクリーニングを行ってください。"
    - "**クイーンズタウンヒルのウォーキングトラック**は裏庭からアクセスできます — ウォーキングがお好きなお客様にぜひおすすめです。"

