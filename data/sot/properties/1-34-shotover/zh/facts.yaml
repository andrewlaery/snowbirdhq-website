  instructions: >
    自助入住，密码锁位于前门旁边。入住密码将在抵达前24小时通过预订平台发送，同时附上图文导览。
    入口位于Shotover Street上Canyon Swing与烤肉串店之间的小巷——谷歌地图无法直接导航至公寓，请务必参照图文导览前往。
