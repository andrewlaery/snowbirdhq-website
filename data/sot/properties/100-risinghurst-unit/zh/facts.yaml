check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: lockbox
  instructions: >
    自助办理入住，通过密码锁取钥匙。请走到公寓与储物棚之间——密码锁位于户外水槽旁。请注意，主屋门口还有一个密码锁，请务必找到公寓对应的那个，切勿走到主屋门。密码1001也会在入住前3天通过预订平台发送给您。
check_out:
  time: '10:00'
wifi:
  network: flat
  password: flat1000
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: 07:00
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false
booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: true
pricing:
  base_nightly: 139.0
  cleaning_fee: 100.0
  extra_person_fee: 50.0
  weekly_discount:
  monthly_discount:
  currency: NZD
exceptions:
  hazards: []

  house_rules:
    - category: parking
      heading: 停车
      bullets:
        - 仅提供车道内一个路外停车位。
        - 请停在主屋右侧、空调机组旁边。
        - 请勿堵塞储物棚通道。
    - category: capacity
      heading: 入住人数
      bullets:
        - 最多2位住客——严格执行。
        - 沙发不适合作为睡眠床铺使用。

  access:
    front_door: >
      密码锁位于公寓与储物棚之间的户外水槽旁。密码1001（也会在入住前3天通过预订平台发送给您）。
    back_door: ''
    garage: ''
    other: >
      主屋处另有一个密码锁——请务必确认您使用的是公寓对应的那个。从街道找到#100信箱后，沿车道进入即可。

  notes:
    - 房东（Paddy 和 Bethan）住在隔壁主屋——如有任何需要，可通过预订平台联系他们。
    - 提供两辆自行车及头盔，供住客免费使用。
    - 如您深夜抵达，请提前告知房东您的预计到达时间，他们可为您提前开启户外灯和暖气。

  usage_sections:
    - category: internet
      heading: 网络 / Wi-Fi
      body: |
        网络名称和密码已在上方快速参考中列出。
        光纤宽带，速度500/100 Mbps（Lightspeed）。如有需要，可向房东索取10米网线，方便远程办公使用。

    - category: kitchen
      heading: 厨房
      body: |
        厨房设备齐全：冰箱、冷冻室、**燃气灶（4个炉头）**、烤箱、洗碗机（Fisher & Paykel抽屉式洗碗机）、锅具、平底锅及不锈钢厨具。已提供速溶咖啡（标准配置不含咖啡机或法压壶）。

        **燃气灶/烤箱电源开关：** 位于**洗衣机上方**。使用燃气灶或烤箱前，必须先打开此开关。若灶具无法点火，请先检查此开关是否已开启。

        **烤箱点火方式：** 确认电源开关已开启后，同时按住时钟符号及其旁边的符号数秒，直至指示灯亮起并停止闪烁。

    - category: heating
      heading: 采暖与制冷
      body: |
        公寓提供暖气和空调——请通过墙壁控制面板操作。

    - category: workspace
      heading: 办公空间
      body: |
        厨房旁的"小书房"可用作办公区——配有书桌（1500 mm × 750 mm）。

    - category: location
      heading: 周边交通
      body: |
        - Shotover下游区——环境宁静，可欣赏山景。
        - 皇后镇机场——驾车约10分钟。
        - 市中心——驾车约12分钟。

    - category: appliances
      heading: 家电使用说明
      body: |
        - **洗碗机**（Fisher & Paykel抽屉式）：装载过满时可能出现F1故障代码，且曾造成漏水，请勿塞得过紧。
        - **洗衣机**：已备有环保洗衣液供使用。
        - **烘干机**：公寓内配有烘干机（早期房源介绍中提及"无烘干机"，该信息已过时）。
        - **智能电视**：提供住客专属Netflix账户免费使用；电视配有USB接口；无DVD播放器。
        - **热泵/空调**：配有遥控器。冬季及深夜入住时，房东会提前为您预热。
