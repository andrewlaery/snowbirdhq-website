exceptions:
  hazards:
    - description: >
        本房源为两层结构——楼下公寓有住客时，声音容易传导。若两套房源同时出租，请体谅楼下住客。
      severity: minor
    - description: >
        全屋铺设地暖，地面持续保持温热，设定温度为20°C，升温或降温约需2天时间；请勿自行调节控制面板。
      severity: info
    - description: >
        房源背面紧邻皇后镇山步道，可经后花园进入。步道坡度较陡，请全程看管儿童。
      severity: minor
  house_rules:
    - category: amenity-rules
      heading: 设施使用规则（楼上公寓）
      bullets:
        - "**地暖已设定为20°C，不可自行调节**——系统升降温约需2天时间。"
        - "**户外坐垫**：请每晚入室收纳。"
        - "**餐桌**：请使用餐垫和杯垫，勿将热物直接置于桌面。"
        - "**洗碗机洗涤剂**：请仅使用**房源提供的洗碗粉**——使用液体洗涤剂会导致故障，维修费用将由住客承担。"
        - "**燃气壁炉**：请通过壁炉左上角的控制面板开关关闭。主隔离开关位于壁炉背后（此为设计所致），日常请使用面板开关操作。"
    - category: parking
      heading: 停车
      bullets:
        - 房源车道提供专属停车位。
        - Kent Street 路边亦有公共停车位可供使用。
  access:
    front_door: '待确认：各房源进入说明将在上线前补充完整（2026-07-01）。'
    back_door: ''
    garage: ''
    other: ''
  notes:
    - "**灭火器**位于**厨房旁储藏室**靠窗右侧角落。"
    - "**保险丝箱／断路器**位于**一楼浴室对面的储衣间**内。"
    - "**燃气壁炉隔离开关**在**壁炉背后**（非普通墙壁开关，此为设计所致）。日常请使用壁炉面板左上角的开/关按钮操作。"
    - "**Wi-Fi 扩展器**位于楼上——若网速较慢，请尝试关闭 Wi-Fi 后重新开启。"
    - "**自清洁烤箱**——请勿使用任何化学清洁剂，按屏幕提示操作自清洁程序即可。"
    - "**皇后镇山步道**可经后花园直接进入。"
    - "**纸质说明书**备有烘干机、洗衣机、电视及咖啡机的操作手册——如需 PDF 版本，请联系房东。"

