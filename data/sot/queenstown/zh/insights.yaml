    intro: |
      皇后镇拥有适合各水平骑行者的丰富骑行路线，精彩冒险就在您触手可及之处。欢迎了解：

      - [Trail Forks](https://www.trailforks.com/) — 寻找山地车路线的最佳网站/应用程序
      - [Queenstown Trails](https://queenstowntrails.org.nz/)
    subgroups:
      - title: 单车店铺
