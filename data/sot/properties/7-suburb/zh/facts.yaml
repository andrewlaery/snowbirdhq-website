check_in:
  start_time: "15:00"
  end_time: "23:00"
  method: smart_lock
  instructions: >
    通过前门电子密码锁自助入住。您的专属门禁码已在预订确认函中提供。请仔细输入密码——若多次输入错误，门锁将因安全机制暂时停用。如遇此情况，请稍等几分钟后再试。输入密码后请按 # 键。

check_out:
  time: "10:00"

# Drift-resolved 2026-04-26: ota-manager listing.md said "Wrights Garden"
