  - bosch-pue611bb5            # induction hob
  - bosch-dhl555bau            # rangehood
  - delonghi-en85bmae          # Nespresso
  - bosch-smu2its01a           # dishwasher
  - aeg-ksk782220m             # steam oven
  - panasonic-nn-st665b        # microwave
  # Audio / visual
  - samsung-frame-qa65ls03dasxnz  # living-room Frame TV
