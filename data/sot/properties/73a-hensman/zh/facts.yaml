      - **水疗池**：请使用塑料钥匙（与车库遥控器放在一起）解锁水疗池盖。入池前请先淋浴。池内只可使用氯消毒剂——请勿加入泡泡浴剂、发泡剂或其他任何物质。水疗区域内严禁携带食物、饮料或玻璃器皿。
