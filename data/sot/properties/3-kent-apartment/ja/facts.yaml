# yaml-language-server: $schema=../_schemas/facts.json
schema_version: 1
slug: 3-kent-apartment

# 3-Kent-Apartment = downstairs apartment (2.5 bedrooms — converted double garage / engineer's
# workshop). Insurance + Resource Consent capped at 4 guests. The "0.5" is a windowless nook with
# extra bed for kids — no door. Floor-to-ceiling windows; backs onto Queenstown Hill walking track.
capacity:
  max_guests: 4
  max_adults: 4
  min_age_lead_guest: 25

bedrooms:
  - name: '寝室1'
    bed: queen
    ensuite: false
    notes: '次回の確認作業までベッド構成は未定です。'
  - name: '寝室2'
    bed: queen
    ensuite: false
  - name: '追加ベッドのある仕切りスペース（「0.5」）'
    bed: single
    ensuite: false
    notes: >
      窓のない仕切りスペースにシングルベッドが1台あり、お子様専用としてご利用いただけます（ドアはありません）。「2.5寝室」という表記の「0.5」に相当し、完全に仕切られた寝室ではありません。
bedroom_count: 2.5
bed_count: 3  # Conservative — actual layout TBC
bathroom_count: TBC
beds_summary: '未定 — オーナーによる確認作業が保留中（現在のGoodstaysの掲載ではクイーン＋クイーン＋シングルと記載）'

amenities:
  - Wi-Fi
  - 駐車場無料
  - 床暖房
  - ダイキンヒートポンプ（暖房・冷房）
  - Blancoクッキングトップ（IH）
  - Blancoオーブン
  - Bosch食洗機
  - Electrolux EDC2075GDW 洗濯機
  - Electrolux乾燥機
  - Samsung テレビ
  - 床から天井までの大きな窓
  - 山の眺望
  - ウォーキングトラックへのアクセス（クイーンズタウンヒル、庭より）

features:
  - underfloor_heating
  - heat_pump
  - garden
  - walking_track_access
  - mountain_views
  - large_windows  # Floor-to-ceiling

parking:
  spaces: 1
  type: 'driveway'
  garage: false
  garage_remote: false

check_in:
  start_time: '15:00'
  end_time: '22:00'
  method: 'TBC'
  instructions: '未定：サービス開始前（2026-07-01）に各物件のチェックイン案内を追加予定です。'

check_out:
  time: '10:00'

wifi:
  network: 'Monkeymousewifi'
  password: 'bendalong'

house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 250
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false

booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: moderate
  instant_bookable: true

pricing:
  base_nightly: 0  # TBC
  cleaning_fee: 0
  extra_person_fee: 0
  weekly_discount: null
  monthly_discount: null
  currency: NZD

exceptions:
  hazards:
    - description: >
        こちらは2階建ての建物で、上階のアパートメントにご滞在中も別のお客様がいらっしゃる場合がございます。フロア間は音が伝わりやすい構造です（コンクリートの床は厚みがありますが、完全な防音ではありません）。上下階のお客様への配慮をお願いいたします。
      severity: minor
    - description: >
        全室に床暖房が設置されており、床面は常に温かい状態です。設定温度は20°Cで、温度変化には約2日かかります。コントロールパネルの操作はご遠慮ください。
      severity: info
    - description: >
        建物の裏手がクイーンズタウンヒルのウォーキングトラックに隣接しています。トラックへのアクセスは裏庭を通ります。トラック自体は急勾配ですので、お子様からは目を離さないようお願いいたします。
      severity: minor
    - description: >
        追加ベッドのある仕切りスペース（「0.5」）は窓がなく、ドアもありません。保護者様のご判断のもと、年長のお子様のみを対象としたスペースです。完全に仕切られた寝室ではありません。
      severity: info
  house_rules:
    - category: amenity-rules
      heading: アメニティのご利用ルール（下階アパートメント）
      bullets:
        - "**床暖房は20°Cに設定されており**、**調整はできません** — 温度が変わるまでに約2日かかります。"
        - "**屋外用クッション**：夜間は室内にお持ち込みください。"
        - "**食洗機用洗剤**：**備え付けの食洗機用粉末洗剤のみ**をご使用ください — 液体洗剤を使用すると故障の原因となり、修理費用が発生する場合がございます。"
        - "**乾燥機は排気なし**タイプです：ご使用の際はランドリールームの窓を開けて蒸気を逃がしてください。"
    - category: parking
      heading: 駐車場
      bullets:
        - 敷地内の私道に駐車スペースがございます（上階・下階ともに貸し出し中の場合は共有となります）。
        - Kent Streetの路上駐車もご利用いただけます。
  access:
    front_door: '未定：サービス開始前（2026-07-01）に各物件のアクセス案内を追加予定です。'
    back_door: ''
    garage: ''
    other: ''
  notes:
    - "**煙感知器・消火器**の設置場所はサービス開始前に追記予定です。"
    - "**ブレーカーボックス**は上階アパートメント内（1階、バスルーム向かいのコートルーム）にあります。ブレーカーが落ちた場合はホストまでご連絡ください。"
    - "**Wi-Fi中継器**は上階にあります。電波が弱い場合は、お客様のデバイスのWi-Fiをオフにしてから再度オンにしてください。デバイスが最も強い電波源を自動的に選択します。"

# See data/sot/_appliances/3-kent-apartment-*.md (per the owner user guide):
# - Daikin heat pump (remote in cradle on wall next to main light switch — green ON button)
# - Blanco cooktop (induction; isolator left of hob, white square switch above GPO)
# - Blanco oven (isolator above GPO left of cooktop; manual in top draw of TV cabinet)
# - Bosch dishwasher (isolator bottom rear of left cupboard)
# - Kitchen extractor fan (isolator on wall left of sink, between GPO switches)
# - Electrolux EDC2075GDW washing machine
# - Electrolux dryer (non-vented — open laundry window)
# - Samsung TV (LIVE TV from menu)
appliances:
  # Tech (AV)
  - 3-kent-apartment-tv                    # Samsung
  # Heating
  - 3-kent-apartment-underfloor-heating    # 20°C constant, not adjustable
  # Climate
  - 3-kent-apartment-heat-pump             # Daikin (heat + cool); remote in wall cradle
  # Kitchen
  - 3-kent-apartment-cooktop               # Blanco induction
  - 3-kent-apartment-oven                  # Blanco (manual in TV cabinet top drawer)
  - 3-kent-apartment-dishwasher            # Bosch (POWDER ONLY)
  - 3-kent-apartment-extractor-fan
  # Laundry
  - 3-kent-apartment-washer                # Electrolux EDC2075GDW (LIQUID OK)
  - 3-kent-apartment-dryer                 # Electrolux
