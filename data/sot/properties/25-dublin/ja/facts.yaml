    bed: super_king
    ensuite: true
    notes: 上階。ウォークインクローゼット付き。
  - name: ベッドルーム2
    ensuite: true
    beds:
      - super_king
      - single
    notes: メインフロア。シングル二段ベッド付き。
  - name: ベッドルーム3
    ensuite: true
    beds:
      - super_king
      - long_single
      - single
    notes: >
      メインフロア。キングシングル1台＋シングルトランドルベッド1台付き。既知の問題：
      大きな窓の下部からすきま風が入る場合があります（やや寒く感じることがございます）。
