exceptions:
  hazards:
    - description: >
        Spa pool / hot tub — supervise children at all times. Use is at
        your own risk; avoid use under the influence of alcohol.
      severity: minor
    - description: >
        Sauna — high temperatures. Limit sessions to 15–20 minutes;
        children should always be supervised.
      severity: minor
    - description: >
        Stairs to top floor — watch your footing, especially with
        luggage. A lift serves the main floor.
      severity: info

  house_rules:
    - category: parking
      heading: Parking
      bullets:
        - Single garage access via the FOB. Open from inside via the buttons near the building access door.
    - category: building
      heading: Building Access
      bullets:
        - Only swipe the FOB once per entry — multiple swipes may trigger the building alarm. Swipe again to disarm if triggered.
        - The front-door intercom does NOT work — there's no doorbell from the building gate.

  access:
    front_door: >
      Use the FOB to access the front door. Wait 1 second after using the
      FOB, then gently pull the door towards you before opening it. Only
      swipe once per entry to avoid triggering the building alarm.
    back_door: ''
    garage: >
      Open and close using the FOB outside the door, or the buttons inside
      the garage near the building access door.
    other: >
      The front gate may be locked — use the FOB to gain access.

  notes:
    - The house alarm is not in operation during your stay.
    - Lift serves the main floor; stairs continue to the top floor.

  usage_sections:
    - category: internet
      heading: Internet / Wi-Fi
      body: >
        Network and password are shown above in the Quick Reference.

    - category: heating
      heading: Heating
      body: |
        SkyCrest has **underfloor heating** on both floors plus heat
        pumps upstairs and a gas fireplace in the main living area. Owner
        recommended setpoints (in-floor system):

        - **Summer:** OFF (or 10 if a cool-down is wanted).
        - **Autumn / Spring:** 18–20 throughout.
        - **Winter:** main floor ~25; top floor 18–20 with heat pumps for
          final comfort; bathrooms 20 (max 25).

        Underfloor heating responds slowly — adjustments take hours to
        take effect. If you're cold, contact the host early so we can
        adjust ahead of time.

    - category: spa-sauna
      heading: Spa, Sauna & Plunge Pool
      body: |
        SkyCrest features a spa pool, sauna, and plunge pool. Please:

        - Shower before entering the spa to keep the water clean.
        - No food, drinks, or glass items in or near the spa.
        - Limit sauna sessions to 15–20 minutes.
        - Replace covers on the spa and plunge pool after use.
        - Use is at your own risk; supervise children at all times.

    - category: location
      heading: Getting Around
      body: |
        - Walking distance to central Queenstown — short walk to town.
        - Queenstown Airport — ~12 minutes by car.

    - category: appliances
      heading: Appliances
      body: |
        Kitchen
        - **Top unit — microwave combination oven** (Bosch HBC86Q650A/02): "speed oven" — microwave + convection/grill in one (~44L). MicroCombi mode combines microwave + grill for fast cooking; Autopilot has ~15 pre-set programs. Microwave power buttons (90, 180, 360, 600, 900) are watts.
        - **Bottom unit — single wall oven** (Bosch HBN560550A/02): standard built-in electric oven (~60L), multi-function fan/convection, conventional bake, grill.
        - Both ovens have a separate wall power switch labelled "oven" that must be turned ON first.
        - **Gas cooktop** (Fisher & Paykel PCH615FAU): four burners, including a wok burner.
        - **Dishwasher** (Fisher & Paykel DishDrawer DS603/DD603).
        - **Coffee machine** (Breville Nespresso Creatista Plus): Nespresso pods; integrated milk frother.
        - **Kettle** (DeLonghi KBI2001.S).
        - **Fridge/freezer** (Bosch): includes a filtered water dispenser.
        - **In-sink food disposal**: switch is inside the cabinet under the sink.

        Outdoor
        - **Gas BBQ** (Rinnai MAXIM X4 PLUS, 4-burner): check gas tank level on turnover.
        - **Hot tub** (HotSpring, top deck): the cover is unlocked with the plastic key kept on the garage remote.
        - **Ice bath / cold plunge** (Alpine SY-08-HC, back of property): turn the pump OFF at the wall plug from May to September to prevent freezing.
        - **Sauna** (Alpine Barrel, Harvia Vega BC60 heater): three things must be ON to operate — the isolation switch (ground level, right side), the light switch (top of the stairs), and the timer dial.

        Laundry
        - **Washing machine** (Smeg S650, 6.5 kg, top-loading) — laundry room.
        - **Dryer** (Simpson SDV401, 4 kg) — laundry room.
        - **Steam iron** (Braun TextStyle 6) — laundry room.

        Living
        - **The Frame TV** (Samsung 65" QA65LS03FWSXNZ, main living): art mode displays when idle.
        - **Smart TV** (Samsung 58" UA58NU7103): top-floor TV room.
        - **Sonos audio**: SkyCrest-Living + SkyCrest-UpstairsDeck — always on; available as AirPlay and Spotify targets.

        Heating
        - **Heat pumps** (Daikin CTXM25RVMA ×3): top floor — TV nook plus bedrooms 2 and 3. Remotes on the walls.
        - **Gas fire** (Escea IB600/IB850): living room; remote sits on the table in the same room.
        - **Bathroom underfloor heating** (OJ Microline thermostats): one per bathroom, dial 1–10.

        Other
        - **Bedroom fans** (Shark TurboBlade TF202S, bladeless ×3): one per bedroom; remotes on bedside tables.
        - **Printer/scanner** (Canon FTC3147403).
        - **Telescope** (KONUS KONUSSPOT-80) with SLIK tripod.
