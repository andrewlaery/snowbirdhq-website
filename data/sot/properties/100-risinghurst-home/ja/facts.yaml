exceptions:
  hazards:
  - description: >
      庭には柵のない花壇がございます。屋外でお子様が遊ばれる際は、必ず目を離さないようお願いいたします。
    severity: minor
  - description: >
      冬季は車道が凍結する場合がございます。運転には十分ご注意いただき、路面状況に応じてスノーチェーンの装着をご検討ください。
    severity: minor

  house_rules:
  - category: parking
    heading: 駐車場について
    bullets:
    - 車道への駐車は1台までです。玄関ドア／ガレージドア正面、左側のバラの茂み寄りにお停めください。
    - 車道の右端は、隣接ユニット（100B）の入居者のためにスペースを空けておいてください。
    - 追加の車両は、メインストリートの路上駐車をご利用ください。
  - category: garden
    heading: お庭について
    bullets:
    - お庭は午前7時から午後10時の間にご利用いただけます。
    - 午後10時以降は静粛にお過ごしくださいますよう、お願いいたします。

  access:
    front_door: >
      ガレージ右側の壁、ゴミ箱の上にあるロックボックスをご利用ください。
      コードは 2604 です。鍵はガレージ左隣の玄関ドアを開けます。
    back_door: ''
    garage: >
      ガレージは室内からアクセスできます。ランドリー、清掃用品、スキー用品の保管にご利用いただけます。
    other: >
      ポストボックス #100 をお探しください。車道を上り、左へ回り込むと、正面にグレーの家が見えてまいります。
  notes:
  - ホスト（Paddy & Bethan）は隣のユニット（100B）に在住しております。何かご不明な点がございましたら、予約プラットフォームよりお気軽にご連絡ください。
  - ガレージは室内からアクセスでき、ランドリー設備がございます。
