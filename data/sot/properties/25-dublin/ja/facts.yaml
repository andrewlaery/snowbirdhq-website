features: []
parking:
  spaces: 4
  type: driveway
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    フロントドアのスマートロックによるセルフチェックインです。お客様専用のアクセスコードは、ご到着の24時間前に予約プラットフォームを通じてお送りします。チェックイン時にコードが機能しない場合は、ホストまでご連絡ください。コードのリモート再有効化が必要になる場合がございます。
check_out:
  time: '10:00'
wifi:
  network: SnowbirdQT
  password: Namaste99
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'CCTV outside property' per ota-manager booking_specific
  noise_monitor: true  # Minut noise monitor per owner.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: false
pricing:
  base_nightly: 1000.0
  cleaning_fee: 500.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        車両の切り返し時に死角となる箇所がございます。十分にご注意いただき、お子様がいる場合は別の方に見張りをお願いください。
      severity: minor
    - description: >
        庭の各所に柵のない大きな段差・傾斜があります。お子様を一人にせず、ご到着時に周辺環境をご確認ください。
      severity: minor
    - description: >
        階段室——お子様が階段で遊ぶことはお控えください。転落によるけがの危険があります。
      severity: minor
    - description: >
        降雪後、凍結と融解の繰り返しにより車道および屋外階段が非常に滑りやすくなります。車道はゆっくり走行し、路面状況に応じてスノーチェーンをご装着ください。
      severity: minor
    - description: >
        浴槽・スパバス——お湯が張ってある状態でお子様をひとりにしないでください。使用後はすぐに水を抜いてください。
      severity: minor
    - description: >
        デッキのBBQ——グリス火災の危険があります。常に清潔に保ち、使用中は目を離さず、使用後は完全に消火してください。
      severity: minor
    - description: >
        薪ストーブ——監視のないお子様には火傷の危険があります。コンペンディアムの操作説明に従ってご使用ください。
      severity: minor
    - description: >
        窓・スライドドア——お子様が簡単に手の届く部屋では、お子様をひとりにしないでください。
      severity: minor

  house_rules:
    - category: parking
      heading: 駐車場
      bullets:
        - 駐車は敷地内の車道のみご利用ください。所定のスペースにお停めください。
        - 車道とガレージを合わせて最大4台まで駐車可能です。
    - category: spa-pool
      heading: スパプール／ホットタブ
      bullets:
        - スパのご利用はお客様ご自身の責任においてお願いします。
        - "**スパの中および周辺では、大人がお子様から常に目を離さないようにしてください。**"
        - "**ご使用にならない際はスパのカバーを必ずロックしてください。**スパキーの場所とカバーの操作方法は「使用上の注意」をご覧ください。"
        - 水質を保つため、入浴前にシャワーをお浴びください。
        - "**塩素系薬剤のみ使用可**——泡立ち剤、発泡剤、バスソルト、その他の薬剤はご使用いただけません。"
        - "**スパの中および周辺への食べ物・飲み物・ガラス製品のお持ち込みはご遠慮ください。**"
        - アルコールを摂取した状態でのスパのご利用はご遠慮ください。

    - category: keys-remotes
      heading: 鍵・リモコン類
      bullets:
        - チェックアウトの際は、すべてのアクセスキーとガレージリモコンをキッチンのベンチの上に置いてください。
        - 鍵またはガレージリモコンを紛失された場合は、実費をご請求させていただきます。

    - category: wood-burner
      heading: スタジオ薪ストーブ
      bullets:
        - "**薪ストーブを絶対に無人のままにしないでください。**火がついている間は、大人が常にスタジオにいるようにしてください。"
        - "**火がついている間は、大人がお子様から常に目を離さないようにしてください。**ドア、ガラス、周辺部分は非常に高温になります。"
        - 使用できる燃料は備え付けの薪と着火剤のみです。ゴミ、処理済み木材、着火促進剤はご使用いただけません。
        - "**灰をゴミ箱や風が当たる場所に捨てないでください。**残り火が再燃して火災を引き起こす可能性があります。"
        - 操作方法（着火・ドアの開閉・灰の冷却）は**「使用上の注意 → スタジオ薪ストーブ」**をご参照ください。

    - category: gas-fire
      heading: 上階ガスファイヤー
      bullets:
        - 使用中は必ずその場にいてください。主要暖房としての使用はお勧めしません。
        - "**ガスファイヤーが点いている間は、大人がお子様から常に目を離さないようにしてください。**ガラス面は非常に高温になります。"
        - 暖炉前面から1m以内に布類・紙類・その他可燃物を置かないでください。
        - 操作方法（点火・タイマー・消火）は**「使用上の注意 → ガスファイヤー」**をご参照ください。

    - category: bbq
      heading: 屋外BBQ
      bullets:
        - "**必ず屋外の開放されたガーデンエリアでのみご使用ください。**屋根の下やガレージ内での使用は厳禁です。"
        - BBQに火が入っている間は、大人がお子様から目を離さないようにしてください。
        - "**点火中はBBQから離れないでください。**"
        - 操作方法（点火・フタの開閉順序・清掃・消火）は**「使用上の注意 → Weber Q3200 BBQ」**をご参照ください。

    - category: insinkerator
      heading: インシンクエレーター（生ごみ処理機）
      bullets:
        - "**電源を切っている場合でも、絶対に処理機の中に手を入れないでください。**"
        - "**以下のものは絶対に投入しないでください：**骨、果物の種、油脂類、卵の殻、コーヒーかす、繊維質の野菜（セロリ、トウモロコシの皮など）、食品以外のもの——詰まりや故障の原因となり、修理費用をご請求する場合があります。"
        - 操作方法（冷水の使い方・スイッチの場所・詰まり解消）は**「使用上の注意 → インシンクエレーター」**をご参照ください。

  access:
    front_door: >
      スマートロックによるセルフチェックインです。お客様専用のアクセスコードは、ご到着の24時間前に予約プラットフォームを通じてお送りします。
    garage: ガレージリモコンを1台お渡しします。チェックアウトの際は室内に持ち込んでおいてください。
    back_door: ''
    other: >
      スパプールカバー用のプラスチックキーは、ガレージリモコンと一緒にご用意しています。

  notes:
    - 滞在中、家屋のアラームは作動しません。
    - 救急キットはキッチンのパントリー内（左側上段棚）にあります。
    - 消火器はキッチンのシンク下にあります。
    - ガスの元栓は、入口階段室の右側（ガレージ側）にあります。
    - 緊急時はフロントドアからご退出ください。集合場所はガレージ前の車道です。
