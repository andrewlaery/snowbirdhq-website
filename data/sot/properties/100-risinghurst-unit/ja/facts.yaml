check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: lockbox
  instructions: >
    セルフチェックインはロックボックスにて行っていただきます。フラットと物置小屋の間を進むと、屋外シンクのそばにロックボックスがございます。メインハウス用のロックボックスが別にございますので、ユニット専用のロックボックスをお間違えのないようご注意ください（メインハウスのドア用ではございません）。コード1001は、ご到着の3日前に予約プラットフォームを通じてもお送りいたします。
check_out:
  time: '10:00'
wifi:
  network: flat
  password: flat1000
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: 07:00
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false
booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: true
pricing:
  base_nightly: 139.0
  cleaning_fee: 100.0
  extra_person_fee: 50.0
  weekly_discount:
  monthly_discount:
  currency: NZD
exceptions:
  hazards: []

  house_rules:
    - category: parking
      heading: 駐車場
      bullets:
        - 駐車場は私道内の1台分のみとなります。
        - メインハウスの右側、エアコン室外機の横にお停めください。
        - 物置小屋への通路をふさぐ駐車は絶対におやめください。
    - category: capacity
      heading: 定員
      bullets:
        - 最大2名様までとなります（厳守）。
        - ソファはベッドとしてのご使用はできません。

  access:
    front_door: >
      ロックボックスはフラットと物置小屋の間にある屋外シンクのそばにございます。
      コードは1001です（ご到着の3日前に予約プラットフォームを通じてもお送りいたします）。
    back_door: ''
    garage: ''
    other: >
      メインハウスにも別のロックボックスがございますので、ユニット用のロックボックスをお間違えのないようご注意ください。道路側のポストボックス #100 を目印に私道を上っておいでください。

  notes:
    - ホスト（PaddyとBethan）はお隣のメインハウスに在住しております。ご不明な点がございましたら、予約プラットフォームよりお気軽にご連絡ください。
    - ヘルメット付き自転車を2台、ご滞在中にご利用いただけます。
    - 遅い時間のご到着の場合は、事前にホストへ到着予定時刻をお知らせください。屋外ライトと暖房をつけてお待ちいたします。
