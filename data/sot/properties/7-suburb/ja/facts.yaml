# Property-specific exceptions — facts that don't fit any other field but
# must be surfaced to guests. Renderers consume each subsection:
#   <PropertyHazards slug>          -> exceptions.hazards
#   <PropertyHouseRulesDeltas slug> -> exceptions.house_rules
#   <PropertyAccessInstructions slug> -> exceptions.access
#   <PropertyOperationalNotes slug>  -> exceptions.notes
exceptions:
  hazards:
    - description: >
        車両の切り返し時に死角が生じる箇所がございます。十分にご注意いただき、お子様がいる場合は別の方が安全を確認しながら誘導されることをお勧めします。
      severity: minor
    - description: >
        庭の各所に柵のない大きな段差・落下箇所がございます。お子様をその場に残して目を離さないようにしていただき、到着後は周辺の状況をご確認ください。
      severity: minor
    - description: >
        降雪後は凍結と融解を繰り返すため、車道や屋外の階段が非常に滑りやすくなります。車道の走行には十分ご注意ください。路面状況によってはスノーチェーンの装着をお勧めします。
      severity: minor

  house_rules:
    - category: parking
      heading: 駐車場
      bullets:
        - すべての車両は敷地内の車道に駐車してください（路上駐車はご遠慮ください）。
        - 車は縦列で駐車できます（タンデム式）。車道には最大3台まで駐車可能です。
        - バス・コーチ車両による乗降は物件内では行えません。
        - 障害者用駐車スペースの設備はございませんが、乗降のための車道へのアクセスは可能です。なお、玄関への出入りには階段を使用するため、移動に不安のあるお客様にはご不便をおかけする場合がございます。
    - category: luggage
      heading: お荷物・機材について
      bullets:
        - 小さな荷物はベッドの足元に収納できます。スーツケースや大型荷物はガレージをご利用ください。
        - スポーツ用品（ゴルフ用品、スノーボード・スキー・ブーツ、自転車など）の室内への持ち込みはご遠慮ください。ガレージへの保管をお願いいたします。
        - ガレージにはスキーウェアの乾燥用衣類ラックと、電動自転車の充電用コンセントをご用意しています。
        - 追加の乾燥スペースとして、屋外の日当たりの良い衣類ラックが建物裏手にございます。

  access:
    front_door: >
      専用のアクセスコードは予約情報の一部としてご案内しております。コード入力後は「#」キーを押してください。
    garage: 玄関ドア横の照明スイッチパネルの一番下のボタンを押してください。
    back_door: >
      別途コードが設定されています。裏口のドアハンドルはしっかりと力を入れて操作してください。
    other: ""

  notes:
    - 滞在中、ホームアラームは作動しておりません。

  # Property-level operational prose (heating, lighting, internet, kids etc.).
  # Body is Markdown — render via <PropertyUsageSections slug="..." />.
