# Property-specific exceptions — facts that don't fit any other field but
# must be surfaced to guests. Renderers consume each subsection:
#   <PropertyHazards slug>          -> exceptions.hazards
#   <PropertyHouseRulesDeltas slug> -> exceptions.house_rules
#   <PropertyAccessInstructions slug> -> exceptions.access
#   <PropertyOperationalNotes slug>  -> exceptions.notes
exceptions:
  hazards:
    - description: >
        车道在车辆进出时存在视线盲区，请务必格外谨慎，如有儿童在场，请安排另一人负责观察。
      severity: minor
    - description: >
        花园多处存在较大的无围栏陡降区域。请勿让儿童独自在花园内玩耍，并在抵达后熟悉周边环境。
      severity: minor
    - description: >
        降雪后，车道和室外楼梯因反复冻融而变得非常湿滑。请谨慎使用车道；如道路状况需要，请为车辆安装雪链。
      severity: minor

  house_rules:
    - category: parking
      heading: 停车
      bullets:
        - 请将所有车辆停放在车道内（请勿占用路边停车位）。
        - 车辆可前后纵向停放（串联方式），车道最多可容纳3辆车。
        - 不允许巴士／大型客车在房源处接送客人。
        - 房源无专用无障碍停车位，但车道可供上下车使用。请注意，进入房屋需经过楼梯，可能不适合有行动不便需求的宾客。
    - category: luggage
      heading: 行李与装备
      bullets:
        - 小件行李可存放于床尾；大件行李箱及其他较大物品可存放于车库。
        - 房屋内不允许放置运动器材（高尔夫球具、滑雪板／滑雪板靴／滑雪靴、自行车等）——请存放于车库。
        - 车库内设有晾衣架，可用于晾晒滑雪装备，并配有电源插座供电动自行车充电。
        - 房屋后方设有一处户外晾晒架，采光良好，可满足额外的晾晒需求。

  access:
    front_door: >
      专属门锁密码已随预订信息一同提供。输入密码后请按 # 键。
    garage: 前门旁灯光开关面板上的底部按钮。
    back_door: >
      后门设有独立密码。后门门把手需用力按压方可开启。
    other: ""

  notes:
    - 房屋警报系统在您入住期间不会启用。

  # Property-level operational prose (heating, lighting, internet, kids etc.).
  # Body is Markdown — render via <PropertyUsageSections slug="..." />.
