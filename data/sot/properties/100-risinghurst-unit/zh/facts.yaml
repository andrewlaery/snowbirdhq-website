    自助入住，通过密码锁箱办理。请走到公寓与储物间之间的通道——密码锁箱位于室外水槽旁。请注意，主屋门口还有第二个密码锁箱，请务必找到公寓专用的那个，切勿走错主屋入口。密码为 1001，也将在抵达前 3 天通过订房平台发送给您。
