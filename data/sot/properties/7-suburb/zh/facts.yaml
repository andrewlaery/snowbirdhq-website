# Authoritative SSID confirmed at the property is "WrightsGarden" (no space).
wifi:
  network: WrightsGarden
  password: ThankYou4Visiting  # gitleaks:allow guest-facing wifi shown publicly on docs portal

house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: "22:00"
  noise_curfew_end: "07:00"
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - front_door
  noise_monitor: true

