features: []
parking:
  spaces: 4
  type: driveway
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    フロントドアのスマートロックにてセルフチェックインいただけます。お客様専用のアクセスコードは、
    ご到着の24時間前に予約プラットフォームよりお送りいたします。チェックイン時にコードが機能しない場合は、
    ホストまでご連絡ください。コードはリモート操作による再有効化が必要な場合がございます。
check_out:
  time: '10:00'
wifi:
  network: SnowbirdQT
  password: Namaste99
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'CCTV outside property' per ota-manager booking_specific
  noise_monitor: true  # Minut noise monitor per owner.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: false
pricing:
  base_nightly: 1000.0
  cleaning_fee: 500.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        車両の切り返し時に死角が生じる箇所があります。十分にご注意いただき、
        お子様がいる場合は別の方に見張りをお願いください。
      severity: minor
    - description: >
        庭の各所に柵のない大きな段差・落差があります。お子様をその場に一人でいさせないようにし、
        到着時に周辺エリアをご確認ください。
      severity: minor
    - description: >
        階段部分 — お子様が階段で遊ぶことはお控えください。転落によるけがの危険があります。
      severity: minor
    - description: >
        降雪後の凍結・融解により、ドライブウェイや屋外階段が非常に滑りやすくなります。
        ドライブウェイのご利用は十分にご注意いただき、路面状況に応じてスノーチェーンをご使用ください。
      severity: minor
    - description: >
        バスタブ・スパバス — お子様を水が溜まったまま一人にしないでください。
        ご使用後はすぐに水を抜いてください。
      severity: minor
    - description: >
        デッキのBBQ — グリス（油脂）への引火にご注意ください。清潔な状態を保ち、使用中は目を離さず、
        使用後は完全に火を消してください。
      severity: minor
    - description: >
        薪ストーブ — お子様が監視なしに近づくと火傷の危険があります。
        コンペンディアムに記載の操作手順に従ってご使用ください。
      severity: minor
    - description: >
        窓・スライドドア — お子様が容易に触れられる部屋では、お子様を一人にしないでください。
      severity: minor

  house_rules:
    - category: parking
      heading: 駐車場について
      bullets:
        - 駐車はドライブウェイ内の所定スペースのみをご利用ください。路上駐車はご遠慮ください。
        - ドライブウェイ＋ガレージで最大4台まで駐車可能です。
    - category: spa-pool
      heading: スパプール・ホットタブについて
      bullets:
        - スパのご利用はお客様ご自身の責任においてお願いいたします。
        - "**スパの中や周辺では、大人が常にお子様から目を離さないようにしてください。**"
        - "**不使用時はスパカバーを必ず施錠してください。** スパキーの保管場所およびカバーの操作方法は、[スパプール・ホットタブ](/docs/properties/25-dublin/user-instructions#appliances-wellness)（ご利用案内）をご参照ください。"
        - 水質を保つため、入浴前にシャワーをお浴びください。
        - "**塩素系薬剤のみ使用可** — 泡立て剤、入浴剤、バスソルト、その他の薬剤は使用しないでください。"
        - "**スパの中や周辺への食べ物・飲み物・ガラス製品の持ち込みはご遠慮ください。**"
        - 飲酒後のスパのご利用はお控えください。

    - category: keys-remotes
      heading: 鍵・リモコンについて
      bullets:
        - "**フロントドアの入室**: スマートロック用コードはご到着の24時間前に予約プラットフォームよりお送りします。入室手順の詳細は[ご利用案内](/docs/properties/25-dublin/user-instructions)をご参照ください。"
        - "**ガレージリモコン**（1個）: チェックアウト時には室内へお持ち込みください。"
        - "**スパプール用プラスチックキー**: ガレージリモコンと一緒に保管されています。"
        - チェックアウト時は、すべてのアクセスキーとガレージリモコンをキッチンカウンターの上に置いてください。
        - 鍵またはガレージリモコンを紛失された場合は、費用を請求させていただく場合がございます。

    - category: wood-burner
      heading: スタジオ薪ストーブについて
      bullets:
        - "**薪ストーブを使用中は絶対にその場を離れないでください。** 火が燃えている間は、常に大人がスタジオ内にいるようにしてください。"
        - "**火が燃えている間は、大人がお子様から常に目を離さないようにしてください。** ドア、ガラス、周囲の部材は非常に高温になります。"
        - 使用する薪や着火材は備え付けのもののみご使用ください。ゴミ、防腐処理された木材、着火促進剤の使用はご遠慮ください。
        - "**灰をゴミ箱や風の当たる場所に捨てないでください。** 残り火が再燃し、火災の原因となる恐れがあります。"
        - 着火・ドア操作・灰の冷却に関する操作手順は、[ご利用案内 → スタジオ薪ストーブ](/docs/properties/25-dublin/user-instructions#appliances-heating)をご参照ください。

    - category: gas-fire
      heading: 上階ガスファイヤーについて
      bullets:
        - 使用中は必ずその場にいるようにしてください。主要な暖房器具としての使用はお勧めしません。
        - "**ガスファイヤーが点灯している間は、大人がお子様から常に目を離さないようにしてください。** ガラス面は非常に高温になります。"
        - 暖炉前方1m以内に布製品、紙類、その他の可燃物を置かないでください。
        - 点火・タイマー設定・消火の操作手順は、[ご利用案内 → ガスファイヤー](/docs/properties/25-dublin/user-instructions#appliances-heating)をご参照ください。

    - category: bbq
      heading: 屋外BBQについて
      bullets:
        - "**必ず屋外の開けた庭スペースでのみご使用ください。** 屋根の下やガレージ内での使用はご遠慮ください。"
        - BBQに火が入っている間は、大人がお子様から目を離さないようにしてください。
        - "**点火中はBBQから離れないようにしてください。**"
        - 点火・蓋の開閉順序・清掃・消火の操作手順は、[ご利用案内 → Weber Q3200 BBQ](/docs/properties/25-dublin/user-instructions#appliances-outdoor)をご参照ください。

    - category: insinkerator
      heading: インシンクエレーター（生ごみ処理機）について
      bullets:
        - "**電源が切れている場合でも、処理機の中に手を入れないでください。**"
        - "**投入禁止物**: 骨、果物の種、油脂類、卵の殻、コーヒーかす、繊維質の野菜（セロリ・とうもろこしの皮など）、食品以外のもの。詰まりや故障の原因となり、修理費用を請求させていただく場合がございます。"
        - 水の流し方・スイッチの場所・詰まり時の対処法は、[ご利用案内 → インシンクエレーター](/docs/properties/25-dublin/user-instructions#appliances-kitchen)をご参照ください。

  access:
    front_door: >
      スマートロックにてセルフチェックインいただけます。お客様専用のアクセスコードは、
      ご到着の24時間前に予約プラットフォームよりお送りいたします。
    garage: ガレージリモコンを1個ご用意しています。チェックアウト時には室内へお持ち込みください。
    back_door: ''
    other: >
      スパプールカバー用のプラスチックキーは、ガレージリモコンと一緒に保管されています。

  notes:
    - 滞在中、家屋の警報システムは作動しておりません。
    - 救急箱はキッチンパントリー内（左側の上段棚）に備えています。
    - 消火器はキッチンシンク下に設置されています。
    - ガスの元栓は、ガレージ側の入口階段右手にあります。
    - 緊急時はフロントドアから避難してください。集合場所はガレージ前のドライブウェイです。

  usage_sections:
    - category: appliances
      heading: 家電・設備のご案内
      body: |
        キッチン
        - **オーブン**: ご使用の際は、パントリー内の**「Oven Leave On」**と表示されたブレーカースイッチをオンにしてください。オーブンが起動しない場合は、まずこのスイッチをご確認ください。
