  cleaning_fee: 300.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD

# Property-specific exceptions — facts that don't fit any other field but
# must be surfaced to guests. Renderers consume each subsection:
#   <PropertyHazards slug>          -> exceptions.hazards
#   <PropertyHouseRulesDeltas slug> -> exceptions.house_rules
#   <PropertyAccessInstructions slug> -> exceptions.access
#   <PropertyOperationalNotes slug>  -> exceptions.notes
exceptions:
  hazards:
    - description: >
        车道在倒车或转向时存在视线盲区，请务必格外谨慎。如有需要，请安排另一人留意周围是否有儿童。
      severity: minor
    - description: >
        花园多处存在较大的无围栏陡降区域，请勿让儿童单独在此活动，并在抵达后熟悉周边环境。
      severity: minor
    - description: >
        降雪后，车道及户外台阶因反复冻融极易结冰，请谨慎通行；如路况需要，请为车辆安装雪链。
      severity: minor

  house_rules:
    - category: parking
      heading: 停车
      bullets:
        - 请将所有车辆停放在车道内（请勿占用路边停车位）。
        - 车辆可前后纵向停放（串联方式），车道最多可容纳 3 辆车。
        - 不允许大巴或旅游车在房屋附近上下客。
        - 房屋无专用无障碍停车位，但车道可供装卸行李使用。请注意，进入房屋需走楼梯，可能不适合有行动不便需求的住客。
    - category: luggage
      heading: 行李与装备
      bullets:
        - 小件行李可放置于床脚处；行李箱及大件物品可存放在车库。
        - 体育器材（高尔夫球具、滑雪板/滑雪鞋/雪地靴、自行车等）不得带入室内，请存放于车库。
        - 车库内设有晾衣架可晾晒滑雪装备，并配有电源插座可为电动自行车充电。
        - 房屋后侧设有一个户外晾衣架，可供额外晾晒衣物使用。

  access:
    front_door: >
      专属门禁码已包含在您的预订信息中。输入密码后请按 # 键。
    garage: 前门旁灯光开关面板上的最下方按钮。
    back_door: >
      后门设有独立密码。开启后门把手时需用力按压。
    other: ""

  notes:
    - 房屋警报系统在您入住期间不运行。

  # Property-level operational prose (heating, lighting, internet, kids etc.).
  # Body is Markdown — render via <PropertyUsageSections slug="..." />.
  usage_sections:
    - category: internet
      heading: 网络 / Wi-Fi
      body: >
        Wi-Fi 网络名称已在上方"快速参考"中列出。密码请见入住时放置于房内的欢迎卡。

    - category: heating
      heading: 供暖
      body: |
        皇后镇地处新西兰南阿尔卑斯山区，气候变化显著——有时白天气温超过 30°C，隔天便可能接近冰点。要让室内保持理想温度，有时需要一些调节。

        本房屋配备 **大金中央暖气系统**，可为全屋提供均匀稳定的温度。系统已预设在适合大多数住客的温度档位。部分房间支持单独调节温度——如有任何不适，请告知房东。

        寒冷天气时，请保持门窗关闭以留住暖气。如感到不适，建议先适当增减衣物；若室温仍不理想，请联系房东。

        在较凉的天气里，外出一段时间前请确保关好所有门窗，以便您回来时室内依然温暖舒适。

    - category: lighting
      heading: 灯光
      body: >
        所有灯光均可通过就近的墙壁开关控制。部分房间（包括卧室）配有调光开关——若灯光出现闪烁，请长按调光开关直至亮度调至最高，即可消除闪烁。

    - category: children
      heading: 儿童设施
      body: |
        - **玩具：** 各类儿童玩具存放于客厅橱柜内，供您取用。
        - **餐具：** 厨房备有一套儿童专用餐具，放置于厨房抽屉中。
