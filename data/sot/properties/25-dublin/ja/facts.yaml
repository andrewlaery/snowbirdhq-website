# Bed layout per ota-manager listing.md prose (owner-confirmed 2026-04-27).
# Note: BedType schema has no "king_single" — modelled as long_single.
bedrooms:
  - name: ベッドルーム1（マスター）
    bed: super_king
    ensuite: true
    notes: 上階。ウォークインクローゼット付き。
  - name: ベッドルーム2
    ensuite: true
    beds:
      - super_king
      - single
    notes: メインフロア。シングルサイズの二段ベッド付き。
  - name: ベッドルーム3
    ensuite: true
    beds:
      - super_king
      - long_single
      - single
    notes: >
      メインフロア。キングシングル1台＋シングルトランドル1台付き。既知の問題：
      大きな窓の下部からすきま風が入ることがあります（肌寒く感じる場合があります）。
