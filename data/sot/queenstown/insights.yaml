  - id: groceries-shop
    title: Groceries, Shop, etc
    hero_image:
      url: https://images.unsplash.com/photo-1542838132-92c53300491e?w=1600&q=80&auto=format&fit=crop
      photographer: nrd
      photographer_url: https://unsplash.com/@nicotitto
      note: Fresh produce at a market
    items:
      - name: McKibbon’s of Royalburn
        description: A premium gourmet grocer located in Queenstown, McKibbon’s of Royalburn is a collaboration between the Ettema family and Royalburn Station owners Nadia Lim and Carlos Spencer. The store carries forward a legacy of excellence in farming and fresh produce, offering a curated selection of high-quality products. Shoppers can find fresh seasonal produce, premium meats, free-range eggs, honey, and other specialties sourced directly from the iconic Royalburn farm and trusted suppliers. With a focus on sustainability and local heritage, McKibbon’s provides an exceptional shopping experience for food enthusiasts looking for the best of New Zealand’s bounty
      - name: Neat Meat
        description: A premium butchery offering high-quality, ethically sourced meats from around New Zealand. Known for their exceptional selection of cuts, including dry-aged beef, free-range poultry, and game meats. Their knowledgeable staff provide expert advice on cooking techniques and recipe suggestions. Perfect for picking up something special for a BBQ or dinner party, with options ranging from everyday staples to gourmet specialties.
      - name: Harbour Fish
        description: A standout seafood supplier bringing the freshest catch directly from Otago waters to Queenstown. Their daily deliveries ensure premium quality fish and seafood, with a diverse selection including local salmon, green-lipped mussels, and seasonal specialties. The friendly staff are happy to offer cooking tips and preparation advice. Ideal for seafood enthusiasts looking for restaurant-quality ingredients to prepare at home.
      - name: Fergbutcher
        description: Fergbutcher is a premium butchery and gourmet food destination located at 7 Bush Creek Road in Arrowtown. Established by the team behind Queenstown’s iconic Fergburger, Fergbutcher offers a wide range of high-quality meats, including beef, lamb, pork, and poultry, along with handcrafted sausages and specialty cuts. In addition to their butchery offerings, they provide freshly baked breads and pastries from Fergbaker, as well as a selection of hot food items such as sandwiches and burgers. With a focus on quality and freshness, Fergbutcher has quickly become a favorite among locals and visitors seeking top-notch meats and gourmet products in the Arrowtown area.

  - id: breweries
    title: Breweries
    hero_image:
      url: https://images.unsplash.com/photo-1650488056440-a2e8b8c9de2e?w=1600&q=80&auto=format&fit=crop
      photographer: Vince Veras
      photographer_url: https://unsplash.com/@vinceveras
      note: Beer pour at a craft bar counter
    items:
      - name: Canyon Brewing
        description: This has one of the best scenic beer gardens anywhere. Not only are the beers good, the food is also fantastic. On a sunny day, it is one of the best places to enjoy a beer and pizza in the sun with a good vibe. It is also right beside the Shotover Jet, so you can ride the jet for some adrenaline and then enjoy a craft beer.
      - name: Altitude Brewing
        description: Picturesque location overlooking the lake and mountains. This is a real brewery and it feels like you are drinking at the source of the beer production line! Best in the afternoon and early evening. One the right day it is crowded with a great vibe. They often have fantastic food trucks pulled up outside if you fancy a bite.
      - name: Searchlight Brewery
        description: Searchlight Brewery, a hidden gem tucked away in Queenstown's industrial area at 12 Industrial Place, is an independently owned establishment known for its creative and evolving selection of craft beers. The relaxed taproom and beer garden feature 18 different beers on tap, including their popular Session Hazy Pale Ale. The brewery regularly hosts entertainment like live music, comedy shows, and trivia nights, particularly on Fridays. Adding to its appeal, Tacos Jaguar operates on-site, serving authentic Mexico City-style classics that pair perfectly with Searchlight's craft brews.

  - id: wineries
    title: Wineries
    hero_image:
      url: https://images.unsplash.com/photo-1631326952512-bedc24cb8a04?w=1600&q=80&auto=format&fit=crop
      photographer: Tonia Kraakman
      photographer_url: https://unsplash.com/@toniakraakman
      note: Vineyard-covered hills near Alexandra, Central Otago — confirmed local
    subgroups:
      - title: Queenstown
        items:
          - name: Wet Jacket Wines
            description: Wet Jacket Wines has found its new home at the Queenstown Marina on Sugar Lane in Frankton. Their tasting room offers a sophisticated waterfront experience, combining wine tastings with stories of local history and conservation efforts, all while overlooking the stunning Lake Wakatipu. Known for their first-class wines and relaxed, knowledgeable atmosphere, Wet Jacket is perfectly positioned among the marina's iconic floating sheds, offering visitors a unique tasting experience with breathtaking views of the surrounding mountain ranges.
          - name: Amisfield Winery & Bistro
            description: This winery is celebrated for its organic approach to wine-making and is particularly known for its Pinot Noir. They offer a range of older vintages that exhibit more complexity. Amisfield also provides a "Trust the Chef" five-course degustation with matching wines. It's located close to Lake Hayes​​​​​​. Bookings are essential.
          - name: Mora Wines
            description: Located in Lake Hayes, Mora Wines is known for its distinctive Pinot Noir, "The Siren". Each vintage of this wine offers unique characteristics and tasting notes. They also have an Artesian Kitchen offering a dining experience with views of a lush garden​​.
      - title: Gibbston Valley
        items:
          - name: Chard Farm Winery
            description: This winery stands out for its ambiance and is one of the few in the area to offer Pinot Gris and Chardonnay. The winery is set against a beautiful backdrop of the Gibbston Valley​​​​.
          - name: Kinross Winery & Cellar Door
            description: also located in Gibbston Valley, Kinross is a haven for wine enthusiasts. It represents five boutique Central Otago wine labels, offering an extensive selection that includes Pinot Noir, Riesling, and Sauvignon Blanc. The setting is idyllic, with vineyard views that provide a serene atmosphere for tasting sessions. Kinross is also known for its cozy accommodation options, making it a perfect retreat for those looking to immerse themselves in the wine country experience. The onsite bistro serves locally sourced, seasonal dishes that perfectly complement their wine selection. Additionally, Kinross hosts regular wine events and tastings, making it a vibrant spot for both locals and tourists.
      - title: Cromwell
        items:
          - name: Akarua Winery
            description: Situated in Bannockburn, Akarua is renowned for its Pinot Noirs, Pinot Gris, and Riesling. The vineyard is the largest privately owned estate in Central Otago and is noted for its sandy, well-draining soils​​.
          - name: Mt Difficulty Winery
            description: Also located in Bannockburn, this winery offers stunning views over the valley. Known for their Pinot Noir, they also have a restaurant that is perfect for pairing wine with a meal​​.
          - name: Brennan Wines
            description: Known for its lunchtime tasting menu that pairs Pinot Noirs and white wines with a signature Gewurztraminer. Brennan Wines offers tastings in their outdoor space in summer or by cozy fireplaces in winter​​.
      - title: Wanaka
        items:
          - name: Rippon Winery
            description: Located near Wanaka, a short drive from Queenstown, this vineyard offers stunning views of Lake Wanaka and the Southern Alps. They are known for their Pinot Noirs and local cheese pairings​​.

  - id: cafes
    title: Cafes
    hero_image:
      url: https://images.unsplash.com/photo-1755884931646-ae6e1d227717?w=1600&q=80&auto=format&fit=crop
      photographer: Aurela Redenica
      photographer_url: https://unsplash.com/@aurelared
      note: Warm cosy cafe interior with wooden accents and natural light
    subgroups:
      - title: Arrowtown
        items:
          - name: Fergbutcher
            description: A must-visit gem in Arrowtown where gourmet butchery meets culinary delight! Their mouthwatering *grilled sausages* are a standout attraction, featuring flavorful chorizo, premium beef, and authentic Irish pork varieties that showcase their butchery expertise. Located at 7 Bush Creek Road, this Ferg Foods establishment brings the same beloved quality as their Queenstown locations but in a charming Arrowtown setting. Open daily 7am-6pm for all your gourmet meat and sandwich cravings!
      - title: Cromwell
        items:
          - name: Nichol's Garden & Pet Centre, & Cafe
            description: A unique destination that combines a garden center, pet shop, and café experience. The café offers fresh, well-priced homestyle cooking in a charming garden setting surrounded by plants and outdoor displays. Known for its excellent quality food and *must-try local cheese rolls*, this spot is perfect for a relaxed brunch or lunch.

  - id: dining
    title: Dining
    hero_image:
      url: https://images.unsplash.com/photo-1565895405140-6b9830a88c19?w=1600&q=80&auto=format&fit=crop
      photographer: Louis Hansel
      photographer_url: https://unsplash.com/@louishansel
      note: Restaurant table with plated seafood — warm interior
    subgroups:
      - title: Queenstown
        items:
          - name: Ayrburn
            description: A spectacular new food and wine precinct set in a restored 1860s farm estate, Ayrburn blends historic charm with contemporary elegance. Located just outside Arrowtown, this destination features multiple distinct venues including The Woolshed for elevated dining, The Burr Bar for refined cocktails, The Manure Room wine bar, and The Dairy for artisan gelato and treats. The beautifully landscaped grounds and lakefront setting make it perfect for long lunches, wine tastings, and relaxed afternoons. With a focus on seasonal produce and Central Otago wines, Ayrburn offers a premium yet approachable dining experience that’s quickly becoming a local favourite.
          - name: Soda
            description: Located in the heart of Queenstown, Soda QT offers a fresh take on modern bistro dining. The restaurant combines contemporary New Zealand cuisine with Asian influences, serving innovative dishes in a stylish, industrial-chic setting. Known for its creative cocktails and sharing plates, it's an ideal spot for both casual dining and special occasions.
          - name: Bella Cucina
            description: A charming Italian restaurant, Bella Cucina transports its guests to Italy with its authentic cuisine and warm, rustic ambiance. Known for its freshly made pasta and traditional wood-fired pizzas, this eatery is a favorite among those who appreciate genuine Italian flavors.
          - name: The Sherwood
            description: This is a unique dining experience that combines sustainability with culinary creativity. The Sherwood focuses on organic, locally-sourced ingredients, and offers a menu that changes with the seasons. It's not just a place to eat but a community hub with a relaxed, eco-friendly vibe.
          - name: Public Kitchen and Bar
            description: Located by the water's edge, Public Kitchen and Bar offers a relaxed atmosphere with stunning views. The menu features a variety of dishes with an emphasis on local produce and seafood. It's a great spot for a casual meal with friends or family.
          - name: Blue Kanu
            description: Blue Kanu blends Pacifica and Asian cuisine, offering a unique 'Polynasia' dining experience. The decor is vibrant and eclectic, and the menu features innovative dishes that are perfect for sharing. It's a lively and fun spot for an adventurous culinary journey.
          - name: Rata
            description: Co-owned by renowned New Zealand chef Josh Emett, Rata is a fine dining restaurant that offers a relaxed yet sophisticated dining experience. The menu showcases some of the best New Zealand ingredients, with a focus on modern New Zealand cuisine.
          - name: Botswana Butchery
            description: This restaurant is famous for its luxurious interior and stunning lake views. It specializes in high-quality meats and local produce, offering a range of steaks and game dishes, along with an extensive wine list.
          - name: Fergburger
            description: An iconic spot in Queenstown, Fergburger is a must-visit for burger enthusiasts. Known for its large, gourmet burgers, this place often has a queue but it's worth the wait.
      - title: Arrowtown
        items:
          - name: The Fork and Tap
            description: This is a charming pub set in a historic building, offering a range of local beers and classic pub fare with a modern twist. It's a great spot for a casual meal in a relaxed, friendly atmosphere.
          - name: La Rumbla
            description: If you're in the mood for Spanish and South American flavors, La Rumbla is the place to go. This lively restaurant offers a variety of tapas and larger plates, perfect for sharing and pairing with their selection of wines and cocktails.
          - name: Slow Cuts
            description: Known for its casual and friendly vibe, Slow Cuts offers hearty dishes focusing on slow-cooked meats and locally sourced ingredients. It's a great spot for a relaxed meal with friends and family.

  - id: food-delivery
    title: Food Delivery Services
    hero_image:
      url: https://images.unsplash.com/photo-1774560745853-bcd965d85d12?w=1600&q=80&auto=format&fit=crop
      photographer: Unsplash
      photographer_url: https://unsplash.com/photos/3EGuF0LvPPM
      note: Delivery courier on bicycle with insulated thermal bag
    items:
      - name: DoorDash
        description: A convenient food delivery service operating in Queenstown that partners with local restaurants and cafes. DoorDash allows you to order food from your favorite establishments and have it delivered directly to your accommodation or location. Download the App or jump on-line (https://www.doordash.com)

  - id: bars
    title: Bars
    hero_image:
      url: https://images.unsplash.com/photo-1572116469696-31de0f17cc34?w=1600&q=80&auto=format&fit=crop
      photographer: Patrick Tomasso
      photographer_url: https://unsplash.com/@impatrickt
      note: Moody bar interior with cocktail ambience
    items:
      - name: Eichardt's Bar
        description: A part of the historic Eichardt's Private Hotel, this bar offers luxury in a relaxed setting with stunning lake views. It's known for its fine wines, cocktails, and exquisite tapas-style dishes.
      - name: The Bunker
        description: An intimate and sophisticated bar with a rustic, alpine vibe. Known for its cocktails and late-night dining, it also has a hidden club downstairs for those looking to dance the night away.
      - name: Ferg's Bar
        description: Located conveniently in the heart of Queenstown, Ferg's Bar is a vibrant and trendy spot, often considered a sister venue to the famous Fergburger. It's a great place to unwind after a day of adventure or sightseeing. The bar offers a variety of local and international beers, wines, and a range of unique cocktails. The atmosphere is lively and welcoming, making it a popular choice among both locals and tourists. It's also a great place to mingle and meet new people.
      - name: Little Blackwood
        description: Situated on the Steamer Wharf with stunning views of Lake Wakatipu, Little Blackwood exudes a cozy and sophisticated charm. Renowned for its artisan cocktails and an impressive selection of local wines, it's the perfect spot for an evening of relaxation and indulgence. The interior boasts a warm, rustic aesthetic with handcrafted wood furnishings, creating an inviting atmosphere. They also offer a range of craft beers and a small but carefully curated menu of bar snacks and platters, ideal for pairing with their beverage offerings.

  - id: activities-adventures
    title: Activities & Adventures
    hero_image:
      url: https://images.unsplash.com/photo-1471247511763-88a722fc9919?w=1600&q=80&auto=format&fit=crop
      photographer: Tomas Sobek
      photographer_url: https://unsplash.com/@tomas_nz
      note: Paraglider over Queenstown — confirmed local, snow-capped mountains below
    subgroups:
      - title: Queenstown
        items:
          - name: TSS Earnslaw Cruise to Walter Peak High Country Farm
            description: This is a unique and scenic journey on the historic TSS Earnslaw steamship across Lake Wakatipu to Walter Peak High Country Farm. Once there, you can enjoy a farm tour, horse trekking, or a delicious barbecue lunch or dinner. It's a great way to experience New Zealand's farming culture and history.
          - name: Queenstown Gardens Disc Golf
            description: Located in the picturesque Queenstown Gardens, this is a fun and relaxed activity suitable for all ages. You can rent discs at Small Planet Sports and enjoy a game of disc golf while taking in the beautiful surroundings of the gardens.
          - name: Remarkables Market on Saturday
            description: This is a popular local market held every Saturday at the base of the Remarkables mountain range. It offers a range of local produce, crafts, and food, set against the stunning backdrop of the mountains. It's a great place to experience the local culture, taste local food, and pick up unique souvenirs.
          - name: SkyTrekParagliding
            description: For an adrenaline-pumping adventure, SkyTrek offers tandem paragliding flights. You'll get to soar over Queenstown with an experienced pilot and enjoy breathtaking views of the town, Lake Wakatipu, and the surrounding mountains.
          - name: Packrafting Queenstown Packrafting 101 Course
            description: This is a fantastic way to explore the waterways around Queenstown. The Packrafting 101 course is designed for beginners and covers basic skills and safety. You'll get to navigate rivers and lakes in a small, inflatable boat, combining adventure with the opportunity to enjoy the stunning natural scenery.
          - name: Nevis Swing
            description: For thrill-seekers, the Nevis Swing is one of the world’s biggest swings, situated in the Nevis Valley near Queenstown. You'll experience a 300m arc at high speed, with breathtaking views of the valley. It's a must-do for anyone looking for an extreme adventure.
      - title: Cromwell
        items:
          - name: Bannockburn Sluicing's Historic Reserve
            description: Located in Cromwell's historic gold mining region, this fascinating walkway takes you through an otherworldly landscape carved by hydraulic mining during the gold rush era. The 3.5km loop track (approximately 2 hours) winds through impressive cliff faces and rock formations, offering interpretive panels that detail the area's rich mining history. The stark, desert-like terrain provides stunning views of the Cromwell Basin and surrounding vineyards. Best visited in early morning or late afternoon when the sun brings out the golden colors of the rock faces. The track is mostly exposed, so bring sun protection and water. Access is via Felton Road in Bannockburn, with parking available at the main entrance.

  - id: hiking
    title: Hiking
    hero_image:
      url: https://images.unsplash.com/photo-1678268955592-37102da44acd?w=1600&q=80&auto=format&fit=crop
      photographer: Sebastian Knoll
      photographer_url: https://unsplash.com/@sebastianknoll
      note: Southern Alps NZ trail — same photographer's neighbouring shots confirmed Mueller Hut / Mt Cook
    subgroups:
      - title: Short walks (1-3h)
        items:
          - name: Tiki Trail
            description: A popular uphill track that starts at the base of the Skyline Gondola and leads to the top of Bob's Peak. It offers stunning views over Queenstown. Optional Gondola ride down for a more leisurely return.
          - name: Queenstown Hill Trail
            description: A rewarding hike that provides panoramic views of Queenstown, Lake Wakatipu, and the surrounding mountains. It's a moderately challenging walk, taking about 2-3 hours return.
          - name: Sunshine Bay Track
            description: An easy and pleasant walk from the edge of Queenstown. It follows the lake through forested areas, offering peaceful lake views.
          - name: Bob’s Cove Trail
            description: An easy and scenic walk leading to a picturesque cove on Lake Wakatipu. The trail is known for its beautiful native bush and birdlife. Optional swim in the cove for a refreshing experience.
          - name: Lake Hayes Trail
            description: A leisurely, flat loop around Lake Hayes, offering stunning reflections of the surrounding mountains on a calm day. Ideal for walking, jogging, and biking.
          - name: Moke Lake Loop Track
            description: A peaceful loop around Moke Lake, nestled among mountains. This relatively easy track is perfect for experiencing the tranquility of the New Zealand countryside.
          - name: Mt Crichton Loop Track
            description: A historic trail that passes through native beech forest, with highlights including a waterfall and an old miners' hut. The track offers insights into the area's gold mining history.
          - name: Lake Sylvan Track
            description: Located near Glenorchy, this is an easy, family-friendly walk through a beautiful forest, leading to a small lake with a stunning mountain backdrop.
          - name: Jacks Point Track
            description: A scenic track that follows the edge of Lake Wakatipu, offering views of The Remarkables mountain range. It's great for both walking and mountain biking.
          - name: Arrow River Trail
            description: Located in Arrowtown, this trail follows the beautiful Arrow River and leads to the famous Kawarau Bungy Bridge. It's an easy walk, suitable for all ages.
          - name: Sawpit Gully Trail
            description: Also in Arrowtown, this is a more challenging loop, offering a mix of forest and hill country, with great views over the Arrow Basin.
      - title: Longer walks/hikes (3h+)
        items:
          - name: Ben Lomond Summit
            description: A challenging full-day hike that rewards hikers with panoramic views of the Southern Alps and Lake Wakatipu. Suitable for fit and experienced hikers.
          - name: Moonlight Track
            description: Starting near Arthur’s Point, this track offers stunning views over the Shotover River and surrounding mountains. It can be quite challenging and is best for experienced hikers.
          - name: Roy’s Peak
            description: A demanding but extremely popular hike near Wanaka, known for its iconic viewpoint overlooking Lake Wanaka and Mount Aspiring. It's a strenuous, uphill trek.
          - name: Mt Isthmus Peak
            description: Similar to Roy's Peak but less crowded, this track offers stunning views of both Lake Wanaka and Lake Hawea. It's a challenging hike with a steep ascent.

  - id: rainy-days
    title: On rainy days
    hero_image:
      url: https://images.unsplash.com/photo-1628333971837-4cb0a5fa8a96?w=1600&q=80&auto=format&fit=crop
      photographer: Unsplash
      photographer_url: https://unsplash.com
      note: Moody mountains in low cloud — alpine, southern-hemisphere feel
    items:
      - name: Onsen Hot Pools
        description: Relax in private hot pools overlooking the Shotover River canyon. This is a perfect way to enjoy the rainy ambiance in a warm, comforting setting.
      - name: Fear Factory Queenstown
        description: Test your nerves at New Zealand's scariest haunted house. It's an exhilarating experience, especially on a gloomy, rainy day.
      - name: Queenstown Underwater Observatory
        description: Get a glimpse of the underwater life in Lake Wakatipu without getting wet. It's great for all ages and offers a unique perspective on the local aquatic life.
      - name: Queenstown Indoor Skydiving
        description: Experience skydiving indoors with iFLY. It's a fun and exhilarating activity that's unaffected by the weather.
      - name: Lakes District Museum & Art Gallery
        description: Learn about the rich history of the area, including its gold mining past. It's both educational and entertaining.
      - name: Arrowtown Chinese Settlement
        description: A historic site showcasing the lives of Chinese gold miners in the 1800s. The settlement is partially sheltered and offers a fascinating look into the past.

  - id: local-news
    title: Local News Sources
    hero_image:
      url: https://images.unsplash.com/photo-1662733853632-00c3fd65d53e?w=1600&q=80&auto=format&fit=crop
      photographer: Annie Spratt
      photographer_url: https://unsplash.com/@anniespratt
      note: Newspaper and hot drink — vintage flat-lay
    items:
      - name: Otago Daily Times
        description: One of the most reputable newspapers in the region, covering local news, events, and community issues in Queenstown, Arrowtown, and the wider Otago region.
      - name: The Queenstown News
        description: A local news website and magazine that focuses specifically on Queenstown. It offers updates on local events, community news, and lifestyle features.
      - name: Mountain Scene
        description: A Queenstown-based weekly newspaper that provides local news, features, and entertainment information. It's well-regarded for its coverage of community issues and events.
      - name: Radio Wanaka
        description: Although based in Wanaka, this radio station covers regional news that often includes Queenstown and Arrowtown. It's a great source for local updates, weather, and community events.
      - name: Lakes Weekly Bulletin
        description: A popular free weekly publication that includes local news, job listings, and classifieds, along with information about upcoming events and entertainment.

  - id: local-communities
    title: Local Communities and Online Platforms
    hero_image:
      url: https://images.unsplash.com/photo-1765218184664-4d9bc6032b65?w=1600&q=80&auto=format&fit=crop
      photographer: Jefferson Sees
      photographer_url: https://unsplash.com/@jeffersonsees
      note: Friends gathered outdoors at a social evening
    items:
      - name: Queenstown Trading Group on Facebook
        description: This is a popular community group where locals buy, sell, trade items, and share information about local events and services.
      - name: Neighbourly
        description: A private neighbourhood website where residents of Queenstown and Arrowtown can share advice, plan events, and keep up with local news and alerts.
      - name: Queenstown Community Noticeboard on Facebook
        description: This platform is great for keeping up with local happenings, community announcements, and discussions.
      - name: Queenstown Lakes District Council Website
        description: For official news, community updates, and information about council services and initiatives.
      - name: Queenstown, New Zealand (Volunteer) Dog Walking group
        description: On Facebook if you fancy taking a dog for a walk!

  - id: ski-board-hire
    title: Ski/Board Hire
    hero_image:
      url: https://images.unsplash.com/photo-1768777156505-296818362138?w=1600&q=80&auto=format&fit=crop
      photographer: Ansis Kančs
      photographer_url: https://unsplash.com/@ansiskancz
      note: Strapping into a snowboard binding on snow
    items:
      - name: Snowbiz
        description: Located in the heart of Queenstown, Snowbiz is a popular choice for ski and snowboard rental. They offer a wide range of equipment for all skill levels and also provide tuning and repair services.
      - name: Outside Sports
        description: Offering top-quality ski and snowboard equipment, Outside Sports is known for its professional service. They also provide the convenience of booking your gear online in advance.
      - name: Green Toad Snowboard & Ski Hire
        description: Situated conveniently in central Queenstown, Green Toad offers a variety of ski and snowboard hire options, catering to both beginners and advanced enthusiasts. Their friendly staff are known for giving great local advice on ski conditions.
      - name: Browns Ski Shop
        description: A family-owned business, Browns Ski Shop is renowned for its personalized service and expert advice. They offer a wide selection of rental gear and are conveniently located near the town center.
      - name: Charge About Electric Bikes
        description: While primarily known for electric bikes, they also offer ski and snowboard rentals during the winter season. A great option if you're looking for a one-stop shop for different outdoor activities.
      - name: Racers Edge
        description: Located a bit further in Wanaka, Racers Edge offers a comprehensive range of ski and snowboard hire options. They are known for their high-quality equipment and knowledgeable staff.
      - name: Alpine Sports
        description: Another excellent choice for ski and snowboard gear, Alpine Sports offers rental, tuning, and workshop services. They have a wide range of equipment to suit different levels and preferences.
      - name: The Snow Centre
        description: Although based in Auckland, The Snow Centre offers online rental bookings with options for collection in Queenstown. They provide a wide range of ski and snowboard equipment.

  - id: ski-fields
    title: Ski Fields & Snow Reports
    hero_image:
      url: https://images.unsplash.com/photo-1563101008-723343289b74?w=1600&q=80&auto=format&fit=crop
      photographer: Andrew Hughes
      photographer_url: https://unsplash.com/@hughesy
      note: Snowboarder airborne at Coronet Peak NZ — confirmed local
    items:
      - name: Coronet Peak
        description: Just a short drive from Queenstown, Coronet Peak is known for its varied terrain suitable for all levels, night skiing, and stunning views. Snow reports for Coronet Peak can be found on their official website or through local news channels.
      - name: The Remarkables
        description: Another ski field close to Queenstown, The Remarkables is famous for its friendly atmosphere and is great for families and beginners. It also offers challenging terrain for more experienced skiers and boarders. Updated snow reports can be accessed on their website.
      - name: Cardrona Alpine Resort
        description: Located between Wanaka and Queenstown, Cardrona is well-loved for its wide-open trails and is great for beginners and intermediates, as well as park riders. Snow conditions and reports can be checked on the Cardrona website.
      - name: Treble Cone
        description: The largest ski area in the South Island, located near Wanaka, Treble Cone is known for its long runs and spectacular views. It's ideal for intermediate to advanced skiers. Snow reports are available on the Treble Cone website.
    outro: For up-to-date snow reports, the ski fields' official websites are the most reliable sources. These websites typically provide detailed information on snow conditions, weather forecasts, open trails, and lift status. Additionally, local news websites and some dedicated ski and snow report apps also provide regular updates on these ski fields.

