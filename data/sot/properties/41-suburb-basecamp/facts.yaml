# washer, Miele TWD 660 WP EcoSpeed heat-pump dryer, Daikin FVXG50K2V1B
# Nexura floor-standing AC, Beko OIM 22301 X single oven, Beko built-in
# microwave (model not yet located), Beko side-by-side fridge/freezer
# (model not yet located), Bosch induction stove (model not captured).
appliances:
  # Kitchen
  - miele-g7130sc                        # dishwasher (Miele G7130 SC AutoDos)
  - beko-oim22301x                       # oven (Beko OIM 22301 X)
  - 41-suburb-basecamp-induction-hob     # Bosch induction cooktop
  - 41-suburb-basecamp-microwave         # Beko microwave + grill combi
  - 41-suburb-basecamp-fridge            # Beko side-by-side fridge/freezer
  # Heating
  - daikin-fvxg50-nexura                 # Daikin Nexura floor-standing AC
  # Laundry
  - miele-wwd660                         # washer (Miele WWD 660 WCS TDos)
  - miele-twd660                         # dryer (Miele TWD 660 WP EcoSpeed)
  # Outdoor
  - 41-suburb-basecamp-bbq               # gas BBQ (deck)
features:
  - lake_views
  - mountain_views
  - garden
  - sunroom
  - laundry
  - dedicated_workspace
  - bbq
  - heat_pump  # Daikin Nexura (living room) + 2nd unit in hallway, owner-confirmed 2026-04-28
  - panel_heater  # owner-confirmed 2026-04-28
  - portable_heater  # owner-confirmed 2026-04-28
parking:
  spaces: 3
  type: driveway
  garage: false
  garage_remote: false

# Pre-Airbnb-onboarding access pattern (April 2026): door open on arrival,
# physical key on the kitchen bench. Smart lock will become the long-term
# method once commissioning is finished.
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: keyless_open
  instructions: >
    The front door will be unlocked when you arrive. A key is left on the
    kitchen bench — please use it to lock the home whenever you go out and
    again at checkout, and leave the key on the kitchen bench when you
    leave.
check_out:
  time: '10:00'
wifi:
  network: BaseCamp
  password: ZoeZoe23
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'External security cameras facing street' per listing.md
  noise_monitor: true  # 'Noise monitor in main living area' per listing.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: strict
  instant_bookable: true
pricing:
  base_nightly: 650.0
  cleaning_fee: 300.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        Hillside section — driveway and outdoor stairs become slippery in
        wet or icy conditions. Use caution and fit snow chains if road
        conditions warrant.
      severity: minor
    - description: >
        Sunroom is glass-roofed — children should not climb on furniture
        beneath the glass.
      severity: minor
    - description: >
        BBQ on the deck — risk of grease fire. Keep clean, monitor while
        in use, and ensure fully extinguished after use.
      severity: minor

  house_rules:
    - category: shoes
      heading: Shoes
      bullets:
        - Please remove your shoes inside to help keep the home clean.
    - category: parking
      heading: Parking
      bullets:
        - Free off-street parking on the driveway for up to 3 vehicles.
        - Use only the parking spaces provided.
    - category: keys
      heading: Keys & Access
      bullets:
        - The front door will be unlocked when you arrive. A key is left
          on the kitchen bench.
        - Use the key to lock the home whenever you go out, and again at
          checkout.
        - At checkout, leave the key on the kitchen bench.

  access:
    front_door: >
      The front door will be unlocked on your arrival. A key is left on
      the kitchen bench — please use it to lock the home whenever you go
      out and again at checkout. Leave the key on the kitchen bench when
      you depart.
    back_door: ''
    garage: ''
    other: ''

  notes:
    - Property is in active commissioning (April 2026) — please contact
      the host promptly with any defects or operational issues so they
      can be logged with the project team.
