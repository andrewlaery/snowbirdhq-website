features: []
parking:
  spaces: 4
  type: driveway
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    Self check-in via the front-door smart lock. Your unique access code is
    sent via the booking platform 24 hours before arrival. If the code does
    not work at check-in time, contact the host — codes occasionally need
    remote re-activation.
check_out:
  time: '10:00'
wifi:
  network: SnowbirdQT
  password: Namaste99
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'CCTV outside property' per ota-manager booking_specific
  noise_monitor: true  # Minut noise monitor per owner.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: false
pricing:
  base_nightly: 1000.0
  cleaning_fee: 500.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        Driveway has blind areas when manoeuvring vehicles. Use extreme
        caution and have another person watch for children if needed.
      severity: minor
    - description: >
        Large unfenced drop-off areas in various parts of the garden. Don't
        leave children unsupervised; familiarise yourself with the
        surrounding area on arrival.
      severity: minor
    - description: >
        Stairwell — refrain young children from playing on the stairs;
        risk of fall causing injury.
      severity: minor
    - description: >
        Driveway and outdoor stairs become very icy after snow as freeze
        and thaw action occurs. Use the driveway with caution; fit snow
        chains if road conditions warrant.
      severity: minor
    - description: >
        Bathtubs / spa bath — do not leave young children unsupervised
        when full of water. Drain immediately after use.
      severity: minor
    - description: >
        BBQ on the deck — risk of grease fire. Keep clean, monitor while
        in use, and ensure fully extinguished after use.
      severity: minor
    - description: >
        Wood log fire — burn risk for unsupervised children. Follow the
        operating instructions in the compendium.
      severity: minor
    - description: >
        Windows / sliders — do not leave young children unattended in
        rooms where they can easily access them.
      severity: minor

  house_rules:
    - category: parking
      heading: Parking
      bullets:
        - Off-street parking on the driveway only — please park in the spaces provided.
        - Driveway + garage accommodate up to 4 vehicles.
    - category: spa-pool
      heading: Spa Pool / Hot Tub
      bullets:
        - Use the plastic key (kept with the garage door remote) to unlock the spa cover.
        - Shower before entering to keep the water clean.
        - Only chlorine may be added — no bubbles, foaming agents, or other substances.
        - No food, beverages, or glass items in or near the spa.
        - Replace the spa cover after use.
        - Use is at your own risk; supervise children at all times and avoid use under the influence.
    - category: keys-remotes
      heading: Keys & Remotes
      bullets:
        - At checkout, leave all access keys and the garage remote on the kitchen bench.
        - There will be a charge for any lost key or garage remote.

  access:
    front_door: >
      Self check-in via smart lock. Your unique access code is sent via the
      booking platform 24 hours before arrival.
    garage: 1 garage remote provided. Bring it inside at checkout.
    back_door: ''
    other: >
      Spa pool cover plastic key is supplied with the garage remote.

  notes:
    - The house alarm is not in operation during your stay.
    - First aid kit is in the kitchen pantry (LHS upper shelf).
    - Fire extinguisher is under the kitchen sink.
    - Gas shutoff valve is on the RHS of the entrance stairwell, garage side.
    - In an emergency, exit via the front door. Assembly point is outside the garage in the driveway.
