exceptions:
  hazards:
    - description: 室外楼梯——从停车区到公寓需走两段楼梯。携带行李时请多加注意；路面潮湿或结冰时务必小心慢行。
      severity: minor
    - description: 阳台——位于高层，下方即为公寓楼群，请注意安全。
      severity: minor
    - description: 毗邻在建工地（预计2026年底竣工）——通往垃圾桶的小路可能不平整或受施工影响；工作日白天约07:45至18:00有大型机械及打桩作业，噪音较大。耳塞可在市区的 Life Pharmacy Wilkinsons 购买。
      severity: minor
    - description: 道路交通——公寓朝向弗兰克顿路，卧室内可听到交通噪音（双层玻璃有所隔音，但无法完全屏蔽）。睡眠较浅的客人建议自备耳塞。
      severity: info
    - description: 航线噪音——房源位于皇后镇机场航线正下方，白天偶有飞机经过产生噪音。
      severity: info
  house_rules:
    - category: parking
      heading: 停车
      bullets:
        - "**专属车位6A** 为本公寓专用，免费使用，位于台阶下方。"
        - 如您抵达时发现6A被他人占用，请告知我们，可暂时使用其他空闲车位。
        - "**市区停车**：湖滨免费停车位（数量有限）；Camp Street 和 Man Street 有收费停车位；Man Street 部分路段免费停车（请留意蓝色标牌上的时间限制）。"
        - "**临时/白天停车**：Goldfield Heights 路段不限时免费停车。"
    - category: body-corporate
      heading: 业主委员会规定
      bullets:
        - "**禁止在阳台晾晒衣物**——业主委员会规定。请使用室内晾衣架，或公寓楼群内独立楼栋中的共用干衣机。"
        - "**禁止在阳台吸烟或使用电子烟**——业主委员会规定（室内全面禁烟规定同样适用）。"
    - category: rubbish-recycling
      heading: 垃圾与回收
      bullets:
        - 垃圾桶位于公寓楼群内——具体位置请参阅厨房桌上的黑色手册。
        - 已为您准备绿色垃圾袋。
        - "**本公寓楼群已不再提供回收设施**——请将所有废弃物投入一般垃圾桶。"
    - category: parcel-delivery
      heading: 包裹收件
      bullets:
        - "如需在入住期间收取包裹，请使用以下地址：**Mountain Club, 85 Beach Street, Queenstown 9300**（收件人填写 **SnowbirdHQ**）。"
        - 此举可避免快递员将包裹遗留在开放式公寓区域。
  access:
    front_door: >
      第一步——从停车场出发：找到专属车位6A，走右侧台阶，再沿第二段台阶向上至阳台。

      第二步——找到您的房间：到达阳台后，6A为右手边第一扇门。

      第三步——取钥匙：密码箱安装在前门右侧。输入您在抵达前两天收到的门禁密码（请确认数字对齐），然后向下拉动滑槽取出钥匙。同一把钥匙可开启前门和阳台门。
    back_door: ''
    garage: ''
    other: ''
  notes:
    - 入住期间公寓警报系统暂停使用。
    - 室内已安装烟雾探测器和灭火器。
    - 如遇紧急情况，请从前门离开并沿两段楼梯向下撤离。集合点位于停车场内距建筑物安全距离处。
    - 厨房桌上的黑色手册内含 Wi-Fi 信息、电器使用说明及垃圾桶位置。
    - "**厨房桌上的欢迎礼品：** 为您准备了 Boat Shed Cafe 的免费咖啡券及 Canyon 啤酒券——请尽情享用。"
    - "**施工情况说明：** 毗邻公寓楼正在建设中（预计2026年底竣工）。工作日白天07:45至18:00噪音较大；施工工地从阳台可见，并部分遮挡了湖景一侧的视野。"
  usage_sections:
  - category: internet
    heading: 网络 / Wi-Fi
    body: >
      网络名称和密码见上方快速参考。调制解调器位于电视右侧、灰色角落椅下方——如遇网络连接问题，可尝试重启设备。Wi-Fi 信息也可在厨房桌上的黑色手册中查阅。

  - category: heating
    heading: 供暖
    body: |
      - **热泵**（客厅）：遥控操作——可用于制热和制冷。寒冷天气请关闭门窗。
      - **卧室衣柜内的踢脚线暖气**——为卧室提供额外供暖。
      - 卧室内可听到道路交通噪音（朝向弗兰克顿路）。双层玻璃有所隔音，但无法完全屏蔽——睡眠较浅的客人可使用耳塞或白噪音应用程序。

  - category: location
    heading: 周边出行
    body: |
      - 路对面即有公交车站（Connectabus——约10分钟可达皇后镇市中心）。
      - 皇后镇机场约10分钟车程。
      - 沿湖滨步行至附近咖啡馆及 Cargo Brewery：约15分钟。
      - 步行至皇后镇市中心：沿路边人行道约45至60分钟。湖滨步道目前暂时关闭。
      - 打车（Uber）至市中心约需15至20纽西兰元。

  - category: appliances
    heading: 电器使用说明
    body: |
      - **洗衣机**（上开盖式，位于浴室）：房内无烘干机——已为您提供晾衣架。公寓楼群内的独立楼栋设有投币式共用干衣机。
      - **燃气灶**：正常操作使用。
      - **电烤箱**：厨房右侧墙上的总电源开关必须处于开启状态，否则烤箱将无法加热。请注意烧烤模式标签已磨损脱落。
      - **热泵**：遥控操作（制热及制冷），请在客厅使用。
      - **踢脚线暖气**：位于卧室衣柜内——用于卧室额外供暖。
      - **熨斗及烫衣板**：存放于浴室内。
      - **电视**：Freeview 电视棒连接至 HDMI 1。共有两个遥控器——较大的遥控器用于开机及切换信号源（按"信号源"→ HDMI 1）；较小的遥控器用于 Freeview 及 Netflix 操作。
      - **吸尘器**：位于玻璃推拉阳台门旁。
