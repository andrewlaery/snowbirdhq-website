  hazards: []

  house_rules:
    - category: parking
      heading: 停车
      bullets:
        - 仅提供一个路外停车位，位于车道内。
        - 请将车停在主屋右侧，空调外机旁。
        - 请勿堵塞储物棚通道。
    - category: capacity
      heading: 入住人数
      bullets:
        - 最多入住2位宾客，严格执行。
        - 沙发不适合用于睡眠。

  access:
    front_door: >
      密码锁箱位于室外水槽旁，沿公寓外墙绕过储物棚即可找到。密码 1001（亦会在抵达前3天通过预订平台发送给您）。
    back_door: ''
    garage: ''
    other: >
      主屋门口另设有第二个密码锁箱——请务必确认您使用的是公寓专属锁箱。请从街道找到 #100 信箱，沿车道进入。

  notes:
    - 房东（Paddy & Bethan）居住在隔壁主屋，如有任何需要，可通过预订平台联系他们。
    - 单层公寓，面积51平方米，一卧室，采光充足。
    - 婴儿床和儿童高脚椅存放于橱柜内。
    - 衣柜内备有额外毯子。
    - 公寓内自来水可直接饮用。
    - "公寓提供两辆自行车及头盔，供您免费使用——悬挂于入口处。在房源内无需上锁，骑入市区时请锁好。车锁密码：**1990**。如需充气，备有打气筒（轮胎可能会随时间自然漏气）。推荐路线：沿河骑行至箭镇，或沿自行车道骑行前往皇后镇。"
    - 如您较晚抵达，请提前告知房东您的预计到达时间，他们可为您开启室外照明并提前开暖气。
    - 如遇停电，请查看 Aurora Energy 皇后镇停电信息页面。
    - "退房须知：请启动洗碗机；垃圾请分类投入**蓝盖可回收垃圾桶**或**红盖普通垃圾桶**；用过的毛巾请留在淋浴间地板上；关好所有门窗；**将钥匙归还至公寓密码锁箱（非主屋锁箱）**。"

  usage_sections:
    - category: internet
      heading: 网络 / Wi-Fi
      body: |
        网络名称及密码已在上方"快速参考"中列出。
        光纤网速 500/100 Mbps（Lightspeed）。如有远程办公需求，可联系房东借用10米网线。

    - category: kitchen
      heading: 厨房
      body: |
        厨房配备齐全：冰箱、冰柜、**燃气灶（4个灶头）**、电烤箱、Fisher & Paykel 抽屉式洗碗机、电热水壶、烤面包机、锅具、平底锅及不锈钢炊具。提供速溶咖啡和滴滤咖啡，不提供意式咖啡机或法压壶。

        **燃气灶/烤箱总电源开关：** 位于**洗衣机上方**。使用燃气灶或烤箱前，必须先打开此开关。若点火不成功，请首先检查此开关——这是"燃气无法使用"问题的最常见原因。

        **燃气灶点火方法：** 按住灶头旋钮向下旋转点火，火焰点燃后继续按住数秒，待热电偶稳定保持气阀开启状态后再松手。

        **烤箱点火方法：** 确认总电源开关已开启后，同时按住时钟图标键及其旁边的功能键数秒，直至显示屏亮起并停止闪烁。随后设置烹饪模式和温度。关闭烤箱后，冷却风扇可能会继续运转数分钟，此为正常现象。

        **洗碗机（Fisher & Paykel 抽屉式）：** 拉开抽屉手柄——餐具篮位于中间，盘子和杯子置于架槽内。将洗涤片放入抽屉内前侧的分配槽中。洗涤程序（节能 / 标准 / 快速 / 强效）可在前面板选择。用力关好抽屉，按下启动键。退房前请运行一次洗碗机。**F1 报错**表示检测到漏水——请立即关闭墙壁插座电源，并联系房东，切勿反复启动程序。

    - category: heating
      heading: 暖气与制冷
      body: |
        **冷暖两用热泵/空调** ——可供暖及制冷。遥控器放置于空调旁或餐桌上。可选模式：制热 / 制冷 / 除湿 / 自动 / 送风。

        冬季及晚间抵达时，房东会提前为公寓预热——您进门时应已感受到温暖。

        **晴天小贴士：** 白天请打开百叶窗——阳光透过推拉门照入室内，自然升温，无需空调全力运转。

    - category: workspace
      heading: 办公区域
      body: |
        厨房旁的"小书房"可作为工作区使用——配有书桌（1500 mm × 750 mm）。

    - category: location
      heading: 出行指南
      body: |
        - 下绍托弗（Lower Shotover）——宁静、阳光充足，坐拥山景。
        - 皇后镇机场——驾车约10至15分钟。出租车费用约50至70纽西兰元。
        - 皇后镇市中心——驾车约10分钟。
        - 公交站——沿街步行约5分钟。厨房抽屉内可能备有 Bee 卡。
        - 5 Mile 购物中心——驾车约7分钟（手机店、零售商铺）。
        - 皇后镇有 Uber 可用。
        - 小型超市——步行约7分钟。
        - Frank's Coffee / 11th Avenue by Franks——沿山坡步行即达。
        - 箭镇——驾车约10分钟（咖啡馆、商店、历史景点）。
        - Ayrburn——位于箭镇附近，推荐用餐之选。

    - category: appliances
      heading: 电器使用说明
      body: |
        - **洗衣机**：提供环保洗衣液。在前面板拨盘选择洗涤程序，加入洗衣液后按启动键。室内备有晾衣架可供自然晾干。（注意：燃气灶和烤箱的总电源开关位于**洗衣机上方**。）
        - **烘干机**：公寓内配有烘干机（旧版房源说明中提到"无烘干机"，该信息已过时）。
        - **智能电视**：提供免费 Netflix——请使用访客专属账户，请勿登录您自己的账户。电视设有 USB 接口，无 DVD 播放器。标准遥控器可控制电源、音量及信号源切换。
        - **热泵 / 空调** ——详细使用说明请参阅上方"暖气与制冷"部分。
