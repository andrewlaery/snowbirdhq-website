appliances: []  # TODO: build appliance-library MDX components for:
                # touch induction hob, electric oven, dishwasher,
                # 2× Daikin heat pumps (lounge + master), washing machine,
                # chest freezer, TV.
                # Operational notes captured in exceptions.usage_sections.
features:
  - lake_views
  - mountain_views
  - deck
  - heat_pump
  - garage
  - laundry
parking:
  spaces: 1
  type: garage
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: lockbox
  instructions: >
    请通过安装在房屋左侧木栅栏上的密码锁自助办理入住。沿房屋左侧台阶走上去，密码锁内含前门钥匙及车库遥控器。密码为
    1010，同时将在入住前24小时通过预订平台发送给您。
check_out:
  time: '10:00'
wifi:
  network: TP-Link_F8D6
  password: FYH25Na3
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: 07:00
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false
booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: true
pricing:
  base_nightly: 241.0
  cleaning_fee: 300.0
  extra_person_fee: 0.0
  weekly_discount: 0.9
  monthly_discount: 0.85
  currency: NZD
exceptions:
  hazards:
    - description: >
        车道坡度较陡，冬季可能结冰或湿滑。车库内备有一大袋白色融雪盐，可供除冰使用。
      severity: minor
    - description: >
        房屋内部设有连接上下两层的楼梯（铺有地毯，配有扶手），请注意脚下安全。
      severity: info
    - description: >
        车库门向外开启——开门前请确认门前没有停放任何车辆。
      severity: minor

  house_rules:
    - category: parking
      heading: 停车说明
      bullets:
        - 车库配有遥控门，遥控器存放于密码锁内及厨房桌面上。
        - 车库仅适合小型或中型车辆——7座车、SUV及底盘较低的车辆无法进入，强行驶入可能造成刮擦。
        - 较大型车辆——大多数房客选择停在车库门前。
        - 车道旁平行道路亦可路边停车。
        - 车库门向外开启——开门前请先确认周围无障碍物。

  access:
    front_door: >
      沿房屋左侧台阶走上去，密码锁安装在左侧木栅栏上，密码为
      1010。钥匙可开启正对密码锁的前门。
    back_door: ''
    garage: >
      共有两个遥控器——一个存放于密码锁内/厨房桌面上，另一个由物业管家保管。也可在车库内通过客厅通往车库楼梯底部的墙壁开关开启车库门。
    other: ''

  notes:
    - 房屋使用手册为厨房桌面上的黑色小册子，内含Wi-Fi信息、家电使用说明及房源详情。
    - 进入前门后左手边第一个柜子为热水器柜——内有额外清洁用品、垃圾袋及其他生活物资。
    - Wi-Fi信号增强器位于楼上单人床/大床房间内——请勿拔除插头。
    - 泛光灯开关位于通往车库的门旁（可照亮车道区域）。
