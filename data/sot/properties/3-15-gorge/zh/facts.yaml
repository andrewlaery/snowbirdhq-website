    通过前门数字锁自助入住（2026年2月安装，已替换原有实体钥匙/密码锁盒）。您的入住密码将在抵达前24小时通过预订平台发送。请注意：Whistler Apartments 前台与本房源无任何关联——如有任何问题，请通过预订平台与我们联系。
