appliances: []  # TODO: build appliance-library MDX components for:
                # touch induction hob, electric oven, dishwasher,
                # 2× Daikin heat pumps (lounge + master), washing machine,
                # chest freezer, TV.
                # Operational notes captured in exceptions.usage_sections.
features:
  - lake_views
  - mountain_views
  - deck
  - heat_pump
  - garage
  - laundry
parking:
  spaces: 1
  type: garage
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: lockbox
  instructions: >
    自助入住，密码箱安装在房屋左侧的木围栏上。请沿房屋左侧台阶向上走。密码箱内含前门钥匙和车库遥控器。密码1010将在抵达前24小时通过预订平台发送给您。
check_out:
  time: '10:00'
wifi:
  network: TP-Link_F8D6
  password: FYH25Na3
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: 07:00
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false
booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: true
pricing:
  base_nightly: 241.0
  cleaning_fee: 300.0
  extra_person_fee: 0.0
  weekly_discount: 0.9
  monthly_discount: 0.85
  currency: NZD
exceptions:
  hazards:
    - description: >
        车道坡度较陡，冬季可能结冰或湿滑。车库内备有一大袋白色除冰盐，可供使用。
      severity: minor
    - description: >
        室内楼梯（铺有地毯，设有扶手）连接上下两层，请注意脚下安全。
      severity: info
    - description: >
        车库门向外开启——开门前请确认门前无车辆停放，以免碰撞。
      severity: minor

  house_rules:
    - category: parking
      heading: 停车须知
      bullets:
        - 车库配备遥控门（遥控器在密码箱内及厨房桌上各一个）。
        - 车库仅适合小型或中型车辆——七座车、SUV及低底盘车辆无法入库，强行驶入可能造成刮擦。
        - 较大车辆——大多数客人选择停在车库门前。
        - 沿车道平行的道路亦可路边停车。
        - 车库门向外开启——开门前请先清空门前区域。

  access:
    front_door: >
      请沿房屋左侧台阶向上走。密码箱安装在左侧木围栏上，密码1010。钥匙可直接打开密码箱正对面的门。
    back_door: ''
    garage: >
      共有两个遥控器——一个在密码箱内/厨房桌上，另一个由房产管理员保管。也可在室内通过客厅通往车库的台阶底部墙壁开关操作车库门。
    other: ''

  notes:
    - 房屋使用手册为厨房桌上的黑色小册子，内含Wi-Fi信息、电器说明及房源详情。
    - 进入前门后左手边第一个柜子为热水器柜——内有额外清洁用品、垃圾袋及其他日用品。
    - Wi-Fi信号增强器位于楼上单人床/大床房间内——请勿拔插头。
    - 泛光灯开关位于通往车库的门旁（可照亮车道区域）。

  usage_sections:
    - category: internet
      heading: 网络 / Wi-Fi
      body: |
        网络名称及密码见上方快速参考栏。调制解调器位于餐桌旁；信号增强器安装在楼上单人床/大床房间内——请勿拔插头。

    - category: heating
      heading: 暖气
      body: |
        **热泵**（大金 Daikin）负责为**客厅**和**主卧**（卧室一）供暖。每台热泵均配有独立遥控器——客厅遥控器挂在厨房墙壁上，主卧遥控器放在机组下方。建议设置：23°C，持续运行。

        **Stiebel Eltron 电暖板**安装在**卧室二**和**卧室三**。每块电暖板均设有独立墙壁开关（开/关）及面板上的温度旋钮。

        寒冷天气请关闭门窗以保持室内温度。在较凉的天气外出时，请确保关好所有门窗，以便回来时室内仍保持舒适温度。退房时请关闭所有电暖板。

    - category: outdoor
      heading: 户外空间
      body: |
        宽阔的露台，可饱览山脉与湖泊的全景。花园修缮整洁，环境优美。

    - category: location
      heading: 周边出行
      body: |
        - 位于弗兰克顿路与5 Mile购物区之间。
        - 驾车约7分钟可达皇后镇市中心。
        - 皇后镇机场——驾车约5分钟。

    - category: appliances
      heading: 电器使用说明
      body: |
        - **电磁炉**（触控式）：点击选择加热区域，再通过滑块调节温度。
        - **电烤箱**：需先打开定时器，烤箱才能加热。电源开关位于厨房右侧烤面包机旁的小柜内。
        - **洗碗机**：建议使用节能模式，洗碗块放在水槽下方。
        - **热泵**（大金 Daikin，客厅 + 主卧）：客厅遥控器挂在厨房墙壁上；主卧遥控器放在机组下方。建议设置：23°C，持续运行。
        - **洗衣机**：位于厨房旁的洗衣间内。房内无烘干机。
        - **卧式冰柜**：放置在车库内，可提供额外冷冻储存空间。
        - **电视**：仅支持Freeview免费频道——不含Sky Sport或其他付费电视频道。
