features: []
parking:
  spaces: 4
  type: driveway
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    通过前门智能门锁自助入住。您的专属访问码将在抵达前24小时通过预订平台发送。
    如果访问码在入住时无法使用，请联系房东——访问码偶尔需要远程重新激活。
check_out:
  time: '10:00'
wifi:
  network: SnowbirdQT
  password: Namaste99
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'CCTV outside property' per ota-manager booking_specific
  noise_monitor: true  # Minut noise monitor per owner.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: false
pricing:
  base_nightly: 1000.0
  cleaning_fee: 500.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        车道在车辆倒车时存在视野盲区，请格外小心，如有需要请安排他人留意儿童安全。
      severity: minor
    - description: >
        花园多处存在大面积无围栏陡降区域。请勿让儿童单独在此活动；抵达后请自行熟悉周边环境。
      severity: minor
    - description: >
        楼梯间——请勿让幼儿在楼梯上玩耍，以免跌落受伤。
      severity: minor
    - description: >
        车道及户外台阶在下雪后因反复冻融极易结冰，请谨慎使用车道；如路况需要，请为车辆安装防滑链。
      severity: minor
    - description: >
        浴缸／水疗浴缸——当浴缸盛满水时，请勿让幼儿单独使用。使用完毕后请立即放水。
      severity: minor
    - description: >
        甲板上的烧烤炉——存在油脂起火风险。请保持清洁，使用时全程看管，并确保使用后完全熄灭。
      severity: minor
    - description: >
        木柴壁炉——幼儿单独接触存在烫伤风险。请遵照房屋手册中的操作说明使用。
      severity: minor
    - description: >
        窗户／推拉门——请勿将幼儿单独留在可轻易触及窗户或推拉门的房间内。
      severity: minor

  house_rules:
    - category: parking
      heading: 停车须知
      bullets:
        - 仅限在车道上的指定位置停放车辆，请勿在路边停车。
        - 车道及车库共可停放最多4辆车。
    - category: spa-pool
      heading: 水疗泳池／热水浴缸
      bullets:
        - 请使用随车库遥控器一同存放的塑料钥匙解锁水疗池盖。
        - 入池前请先淋浴，以保持水质洁净。
        - 仅可添加氯消毒剂——请勿加入泡泡浴液、发泡剂或其他任何物质。
        - 请勿将食物、饮料或玻璃器皿带入水疗池内或附近区域。
        - 使用完毕后请盖回水疗池盖。
        - 使用须自负风险；请全程看管儿童，并避免在饮酒后使用。
    - category: keys-remotes
      heading: 钥匙与遥控器
      bullets:
        - 退房时，请将所有门禁钥匙及车库遥控器放在厨房台面上。
        - 如有钥匙或车库遥控器丢失，将收取相应赔偿费用。

  access:
    front_door: >
      通过智能门锁自助入住。您的专属访问码将在抵达前24小时通过预订平台发送。
    garage: 提供1个车库遥控器。退房时请将其带至室内放好。
    back_door: ''
    other: >
      水疗池盖塑料钥匙随车库遥控器一同提供。

  notes:
    - 房屋警报系统在您入住期间不运行。
    - 急救箱位于厨房食品柜中（左侧上层搁板）。
    - 灭火器位于厨房水槽下方。
    - 燃气截止阀位于入口楼梯间右侧靠车库一侧。
    - 紧急情况下，请从前门撤离。集合点位于车库外的车道处。
