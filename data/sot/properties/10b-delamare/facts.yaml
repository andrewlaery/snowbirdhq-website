      Walk up the steps to the LEFT of the house. Lockbox is mounted on
      the wooden fence on the left-hand side. Code 1010. The key opens
      the door directly opposite the lockbox.
    back_door: ''
    garage: >
      Two remotes — one in the lockbox / on the kitchen table, one with
      the property manager. Open from inside via the wall switches at
      the bottom of the steps leading from the living area to the garage.
    other: ''

  notes:
    - House manual is the black booklet on the kitchen table — Wi-Fi info,
      appliance instructions, property details.
    - Boiler cupboard is first on the left as you come in the front door —
      contains extra cleaning products, trash bags, and supplies.
    - Wi-Fi booster is upstairs in the single-bed/king room — please do
      not unplug.
    - Flood-light switch is by the door leading to the garage (illuminates
      the driveway area).

  usage_sections:
    - category: internet
      heading: Internet / Wi-Fi
      body: |
        Network and password are shown above in the Quick Reference. The
        modem is next to the dining table; a booster lives upstairs in
        the single-bed/king room — please do not unplug.

    - category: heating
      heading: Heating
      body: |
        Heat pump heating throughout — operate via the wall controllers.
        Keep doors and windows closed in cooler weather.

    - category: outdoor
      heading: Outdoor
      body: |
        Grand outdoor deck with panoramic mountain and lake views.
        Manicured garden.

    - category: location
      heading: Getting Around
      body: |
        - Located between Frankton Road and the 5 Mile shopping area.
        - ~7 minutes by car to the Queenstown town centre.
        - Queenstown Airport — ~5 minutes by car.
