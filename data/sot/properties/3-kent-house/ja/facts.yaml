# yaml-language-server: $schema=../_schemas/facts.json
schema_version: 1
slug: 3-kent-house

# 3-Kent-House = upstairs apartment (4 bedrooms).
# Insurance + Resource Consent capped at 8 guests. The "premium" listing.
# Upstairs has best views.
capacity:
  max_guests: 8
  max_adults: 8
  min_age_lead_guest: 25

bedrooms:
  - name: '寝室1（マスター）'
    bed: TBC
    ensuite: false
    notes: '次回の確認時にベッド構成を決定いたします。'
  - name: '寝室2'
    bed: TBC
    ensuite: false
  - name: '寝室3'
    bed: TBC
    ensuite: false
  - name: '寝室4'
    bed: TBC
    ensuite: false
bedroom_count: 4
bed_count: 4  # Conservative — actual layout TBC
bathroom_count: TBC
beds_summary: '確認中 — オーナーによる確認作業が完了しておりません'

amenities:
  - Wi-Fi
  - 無料駐車場
  - 床暖房（全室）
  - 三菱シーリングヒートポンプ（ダイニングルーム）
  - リンナイ ガス暖炉
  - Fisher & Paykel クックトップ
  - Electrolux ダブルオーブン（セルフクリーニング機能付き）
  - Fisher & Paykel DishDrawer
  - Samsung 洗濯機
  - Fisher & Paykel 7kg 乾燥機（非排気式）
