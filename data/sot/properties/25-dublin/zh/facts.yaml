features: []
parking:
  spaces: 4
  type: driveway
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    可通过前门智能门锁自助入住。您的专属访问密码将在抵达前 24 小时通过预订平台发送。
    若入住时密码无法使用，请联系房东——密码偶尔需要远程重新激活。
check_out:
  time: '10:00'
wifi:
  network: SnowbirdQT
  password: Namaste99
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'CCTV outside property' per ota-manager booking_specific
  noise_monitor: true  # Minut noise monitor per owner.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: false
pricing:
  base_nightly: 1000.0
  cleaning_fee: 500.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        车道在驾车移动时存在盲区，请格外小心；如有儿童在场，请安排另一名成人在旁监看。
      severity: minor
    - description: >
        花园多处存在较大的无围栏陡降区域，请勿让儿童独自玩耍；抵达后请先熟悉周边环境。
      severity: minor
    - description: >
        楼梯间——请避免幼童在楼梯上玩耍，以防跌落受伤。
      severity: minor
    - description: >
        降雪后，因反复冻融，车道及户外台阶会变得非常湿滑。驾车时请格外谨慎；如路况需要，请为车辆安装雪链。
      severity: minor
    - description: >
        浴缸及水疗浴缸——注水后请勿让幼童独处。使用完毕后请立即放水。
      severity: minor
    - description: >
        甲板上的烧烤炉——存在油脂起火风险。请保持清洁，使用期间全程看管，并确保使用后彻底熄灭。
      severity: minor
    - description: >
        燃木壁炉——存在幼童无人看管时被烫伤的风险。请遵照使用手册中的操作说明。
      severity: minor
    - description: >
        窗户/推拉门——请勿将幼童单独留在可轻易触及门窗的房间内。
      severity: minor

  house_rules:
    - category: parking
      heading: 停车
      bullets:
        - 仅限在车道上进行场外停车——请将车辆停放在指定车位。
        - 车道与车库合计可容纳最多 4 辆车。
    - category: spa-pool
      heading: 水疗池/热水浴缸
      bullets:
        - 使用水疗池须自担风险。
        - "**成人必须全程看管儿童**，无论其在水疗池内还是池边。"
        - "**不使用时请锁好水疗池盖**——水疗池钥匙位置及盖子操作方法详见《使用说明》。"
        - 入池前请先淋浴，以保持水质清洁。
        - "**仅限使用氯消毒剂**——请勿添加泡泡浴液、发泡剂、浴盐或其他任何物质。"
        - "**水疗池内及周边禁止携带食物、饮品或玻璃器皿。**"
        - 饮酒后请勿使用水疗池。

    - category: keys-remotes
      heading: 钥匙与遥控器
      bullets:
        - 退房时，请将所有门禁钥匙及车库遥控器放在厨房操作台上。
        - 如有钥匙或车库遥控器丢失，将收取相应费用。

    - category: wood-burner
      heading: 工作室燃木炉
      bullets:
        - "**切勿让燃木炉在无人看管的情况下运行**——炉火燃烧期间，工作室内必须始终有成人在场。"
        - "**炉火燃烧时，成人必须全程看管儿童**；炉门、玻璃及周围部件温度极高。"
        - 仅限使用所提供的木柴和引火物——请勿燃烧垃圾、经处理的木材或助燃剂。
        - "**切勿将炉灰倒入垃圾桶或任何通风处**——余烬可能复燃并引发火灾。"
        - 操作说明（点火、炉门操作、灰烬冷却）详见**《使用说明》→ 工作室燃木炉**。

    - category: gas-fire
      heading: 上层燃气壁炉
      bullets:
        - 仅在房间内有人时使用，不建议作为主要供暖热源。
        - "**燃气壁炉开启时，成人必须全程看管儿童**；玻璃前面板温度极高。"
        - 请勿将布料、纸张或其他易燃物品放置在壁炉前方 1 米范围内。
        - 操作说明（点火、定时器、关闭）详见**《使用说明》→ 燃气壁炉**。

    - category: bbq
      heading: 户外烧烤炉
      bullets:
        - "**仅限在花园开放区域户外使用**——严禁在遮盖物下或车库内使用。"
        - 烧烤炉点燃期间，成人必须全程看管儿童。
        - "**烧烤炉点燃后请勿离开，须全程看管。**"
        - 操作说明（点火、炉盖顺序、清洁、关闭）详见**《使用说明》→ Weber Q3200 烧烤炉**。

    - category: insinkerator
      heading: Insinkerator 食物垃圾处理器
      bullets:
        - "**切勿将手伸入处理器内**，即使已关闭电源。"
        - "**严禁投入**：骨头、果核、油脂、蛋壳、咖啡渣、纤维蔬菜（如芹菜、玉米皮）或非食物类物品——这些物品会导致设备卡塞或损坏，并可能产生维修费用。"
        - 操作说明（冷水使用、开关位置、卡塞处理）详见**《使用说明》→ Insinkerator 处理器**。

  access:
    front_door: >
      可通过智能门锁自助入住。您的专属访问密码将在抵达前 24 小时通过预订平台发送。
    garage: 随行提供 1 个车库遥控器，退房时请携带归还。
    back_door: ''
    other: >
      水疗池盖塑料钥匙随车库遥控器一同提供。

  notes:
    - 房屋警报系统在您入住期间不启用。
    - 急救箱位于厨房食品储藏柜内（左侧上层搁板）。
    - 灭火器位于厨房水槽下方。
    - 燃气截止阀位于入口楼梯间右侧（靠车库一侧）。
    - 紧急情况下，请从前门疏散。集合点在车库外的车道上。
