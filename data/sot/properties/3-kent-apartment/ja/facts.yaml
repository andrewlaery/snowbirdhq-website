# yaml-language-server: $schema=../_schemas/facts.json
schema_version: 1
slug: 3-kent-apartment

# 3-Kent-Apartment = downstairs apartment (2.5 bedrooms — converted double garage / engineer's
# workshop). Insurance + Resource Consent capped at 4 guests. The "0.5" is a windowless nook with
# extra bed for kids — no door. Floor-to-ceiling windows; backs onto Queenstown Hill walking track.
capacity:
  max_guests: 4
  max_adults: 4
  min_age_lead_guest: 25

bedrooms:
  - name: '寝室1'
    bed: queen
    ensuite: false
    notes: '次回の確認時にベッド構成を決定いたします。'
  - name: '寝室2'
    bed: queen
    ensuite: false
  - name: '追加ベッドスペース（「0.5」部屋）'
    bed: single
    ensuite: false
    notes: >
      窓のないスペースにシングルベッドを設置しております。お子様専用となり、ドアはございません。「2.5寝室」の表記における0.5としてカウントされており、完全に仕切られた寝室ではございません。
bedroom_count: 2.5
bed_count: 3  # Conservative — actual layout TBC
bathroom_count: TBC
beds_summary: '確認中 — オーナーによる現地確認待ちです（現在のGoodstaysリスティングにはクイーン＋クイーン＋シングルと記載）'

amenities:
  - Wi-Fi
  - 無料駐車場
  - 床暖房
  - ダイキン製ヒートポンプ（暖房・冷房対応）
  - ブランコ製クッキングトップ（IH）
  - ブランコ製オーブン
  - ボッシュ製食器洗い乾燥機
  - エレクトロラックス製洗濯機（EDC2075GDW）
  - エレクトロラックス製乾燥機
  - サムスン製テレビ
  - 床から天井までの大型窓
  - 山の眺望
  - ウォーキングトラックへのアクセス（クイーンズタウンヒル、庭から直結）

features:
  - underfloor_heating
  - heat_pump
  - garden
  - walking_track_access
  - mountain_views
  - large_windows  # Floor-to-ceiling

parking:
  spaces: 1
  type: '私道'
  garage: false
  garage_remote: false

check_in:
  start_time: '15:00'
  end_time: '22:00'
  method: '確認中'
  instructions: '確認中：各物件のチェックイン手順は、サービス開始前（2026-07-01）までに追加いたします'

check_out:
  time: '10:00'

wifi:
  network: 'Monkeymousewifi'
  password: 'bendalong'

house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 250
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false

booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: moderate
  instant_bookable: true

pricing:
  base_nightly: 0  # TBC
  cleaning_fee: 0
  extra_person_fee: 0
  weekly_discount: null
  monthly_discount: null
  currency: NZD

exceptions:
  hazards:
    - description: >
        こちらは2階建ての建物で、滞在中に上階のアパートメントに他のお客様がお泊まりになる場合がございます。階の間（コンクリートの床）に音が響くことがありますが、完全な防音ではございません。お互いへの配慮をお願いいたします。
      severity: minor
    - description: >
        床暖房は全室に設置されており、床面が温かくなっております。設定温度は20℃で、温度変化には約2日かかります。コントロールパネルの操作はご遠慮ください。
      severity: info
    - description: >
        裏庭からクイーンズタウンヒルのウォーキングトラックに直接アクセスできます。お子様は必ず保護者の方が付き添ってください。トラックは急勾配となっております。
      severity: minor
    - description: >
        追加ベッドスペース（「0.5」部屋）は窓がなく、ドアもございません。保護者のご判断のもと、年長のお子様のみご利用いただけます。完全に仕切られた寝室ではございません。
      severity: info
  house_rules:
    - category: amenity-rules
      heading: アメニティのご利用ルール（1階アパートメント）
      bullets:
        - "**床暖房は20℃に設定されており、調整はできません** — 温度が変化するまでに約2日かかります。"
        - "**アウトドアクッション**：夜間は室内にお持ちください。"
        - "**食器洗い乾燥機用洗剤**：備え付けの**専用粉末洗剤のみ**をお使いください — 液体洗剤を使用すると故障の原因となり、修理費用をご負担いただく場合がございます。"
        - "**乾燥機は非排気式です**：使用中はランドリールームの窓を開けて蒸気を逃がしてください。"
    - category: parking
      heading: 駐車場について
      bullets:
        - 敷地内の私道に駐車できます（1階・2階の両アパートメントが貸し出されている場合は共用となります）。
        - Kent Streetの路上駐車もご利用いただけます。

    - category: outdoor-noise
      heading: 屋外エリアの騒音について
      bullets:
        - "**屋外エリアは午後10時〜午前7時の間、ご利用をお控えください**（住宅街のため、ご近所へのご配慮をお願いいたします）。"
        - "**午後8時〜午前8時の間、屋外での音楽や拡声音はご遠慮ください。**"
        - "**違反の場合、利用規約に基づき$1,000の追加料金が発生します** — これはGoodstaysのガイドブックにおいて現在も適用されており、SnowbirdHQにおいても引き続き有効です。"
        - 特に夜間時間帯は、常に静かにお過ごしくださいますようお願いいたします。

    - category: rubbish-detail
      heading: ゴミ・リサイクルについて（物件固有のルール）
      bullets:
        - "割り当て：**週2枚の75L黒色ゴミ袋**、退去時にハウスキーピングが回収いたします。"
        - 自治体のゴミ箱は、ご滞在中は施錠されております。
        - キッチンのゴミ箱には白色のライナーをご使用ください — 白色の袋がいっぱいになりましたら、黒色のゴミ袋に入れてください。
        - リサイクル用の黒いオープントレーをご利用ください — 入れる前に**必ずすすいで**ください。
        - 少量のリサイクルは、キッチンカウンターやゴミ袋の横に置いていただいて構いません。
        - "**ゴミが多い場合**：**クイーンズタウン・トランスファーステーション（110 Glenda Drive, フランクトン）**にお持ちください（午前8時〜午後5時、年中無休；クリスマスデー、グッドフライデー、アンザックデーは休業）— **または**75Lの追加袋1枚につき$20（GST別）でハウスキーピングが回収いたします。"
  access:
    front_door: '確認中：各物件のアクセス手順は、サービス開始前（2026-07-01）までに追加いたします。'
    back_door: ''
    garage: ''
    other: ''
  notes:
    - "**消火器**は**キッチンシンク下**に設置されております。"
    - "**救急セット**は**キッチンシンク下**に設置されております。"
    - "**煙感知器**は各所に設置されております — 取り外しはご遠慮ください。"
    - "**ブレーカーボックス**は上階アパートメント内（1階、バスルーム向かいのコートルーム）にあります — 停電の際はホストまでご連絡ください。"
    - "**Wi-Fi中継器**は上階にあります — 電波が弱い場合は、一度Wi-Fiをオフにしてからオンに戻してください。最も強い電波源に自動で接続されます。"
    - "**電子レンジの取扱説明書**は**テレビキャビネットの一番上の引き出し**に入っております。"
    - "**オーブンの調理機能記号に関する取扱説明書**は**テレビキャビネットの一番上の引き出し**に入っております。"
    - "**クイーンズタウン空港から**：6.8km／約10分 — Sir Henry Wigley Dr → Lucas Pl → ラウンドアバウトを2番出口でSH6へ → Zサービスステーション付近のラウンドアバウトを1番出口でSH6A/Frankton Rdへ → Dublin Stを右折 → Hallenstein Stを最初の左折 → York Stを最初の右折 → Kent Stを最初の左折 → 右手2番目の私道へ。"
    - "**駐車場**：普通車1台のみ。共用私道の右側（1階入口に最も近い側）に駐車してください — 私道の通行を妨げないようご注意ください。"

# See data/sot/_appliances/3-kent-apartment-*.md (per the owner user guide):
# - Daikin heat pump (remote in cradle on wall next to main light switch — green ON button)
# - Blanco cooktop (induction; isolator left of hob, white square switch above GPO)
# - Blanco oven (isolator above GPO left of cooktop; manual in top draw of TV cabinet)
# - Bosch dishwasher (isolator bottom rear of left cupboard)
# - Kitchen extractor fan (isolator on wall left of sink, between GPO switches)
# - Electrolux EDC2075GDW washing machine
# - Electrolux dryer (non-vented — open laundry window)
# - Samsung TV (LIVE TV from menu)
appliances:
  # Tech (AV)
  - 3-kent-apartment-tv                    # Samsung
  # Heating
  - 3-kent-apartment-underfloor-heating    # 20°C constant, not adjustable
  # Climate
  - 3-kent-apartment-heat-pump             # Daikin (heat + cool); remote in wall cradle
  # Kitchen
  - 3-kent-apartment-cooktop               # Blanco induction
  - 3-kent-apartment-oven                  # Blanco (manual in TV cabinet top drawer)
  - 3-kent-apartment-dishwasher            # Bosch (TABLETS ONLY)
  - 3-kent-apartment-microwave             # Panasonic (manual in TV cabinet top drawer)
  - 3-kent-apartment-extractor-fan
  # Laundry
  - 3-kent-apartment-washer                # Electrolux EDC2075GDW (LIQUID OK)
  - 3-kent-apartment-dryer                 # Electrolux
