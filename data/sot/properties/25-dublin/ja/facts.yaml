exceptions:
  hazards:
    - description: >
        車両の切り返し時に死角が生じる箇所があります。十分にご注意いただき、
        お子様がいる場合は別の方に安全確認をお願いしてください。
      severity: minor
    - description: >
        庭の各所に柵のない急な段差・落下箇所があります。お子様を一人にしないよう
        ご注意いただき、到着後はお早めに周辺の状況をご確認ください。
      severity: minor
    - description: >
        階段付近では、小さなお子様が遊ばないようにしてください。転落による怪我の
        危険性があります。
      severity: minor
    - description: >
        雪が降った後、凍結と融解が繰り返されることでドライブウェイや屋外階段が
        非常に滑りやすくなります。ドライブウェイのご利用には十分ご注意いただき、
        路面状況によってはスノーチェーンをご装着ください。
      severity: minor
    - description: >
        浴槽・スパバスに水を張っている際は、小さなお子様を一人にしないでください。
        ご使用後はすぐに水を抜いてください。
      severity: minor
    - description: >
        デッキのバーベキューグリルは油火災の危険があります。常に清潔に保ち、
        使用中は目を離さず、使用後は完全に消火されていることをご確認ください。
      severity: minor
    - description: >
        薪暖炉は、小さなお子様が一人でいると火傷の危険があります。
        コンペンディアムに記載の取扱い説明に従ってご使用ください。
      severity: minor
    - description: >
        窓・スライドドアの近くに小さなお子様を一人で置かないようにしてください。
      severity: minor

  house_rules:
    - category: parking
      heading: 駐車場について
      bullets:
        - 駐車はドライブウェイの指定スペースのみをご利用ください。路上駐車はご遠慮ください。
        - ドライブウェイとガレージを合わせて最大4台まで駐車可能です。
    - category: spa-pool
      heading: スパプール・ホットタブについて
      bullets:
        - スパのカバーを開けるには、ガレージドアリモコンと一緒に保管されているプラスチック製キーをご使用ください。
        - 入る前にシャワーを浴びて、水質を清潔に保ってください。
        - 添加できるのは塩素のみです。泡立て剤・発泡剤・その他の物質は使用しないでください。
        - スパの中や近くで飲食物・ガラス製品をご使用にならないでください。
        - ご使用後はスパのカバーを元に戻してください。
        - ご利用はお客様自身の責任となります。お子様から目を離さず、飲酒後のご使用はお控えください。
    - category: keys-remotes
      heading: 鍵・リモコンについて
      bullets:
        - チェックアウトの際は、すべてのアクセスキーとガレージリモコンをキッチンのカウンターに置いてください。
        - 鍵またはガレージリモコンを紛失された場合は、費用を請求させていただきます。

  access:
    front_door: >
      スマートロックによるセルフチェックインです。お客様専用のアクセスコードは、
      ご到着の24時間前に予約プラットフォームを通じてお送りします。
    garage: ガレージリモコンを1台ご用意しています。チェックアウト時は室内にお持ちください。
    back_door: ''
    other: >
      スパプールカバー用のプラスチック製キーは、ガレージリモコンと一緒に保管されています。

  notes:
    - 滞在中、家屋の警報システムは作動しておりません。
    - 救急セットはキッチンのパントリー内（左側上段棚）にあります。
    - 消火器はキッチンのシンク下にあります。
    - ガスの元栓は、玄関階段のガレージ側（右手側）にあります。
    - 緊急時はフロントドアからお出になり、ガレージ前のドライブウェイが避難集合場所です。

  usage_sections:
    - category: internet
      heading: インターネット・Wi-Fi
      body: >
        ネットワーク名とパスワードはクイックリファレンスに記載されています。
        Wi-Fiスピードは250Mbps以上です。

    - category: heating
      heading: 暖房のご案内
      body: |
        スノーバードはニュージーランドの南アルプス山脈に位置しており、気温は30℃を超える暑さから氷点下近くまで大きく変動します。この物件には**加熱コンクリートスラブ床暖房**が備わっており、快適な温度を一定に保ちます。壁面のラジエーターもこの全館暖房システムと連動しています。

        **重要 — 温度変化には時間がかかります。** 暖房は床スラブを通じて機能するため、調整の効果が現れるまでに2〜4時間かかります。お寒く感じましたら、お早めにホストへご連絡ください。

        **暖炉と床暖房の関係について。** スタジオラウンジで薪ストーブを使用すると、1階ベッドルームの床暖房の出力が低下することがあります。夜間に暖炉をご使用の場合は、熱を逃がさないようベッドルームのドアをお閉めください。暖炉が消えた後、床暖房システムはゆっくりと（スラブの特性上、時間をかけて）元のバランスに戻ります。

        **快適にお過ごしいただくために。** 寒い時期はドアと窓を閉めて蓄熱を逃がさないようにしてください。個人の体感に合わせて衣類で調整してください。温度調整が必要な場合はホストへご連絡ください。

        **外出時のご注意。** 寒い天候の際は、お戻りになったときのために、すべてのドアと窓を閉めてから外出してください。

        **最上階マスターベッドルームのヒント。** 熱は上昇するため、この部屋の温度調整はやや難しい場合があります。
          - ベッドルームのドア（入口・バスルーム）をすべて閉めてください。
          - アトリウムのスライド窓・ドアを閉めてください。
          - 微調整が必要な場合は、1〜3か所の窓を適宜開けてください。
          - 備え付けのフロアファンを活用して通気を調整してください。

        **壁面ラジエーター**は全館暖房システムと完全に連動しており、手動での調整は不要です。

    - category: gas-fire
      heading: ガスファイヤー（上階ラウンジ）
      body: |
        主暖房としての使用はお勧めしておりません。上階ラウンジでご滞在中に必要に応じてご使用ください。ガスファイヤーはリモコンで操作できます。リモコンは同室の壁に設置されています。

        1. リモコン直下の黒いスイッチの**上部ボタン**を押して、ガスファイヤーの電源を入れます。
        2. リモコンの**電源（Power）**ボタンを押します。デジタルディスプレイに温度が表示されることを確認してください（表示されない場合はもう一度Powerを押してください）。
        3. 暖炉は数秒後に点火します。
        4. ガスファイヤーは**60分タイマー制**です。必要に応じて手順を繰り返して再点火してください。
        5. ご使用後は必ずガスファイヤーを消してください。

    - category: wood-burner
      heading: スタジオ薪ストーブ（ラウンジ・ダイニングルーム）
      body: |
        - ハンドルを上に持ち上げると、火室のドアを開閉できます。
        - ウッドボックスに入っている着火剤で火をつけてください。
        - 火が安定してガラスが温まるまで（結露防止のため）、ドアを少し開けたままにしておいてください。
        - 火が安定したらドアを閉め、しっかりとロックしてください。
        - ドアを開けたままにしないでください。過燃焼により機器が損傷する恐れがあります。
        - ガレージに保管されている薪・焚き付け材は、備え付けのバスケットでお運びください。
        - ドアの開閉は、前面の木製ノブのみを触れて行ってください。
        - 灰をゴミ箱や強風にさらされる場所に捨てないでください。
        - 灰が大量に溜まった場合は、ホストへご連絡ください。

    - category: spa-control
      heading: スパコントロールパネル
      body: |
        - 温度は快適さと安全のためにあらかじめ設定されています。
        - **JETS**ボタンでジェットのオン・オフができます。
        - **LIGHTS**ボタンで水中照明のオン・オフができます。
        - **パネルがロックされている場合**（南京錠アイコンが表示されている、ボタンが反応しない）：**OPTIONS**と**LIGHTS**を同時に3〜5秒間長押ししてください。

    - category: bins
      heading: ゴミ・リサイクルについて
      body: |
        - 赤いビン（一般ゴミ）：毎週水曜日に収集されます。
        - 青いビン（ガラス）と黄色いビン（混合リサイクル）：水曜日に隔週交互で収集されます。
        - 収集スケジュールは <https://www.qldc.govt.nz/services/rubbish-recycling/rubbish-recycling-collection/> でご確認いただくか、近隣の家が出しているビンを参考にしてください。
        - ビンは水曜日の午前7時までか、前夜のうちにドライブウェイ脇の道路縁石に出してください。水曜日の夕方までにビンを道路から回収してください。

    - category: gas-hob
      heading: ボッシュ ガスホブ
      body: |
        オーブン前面の対応するダイヤルを押しながら回すと、ホブに点火します。火力は必要に応じて調整してください。

    - category: insinkerator
      heading: インシンクエレーター（生ごみ処理機）
      body: |
        蛇口の右側にあるシルバーのボタンを押すと、生ごみ処理システムが作動します。スムーズに動作させるために、水を流しながらご使用ください。

        これは**エアボタン**です。シンクの水がボタン内に入ると動作が制限されることがあります。その場合、数時間後に自動で復旧します。

    - category: laundry
      heading: AEG 洗濯機・乾燥機
      body: |
        **AEG 洗濯機（下段）**
        - **On/Off**ボタンで電源を入れてください。
        - 洗剤は左側のトレイに入れてください。
        - ダイヤルで希望の洗濯コースを選択してください。
        - **Start/Pause**を押してください。
        - 使用しないときはドアを開けたままにしておいてください。
        - 洗濯洗剤はランドリーシンクの下に備えています。

        **AEG 乾燥機（上段）**
        - **On/Off**ボタンで電源を入れてください。
        - ダイヤルで乾燥プログラムを選択してください。
        - 乾燥レベルを選択してください。
        - **Start/Pause**を押してください。
        - ご使用のたびに、乾燥機ドア内側の下部にある糸くずフィルターを確認・清掃してください。

    - category: ironing
      heading: アイロンがけ
      body: |
        アイロンとアイロン台はランドリールームにご用意しています。ご自由にお使いください。

    - category: children
      heading: お子様向けアメニティ
      body: |
        - **おもちゃ・ハイチェア・ベビーバス・ベビーベッド・バウンサー：** 玄関ドア近くの収納棚に入っています。
        - **子ども用カトラリー：** キッチンの引き出しに入っています。
        - **Baby Jogger City Elite ストローラー**（ガレージ内）。収納時は簡単に折りたためます。動画ガイド：
          <https://www.youtube.com/watch?v=GhoxKWnKyaM>
        - **Baccani CIBO ベビーハイチェア。** 組み立て・お手入れが簡単です。組み立て動画：
          <https://m.facebook.com/baccaniprams/videos/baccani-cibo-high-chair-%EF%B8%8F-easy-convert-to-a-rocking-chair-configuration-in-secon/3572046306188221/>
        - **BabyBjorn トラベルクリブ・ベビーベッド。** 設置動画：
          <https://www.youtube.com/watch?v=o9PFPagfnuk>

    - category: electric-blinds
      heading: 電動ブラインド
      body: |
        ガスファイヤーの部屋にある2階吹き抜けの大型ブラインドは、アートの下・窓の右側にある**Press**ボタンで操作できます。これらのブラインドはマスターベッドルームからも操作可能です。

    - category: electric-windows
      heading: 電動窓
      body: |
        玄関近くのバスルームにある窓は、照明スイッチと同じスイッチの**Press**ボタンで操作できます。退出の際は必ず閉まっていることをご確認ください。
