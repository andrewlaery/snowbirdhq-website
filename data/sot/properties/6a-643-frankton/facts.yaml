exceptions:
  hazards:
    - description: External stairs — two flights of stairs from the parking area to the apartment. Take care with luggage; use caution in wet or icy conditions.
      severity: minor
    - description: Balcony — upper-level balcony with a drop to the complex below. Take normal care.
      severity: minor
    - description: Adjacent construction site (expected to complete late 2026) — path to rubbish bins may be uneven or disrupted; significant daytime noise on weekdays approx. 7:45am–6pm with heavy machinery and piling rigs. Earplugs available from Life Pharmacy Wilkinsons in town.
      severity: minor
    - description: Road traffic — apartment faces Frankton Road; traffic noise audible in the bedroom (double glazing helps but does not fully block). Light sleepers may want earplugs.
      severity: info
    - description: Flight path — property is under the Queenstown Airport flight path; occasional aircraft noise during the day.
      severity: info
  house_rules:
    - category: parking
      heading: Parking
      bullets:
        - "**Dedicated parking space 6A** is reserved for this apartment — free, below the steps."
        - If someone has parked in 6A when you arrive, please let us know and use any empty spot temporarily.
        - "**Town centre parking**: free lakefront parking (limited availability), paid on Camp Street and Man Street, some free spots on Man Street (check blue signs for time restrictions)."
        - "**Overflow / day parking**: Goldfield Heights has unrestricted street parking."
    - category: body-corporate
      heading: Body Corporate Rules
      bullets:
        - "**No laundry hung on the balcony** — body corporate rule. Please use the indoor drying rack, or the shared dryer in a separate building in the complex."
        - "**No smoking or vaping on the balcony** — body corporate rule (in addition to the universal no-smoking-inside rule)."
    - category: rubbish-recycling
      heading: Rubbish & Recycling
      bullets:
        - Rubbish bins are located in the apartment complex — see the black booklet on the kitchen table for the exact location.
        - Green rubbish bags are provided.
        - "**The apartment complex no longer has recycling facilities** — general waste only."
    - category: parcel-delivery
      heading: Parcel Delivery
      bullets:
        - "If you need parcels sent to you during your stay, please use this address instead: **Mountain Club, 85 Beach Street, Queenstown 9300** (addressed to **SnowbirdHQ**)."
        - This avoids couriers leaving parcels in the open complex.
  access:
    front_door: >
      Step 1 — From the car park: locate dedicated park 6A, take the steps on the right, then a second set of steps up to the balcony.

      Step 2 — Find your unit: 6A is the first door on the right as you reach the balcony.

      Step 3 — Access the key: lockbox is mounted to the right of the front door. Enter the access code sent 2 days before arrival (ensure numbers align), then pull the slot down to retrieve the key. The same key opens the front door and the balcony door.
    back_door: ''
    garage: ''
    other: ''
  notes:
    - The apartment alarm is not in operation during your stay.
    - Smoke detectors and a fire extinguisher are installed.
    - In an emergency, exit via the front door and descend the two flights of stairs. Assembly point is in the parking area, a safe distance from the building.
    - Black booklet on the kitchen table has Wi-Fi info, appliance instructions, and bin location.
    - "**Welcome extras on the kitchen table:** complimentary coffee vouchers for the Boat Shed Cafe and Canyon beer vouchers — please enjoy."
    - "**Construction disclosure:** an adjacent apartment block is under construction (expected to complete late 2026). Significant daytime noise weekdays 7:45am–6pm; the construction site is also visible from the balcony and partially blocks one side of the lake view."
  usage_sections:
  - category: internet
    heading: Internet / Wi-Fi
    body: >
      Network and password are shown above in the Quick Reference. The modem
      is to the right of the TV, under the grey corner chair — power-cycle
      if you have connectivity issues. Wi-Fi details are also in the black
      booklet on the kitchen table.

  - category: heating
    heading: Heating
    body: |
      - **Heat pump** (lounge): remote controlled — use for heating and cooling. Keep doors and windows closed in cold weather.
      - **Panel heater** in the bedroom cupboard — additional heating for the bedroom.
      - Road traffic noise is audible in the bedroom (faces Frankton Road). Double glazing helps but does not fully block it — light sleepers may wish to use earplugs or a white noise app.

  - category: location
    heading: Getting Around
    body: |
      - Bus stop directly across the road (Connectabus — ~10 min to Queenstown town centre).
      - Queenstown Airport ~10 min drive.
      - Walk to nearby cafes and Cargo Brewery along the lakefront: ~15 min.
      - Walk to Queenstown town centre: via roadside footpath (~45–60 min). The lakeside walking path is currently closed.
      - Uber ~$15–20 to town centre.

  - category: appliances
    heading: Appliances
    body: |
      - **Washing machine** (top loader, in bathroom): no in-unit dryer — drying rack provided. Shared coin-operated dryer available in a separate building across the complex.
      - **Gas hob**: standard operation.
      - **Electric oven**: mains switch on the right-hand side wall of the kitchen must be on or the oven will not heat. Note the grill setting label has rubbed off.
      - **Heat pump**: remote controlled (heating + cooling). Use in lounge.
      - **Panel heater**: in the bedroom cupboard — additional bedroom heating.
      - **Iron and ironing board**: in the bathroom.
      - **TV**: Freeview stick on HDMI 1. Two remotes — larger remote for power/source selection (press Source → HDMI 1); smaller remote for Freeview and Netflix navigation.
      - **Vacuum**: by the glass sliding balcony doors.
