  cleaning_fee: 300.0
  extra_person_fee: 0.0
  weekly_discount: 0.9
  monthly_discount: 0.85
  currency: NZD
exceptions:
  hazards:
    - description: >
        Driveway is steep and can be icy / slippery in winter. Salt for
        de-icing is in a large white bag inside the garage.
      severity: minor
    - description: >
        Internal stairs (carpeted, with handrail) connect the two levels —
        watch your footing.
      severity: info
    - description: >
        Garage door swings outward — ensure no vehicle is parked directly
        in front before opening.
      severity: minor

  house_rules:
    - category: parking
      heading: Parking
      bullets:
        - Single garage with remote-controlled door (fob is in the lockbox and on the kitchen table).
        - Garage fits small/medium cars only — 7-seaters, SUVs, and vehicles with low body kits will NOT fit and may scrape.
        - Larger vehicles — most guests park in front of the garage doors.
        - Street parking also available along the road parallel to the driveway.
        - Garage door swings outward — clear the area before opening.

    - category: luggage-equipment
      heading: Luggage & Equipment
      bullets:
        - The garage can be used for luggage storage before check-in or after check-out — please arrange with the host in advance.
        - Suitcases and larger items can go in the garage.
        - "**No sports equipment** (golf, snowboards / skis / boots, bicycles) inside the house — store in the garage. The garage has space for bikes and ski gear."
        - "**No shoes or ski gear indoors** — please remove your shoes inside; store ski gear in the garage."
        - Outdoor clothes horse to the LEFT of the back door, plus an indoor drying rack provided. The house does not have a dryer.

    - category: rubbish-recycling
      heading: Rubbish & Recycling
      bullets:
        - "**RED bin**: General waste."
        - "**YELLOW bin**: Mixed recycling (bottles, cardboard, plastics)."
        - Bins are located near / in front of the garage by the driveway.
        - "**Bin collection day at this property: Tuesday morning** (different from the rest of Queenstown)."
        - Put bins out on the street curb the night before; collect them off the street by Tuesday evening.
        - Rubbish bags are under the kitchen sink and in the boiler cupboard (first left as you come in the front door).

  access:
    front_door: >
      Walk up the steps to the LEFT of the house. Lockbox is mounted on
      the wooden fence on the left-hand side. Code 1010. The key opens
      the door directly opposite the lockbox.
    back_door: ''
    garage: >
      Two remotes — one in the lockbox / on the kitchen table, one with
      the property manager. Open from inside via the wall switches at
      the bottom of the steps leading from the living area to the garage.
    other: ''

  notes:
    - The house alarm is not in operation during your stay.
    - First aid kit is in the kitchen (please re-stock or notify us if items are used).
    - Fire extinguisher is under the kitchen sink.
    - In an emergency, exit via the front door. Assembly point is at the bottom of the driveway, clear of the garage.
    - House manual is the black booklet on the kitchen table — Wi-Fi info, appliance instructions, property details.
    - Boiler cupboard is first on the left as you come in the front door — contains extra cleaning products, trash bags, and supplies.
    - Wi-Fi booster is upstairs in the single-bed/king room — please do not unplug.
    - Flood-light switch is by the door leading to the garage (illuminates the driveway area).

  usage_sections:
    - category: internet
      heading: Internet / Wi-Fi
      body: |
        Network and password are shown above in the Quick Reference. The
        modem is next to the dining table; a booster lives upstairs in
        the single-bed/king room — please do not unplug.

    - category: heating
      heading: Heating
      body: |
        **Heat pumps** (Daikin) heat the **living area** and the **master
        bedroom** (Bedroom 1). Each heat pump has its own remote — the
        lounge remote is on the kitchen wall, and the master remote sits
        under the unit. Recommended setting: 23°C, constant.

        **Stiebel Eltron panel heaters** are installed in **Bedroom 2** and
        **Bedroom 3**. Each panel has its own wall switch (on/off) plus a
        temperature dial on the panel itself.

        In cold weather, keep doors and windows closed to retain heat. When
        leaving the house for periods of time in cooler weather, please
        ensure all doors and windows are closed so the house stays at a
        good temperature for your return. Please switch the panel heaters
        off when checking out.

    - category: outdoor
      heading: Outdoor
      body: |
        Grand outdoor deck with panoramic mountain and lake views.
        Manicured garden.

    - category: location
      heading: Getting Around
      body: |
        - Located between Frankton Road and the 5 Mile shopping area.
        - ~7 minutes by car to the Queenstown town centre.
        - Queenstown Airport — ~5 minutes by car.

    - category: appliances
      heading: Appliances
      body: |
        - **Induction hob** (touch): tap to select a zone, then adjust the temperature with the slider.
        - **Electric oven**: the timer must be turned on for the oven to heat. Mains switch in the cubby on the right-hand side of the kitchen, by the toaster.
        - **Dishwasher**: eco mode recommended. Tablets under the sink.
        - **Heat pumps** (Daikin, lounge + master bedroom): lounge remote is mounted on the kitchen wall; master remote sits under the unit. Recommended setting 23°C, constant.
        - **Washing machine**: in the laundry room off the kitchen. No dryer in the unit.
        - **Chest freezer**: in the garage, for additional frozen storage.
        - **TV**: Freeview only — no Sky Sport or pay-TV channels.
