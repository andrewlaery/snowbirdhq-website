appliances:
  # Kitchen
  - gorge-electric-hob                   # electric hob
  - gorge-oven                           # Parmco electric oven (timer-must-be-on)
  - gorge-dishwasher                     # Haier dishwasher
  # Heating
  - gorge-heat-pump                      # living area heat pump (23 °C; modes Heat/Cool/Dry/Auto/Fan)
  - gorge-underfloor-heating             # bathroom underfloor (slow warm-up)
  - gorge-towel-rail                     # heated towel rail (separate switch; off at checkout)
  - 10-15-gorge-portable-heater          # spare portable heater stored in wardrobe
  # Laundry
  - gorge-top-loader-washer              # in-bathroom top-loader (Normal/Quick/Delicate)
  - gorge-shared-dryer                   # complex shared dryer ($4 coin; code on keychain)
  # Tech
  - gorge-tv                             # Samsung Frame TV 55" — single remote (Art Mode)
features:
  - balcony
  - central_location
  - laundry
parking:
  spaces: 1
  type: shared_complex
  garage: false
  garage_remote: false
  notes: Whistler Apartmentsの共用駐車場に非指定スペースが1台分ございます（個別割り当てではありません）。
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    玄関のスマートロックにてセルフチェックインとなります。アクセスコードは、ご到着の24時間前に予約プラットフォームよりお送りいたします。外出時の施錠方法：キーパッドのロゴの上に手をかざしていただくと、ドアが施錠されます。
check_out:
  time: '10:00'
wifi:
  network: SnowbirdU10
  password: Snowbird1010
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: 07:00
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: true
pricing:
  base_nightly: 180.0
  cleaning_fee: 150.0
  extra_person_fee: 100.0
  weekly_discount: 0.95
  monthly_discount:
  currency: NZD
exceptions:
  hazards:
    - description: >
        レセプションへの急勾配のドライブウェイ：雨天時や凍結時はお足元にご注意ください。
      severity: minor
    - description: >
        キッチンのコンロ／オーブン用幹線スイッチ：キッチン右側の壁にございます。オーブンまたはコンロに電源が入らない場合は、まずこのスイッチをご確認ください。
      severity: info

  house_rules:
    - category: parking
      heading: 駐車場
      bullets:
        - Whistler Apartmentsの共用駐車場に非指定スペースが1台分ございます（個別割り当てではありません）。
    - category: balcony
      heading: バルコニー
      bullets:
        - ご利用時間は午前7時〜午後10時のみとなります。
        - バルコニーでの洗濯物の干し出しはご遠慮ください（管理組合規則）。
        - バルコニーへの物品の保管はご遠慮ください（管理組合規則）。

  access:
    front_door: >
      玄関のスマートロックにてセルフチェックインとなります。アクセスコードは、ご到着の24時間前に予約プラットフォームよりお送りいたします。外出時の施錠方法：キーパッドのロゴの上に手をかざしていただくと、ドアが施錠されます。
    back_door: ''
    garage: >
      荷物保管室のドアコードは **C8743** です。レセプションから急勾配のドライブウェイを下り、右手に進むと駐車場エリアがございます。
    other: ''

  notes:
    - コンパクトなワンベッドルームのお部屋です。カップルまたはおひとり旅のお客様に最適です。
    - "**ビル管理者**（給湯・エレベーター・共用部に関するご連絡のみ）：03 409 0394、またはレセプション横の電話をご利用ください。アパートメント内に関するご用件は、ホストまで直接お問い合わせください。"
    - 室内の水道水はそのままお飲みいただけます。
    - 停電の際は、Aurora EnergyのクイーンズタウンStopページをご確認ください。
    - トラベルコットおよびハイチェアはリクエストに応じてご用意いたします。ご到着前にホストまでご連絡ください。

  usage_sections:
    - category: internet
      heading: インターネット／Wi-Fi
      body: |
        ネットワーク名とパスワードは上記のクイックリファレンスをご参照ください。接続に問題が生じた場合は、モデムの電源をいったんオフにして再起動してください（プラグを抜いて20秒待ってから再度差し込んでください）。

    - category: heating
      heading: 暖房
      body: |
        - **ヒートポンプ（リビングエリア）** — 壁掛け式で、アパートメント全体を温めます。推奨設定：暖房モードで23℃。リモコン操作で暖房／冷房／除湿／自動／送風モードをお選びいただけます。寝室の温度はドアの開閉状況や補助暖房の使用状況により異なります。ヒント：衣類を乾燥ラックにかけた状態でヒートポンプをオンにすると、乾燥が早まります。
        - **バスルームの床暖房** — 電気式です。バスルームの壁にオン／オフスイッチと温度ダイヤルがございます。温まるまでに時間がかかりますので、体感できるまで約30分、十分に温まるまで約1〜2時間をご確認ください。**チェックアウト時は必ずオフにしてください。**
        - **電熱タオルレール** — 壁掛け式電気タイプです。床暖房とは別の壁スイッチでオン／オフをお切り替えください。温まるまでに20〜30分かかります。**チェックアウト時は必ずオフにしてください。**
        - **ポータブルヒーター** — 必要に応じてご利用いただけます。ワードローブに収納しております。

    - category: kitchen
      heading: キッチン
      body: |
        - **幹線スイッチ（キッチン右側の壁）** がオンになっていないと、コンロとオーブンはご使用いただけません。「コンロ／オーブンが動かない」というご報告の最も多い原因です。
        - **電気クックトップ** — ダイヤルでバーナーと火力を選択します。加熱されるまで30〜60秒ほどかかります。平底の調理器具をお使いください。
        - **Parmco電気オーブン** — 3つのノブで温度・タイマー・機能を設定します。**タイマーをオンにしないとオーブンは加熱されません**。「オーブンが温まらない」というご報告の最も多い原因です。機能：上下ヒート／上段シェルフ＋ファン／ライトのみ／ファンヒートの4種類。機能を設定し、温度を設定してから、タイマーダイヤルを希望の時間に合わせてください（オートベークも可能です）。
        - **Haier食洗機** — 食洗機用タブレットはシンク下に収納しています。プログラムノブを回してサイクルを選択し、中央ボタンを押してスタートします。エコモード推奨（最長サイクルで消費電力・水の使用量が最も少なくなります）。チェックアウト前に運転をお願いいたします。

    - category: location
      heading: 周辺の移動について
      body: |
        - 中心地に位置しており、市街地まで徒歩でお越しいただけます。
        - クイーンズタウン空港まで車で10〜15分です。
        - **バス** — 市内のFour Square前にバス停がございます。料金は現金5ドルまたはBeeカード（割安）です。時刻表はTransitアプリまたはorc.govt.nzをご覧ください。
        - **空港バス** — Stanley StreetのSuper Liquor向かい側からRoute 1が運行しています。料金は現金4ドルのみ、空港まで直通です。
        - Uberもご利用いただけます。
        - QT Taxis：03 450 3000

    - category: nearby_shops
      heading: 近隣のショップ
      body: |
        - **Fresh Choice** — 徒歩約5分（道路を渡ったところ）、午後10時まで営業。
        - **Raeward Fresh** — 徒歩約5分（デリ＆精肉店）。
        - **Pak'nSave** および **Countdown** — フランクトン、車で約20分。
        - **Four Square** — 市街地中心部。

    - category: storage
      heading: スキー・自転車・荷物の保管
      body: |
        - **スキー保管**：アパートメント棟の下にあるスキー／乾燥室をご利用ください。付属のスキーロックをお使いください。
        - **自転車ラック**：駐車場の乾燥室外側にございます。自転車用ロックをお使いください。
        - **荷物保管**（チェックイン前／チェックアウト後）：レセプション下の駐車場エリア内の保管室をご利用ください。レセプションから急勾配のドライブウェイを下り、右手に進むと駐車場がございます。ドアコード：**C8743**
        - 市内での荷物保管はBounce.comもご利用いただけます。

    - category: appliances
      heading: 家電の使い方
      body: |
        - **縦型洗濯機（バスルーム内）**：洗濯用洗剤をご用意しております。フタを開けてドラムに衣類を入れ、洗剤を投入口に入れてください。前面のダイヤルでプログラム（通常／クイック／デリケート）を選択し、スタートボタンを押してください。乾燥ラックをご用意しておりますので、ヒートポンプの近くに設置してご使用いただくと乾燥が早まります。**バルコニーでの洗濯物の干し出しはご遠慮ください**（管理組合規則）。
        - **共用乾燥機（共用乾燥室）**：1回4ドル（2ドル硬貨×2枚を差し込んで起動）。アクセスコードはアパートメントのキーホルダー裏面に記載されています。乾燥室は駐車場の下層エリアにございます。
        - **Samsung Frame TV（55インチ、シングルリモコン）**：スマートTVで各種アプリが内蔵されており、Samsungリモコン1つですべて操作できます。**アートモード**：電源を「オフ」にするとテレビが真っ暗になるのではなく、アート作品が表示されます。これは正常な動作で、故障ではありません（「テレビの電源が切れない」というご報告の最も多い原因です）。電源ボタンの短押しでアートモードとテレビ視聴を切り替え、長押しで完全に電源をオフにできます。**ホームボタン**を押すとアプリ一覧が表示されます。**Netflix**：ご自身のアカウントでサインインしてください。ご出発前に必ずサインアウトをお願いいたします。
