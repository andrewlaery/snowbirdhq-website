pricing:
  base_nightly: 0  # TBC
  cleaning_fee: 0
  extra_person_fee: 0
  weekly_discount: null
  monthly_discount: null
  currency: NZD

exceptions:
  hazards:
    - description: >
        2階建ての建物のため、下階のアパートメントにも音が届きます。下の部屋にもお客様がご滞在の場合は、
        ご配慮をお願いいたします。
      severity: minor
    - description: >
        全室に床暖房を設置しており、床面は常に温かい状態です。設定温度は20°Cで、温度変化には約2日かかります。
        コントロールパネルの操作はご遠慮ください。
      severity: info
    - description: >
        クイーンズタウンヒル ウォーキングトラックに隣接しており、裏庭からトラックへアクセスできます。
        トラックは急勾配のため、お子様が同伴の場合は必ず目を離さないようにお願いいたします。
      severity: minor
  house_rules:
    - category: amenity-rules
      heading: アメニティのご利用について（上階）
      bullets:
        - "**床暖房は20°Cに設定されており、調整はできません** — 温度変化には約2日かかります。"
        - "**屋外用クッション**：毎晩、室内にお持ち込みください。"
        - "**ダイニングテーブル**：ランチョンマットとコースターをご利用ください — 熱いものをテーブルに直接置かないようお願いいたします。"
        - "**食洗機用洗剤**：**備え付けの食洗機専用粉末洗剤のみ**をご使用ください — 液体洗剤を使用すると故障の原因となり、修理費用が発生する場合があります。"
        - "**ガス暖炉**：ヒーターパネル左上のスイッチで電源をお切りください。本体のメインアイソレーターは設計上、**暖炉ユニットの背面**にあります — パネルのスイッチをご使用ください。"
    - category: parking
      heading: 駐車場
      bullets:
        - 敷地内の私道に駐車スペースがございます。
        - Kent Street沿いの路上駐車もご利用いただけます。

    - category: outdoor-noise
      heading: 屋外エリア — 騒音について
      bullets:
        - "**屋外エリアのご利用は午後10時〜午前7時の間はお控えください**（住宅街のため、ご配慮をお願いいたします）。"
        - "**屋外での音楽・拡声器の使用は午後8時〜午前8時の間は禁止です。**"
        - "**違反された場合、利用規約に基づき$1,000の請求が発生します** — Goodstaysのガイドブックにて現在も運用されており、SnowbirdHQへの移行後も継続されます。"
        - 特に上記の夜間時間帯は、常に静かにお過ごしください。

    - category: rubbish-detail
      heading: ゴミ・リサイクル — 物件固有のご案内
      bullets:
        - "割り当て：**週2枚 × 75Lの黒いゴミ袋**、チェックアウト時にハウスキーピングが回収いたします。"
        - 自治体のゴミ箱は、ゲストの滞在期間外は施錠されています。
        - キッチンのゴミ箱には白いライナーをご使用ください — 白い袋がいっぱいになりましたら、黒いゴミ袋の中に入れてください。
        - リサイクル用の黒いオープントレーをご用意しております — 入れる前に**よく洗い流して**からお入れください。
        - 少量のリサイクルはキッチンカウンターの上か、ゴミ袋の横に置いていただけます。
        - "**ゴミが多い場合**：**クイーンズタウン・トランスファーステーション（110 Glenda Drive, フランクトン）**（午前8時〜午後5時、年中無休、クリスマスデー・グッドフライデー・アンザックデーは休業）にお持ちいただくか、**ハウスキーピングによる追加75L袋の回収は1袋あたり$20＋GSTが発生します**。"
  access:
    front_door: '確認中：各物件のアクセス方法は、サービス開始前（2026-07-01）に追加いたします。'
    back_door: ''
    garage: ''
    other: ''
  notes:
    - "**消火器**はキッチン奥の**パントリー内、窓際の右隅**にございます。"
    - "**煙感知器**が全室に設置されています — 取り外しはご遠慮ください。"
    - "**ヒューズボックス／回路基板**は、**レベル1のバスルーム向かいのコートルーム**にございます。"
    - "**ガス暖炉のアイソレーター**は**暖炉ユニットの背面**にあります（通常の壁スイッチでは操作できない設計です）。ヒーターパネル左上のオン／オフボタンをご使用ください。"
    - "**Wi-Fiエクステンダー**は上階にあります — インターネットの速度が遅い場合は、Wi-Fiを一度オフにしてから再度オンにしてください。"
    - "**セルフクリーニングオーブン** — 洗剤は使用しないでください。画面の指示に従ってセルフクリーニングを行ってください。"
    - "**クイーンズタウンヒル ウォーキングトラック**は裏庭からアクセスできます — 庭にはフルーツの木（マルメロ、アンズ、リンゴ）もございますので、どうぞご自由にお楽しみください。"
    - "**一部エリアにオーナー専用の施錠された収納**がございます — （明確に表示または施錠されています）ご利用はお控えください。"
    - "乾燥機、洗濯機、テレビ、コーヒーマシンの**紙製マニュアル**をご用意しております — PDFが必要な場合はホストまでお申し付けください。"
    - "**クイーンズタウン空港から**：6.8km／約10分 — Sir Henry Wigley Dr → Lucas Pl → ラウンドアバウトを2つ目の出口でSH6へ → Zサービスステーション付近のラウンドアバウトを1つ目の出口でSH6A/Frankton Rdへ → Dublin Stを右折 → Hallenstein Stを最初の左折 → York Stを最初の右折 → Kent Stを最初の左折 → 右側2番目の私道。"

