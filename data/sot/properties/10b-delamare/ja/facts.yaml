appliances: []  # TODO: build appliance-library MDX components for:
                # touch induction hob, electric oven, dishwasher,
                # 2× Daikin heat pumps (lounge + master), washing machine,
                # chest freezer, TV.
                # Operational notes captured in exceptions.usage_sections.
features:
  - lake_views
  - mountain_views
  - deck
  - heat_pump
  - garage
  - laundry
parking:
  spaces: 1
  type: garage
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: lockbox
  instructions: >
    ロックボックスによるセルフチェックインとなります。ロックボックスは建物左側の木製フェンスに取り付けられています。建物の左側の階段を上がってください。ロックボックスの中には玄関の鍵とガレージのリモコンフォブが入っています。
    ご到着の24時間前に予約プラットフォームを通じてコード1010もお送りします。
check_out:
  time: '10:00'
wifi:
  network: TP-Link_F8D6
  password: FYH25Na3
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: 07:00
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false
booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: true
pricing:
  base_nightly: 241.0
  cleaning_fee: 300.0
  extra_person_fee: 0.0
  weekly_discount: 0.9
  monthly_discount: 0.85
  currency: NZD
exceptions:
  hazards:
    - description: >
        私道は急勾配で、冬季は凍結・滑りやすくなる場合があります。融雪用の塩はガレージ内の大きな白い袋に入っています。
      severity: minor
    - description: >
        2フロアをつなぐ内部階段（カーペット敷き・手すり付き）がありますので、足元にご注意ください。
      severity: info
    - description: >
        ガレージドアは外開きです。開ける前に、ドア正面に車両が駐車されていないことをご確認ください。
      severity: minor

  house_rules:
    - category: parking
      heading: 駐車場について
      bullets:
        - ガレージはリモコン式ドア付きのシングルガレージです（フォブはロックボックス内およびキッチンテーブルの上にあります）。
        - ガレージに入れるのは小型・中型車のみです。7人乗り車両・SUV・車高の低い車両は入庫できず、車体が擦れる恐れがありますのでご注意ください。
        - 大型車両をご利用のお客様は、ガレージドアの前にお停めいただくことが多いです。
        - 私道と並行する道路沿いにも路上駐車が可能です。
        - ガレージドアは外開きです。開ける前に周囲の安全をご確認ください。

  access:
    front_door: >
      建物の左側の階段を上がってください。ロックボックスは左側の木製フェンスに取り付けられています。コードは1010です。鍵はロックボックスの正面にあるドアを開けます。
    back_door: ''
    garage: >
      リモコンは2つあります。1つはロックボックス内またはキッチンテーブルの上に、もう1つは管理者が保有しています。居室エリアからガレージへ続く階段下の壁スイッチで内側から開けることもできます。
    other: ''

  notes:
    - キッチンテーブルの上にある黒い冊子がハウスマニュアルです。Wi-Fi情報・家電の使い方・物件の詳細が記載されています。
    - 玄関を入って左側最初のドアがボイラー収納です。清掃用品の予備・ゴミ袋・各種備品が入っています。
    - Wi-Fiブースターはシングルベッド（キングベッド）のお部屋（上階）にあります。プラグを抜かないようお願いいたします。
    - フラッドライトのスイッチはガレージへ通じるドアのそばにあります（私道エリアが照らされます）。
