        Driveway can be slippery after rain — please take care.
      severity: minor

  house_rules:
    - category: parking
      heading: Parking
      bullets:
        - Double garage with a remote-controlled door. Leave the garage remote on the dining table at departure.
        - Off-street parking is available on the grass area in front of the boat on the private land opposite the house.
        - Street parking is also available along Hensman Road.
        - Larger vehicles (SUVs, vans) are best parked on the grass verge rather than in the garage.

    - category: rubbish-recycling
      heading: Rubbish & Recycling (private collection)
      bullets:
        - "**RED bin (big red lid):** General waste / rubbish."
        - "**YELLOW bin (yellow lid):** Cardboard and plastic bottles."
        - "**BLUE bin (blue lid):** Glass only."
        - Bins are located in or near the garage area. Spare rubbish bags are in the garage.
        - "**Private collection system** — not the standard council pickup. Usually Wednesday but varies."

    - category: bed-configuration
      heading: Bed Configuration
      bullets:
        - 2 master bedrooms — permanently set as king beds, each with en-suite bathroom.
        - 3 additional bedrooms — each can be configured as 1 king bed (zip-together) OR 2 single beds.
        - Linen is ordered in advance based on your configuration — please confirm preferences at booking or as soon as possible after.

    - category: spa-fire-pit
      heading: Outdoor Spa & Fire Pit
      bullets:
        - The spa and outdoor fire pit area can carry sound to neighbours — please enjoy them considerately after dark.
        - Outdoor areas observe the 10pm quiet curfew — no amplified sound outside after 8pm.

    - category: checkout-specific
      heading: Checkout Reminders
      bullets:
        - Turn off the gas fireplace before checking out.
        - Leave the garage remote on the dining table — please do not take it with you.

    - category: welcome-items
      heading: Welcome Items
      bullets:
        - A welcome bottle of Pinot Noir is provided for your stay.

    - category: neighbourhood-note
      heading: Neighbourhood Note
      bullets:
        - "**Basil the cat** is a friendly neighbourhood visitor. If he lets himself in through an open door, please put him back outside and close the door."
        - Pete, the owner, lives directly behind the lodge and can assist in person if needed.

    - category: booking-verification
      heading: Booking Verification
      bullets:
        - Always verify your booking is on Airbnb, Booking.com, VRBO, or another reputable platform.
        - Scam listings have previously copied this property's address — contact us directly if anything seems off.

  access:
    front_door: ''
    back_door: ''
    garage: ''
    other: ''

  notes:
    - The lodge is equipped with certified smoke detectors and a fire extinguisher.
    - Assembly point in an emergency — the grass area opposite the house, a safe distance from the building.
    - Fire exits — front door; back doors to the outdoor spa/fire pit area; sliding doors from the living/dining area.
    - Do NOT run the washing machine and dryer simultaneously — this trips the circuit. See User Instructions for details.
    - Gas cooktop: ensure all burners are fully off when not in use.
  usage_sections:
  - category: appliances
    heading: Appliances
    body: |
      - **Gas cooktop (4 hobs)**: Powered by gas bottles — bottles can run out during longer stays. Check on turnover.
      - **Washing machine**: Laundry power point is faulty — use the extension cord to the power point on the opposite side of the laundry. Taps need to be turned on before use. Do NOT run washer and dryer simultaneously — this trips the circuit (red reset button on plug).
      - **Dryer**: Do not run simultaneously with washing machine — trips the circuit (red reset button on plug).
      - **Gas fireplace**: Power switch is on the left side wall (down low) — gets accidentally turned off. Controller batteries die and need checking on turnover. 1-hour timer.
      - **BBQ (outdoor)**: Spare gas bottles in the garage area. Gas bottles can run out during longer stays.
      - **Spa / hot tub**: Outdoor, separate heating system — always hot even when house hot water is empty. Chlorinated. Use plastic key (located with garage remote) to unlock cover. Shower before use. PH and sanitiser may need topping up between stays.
      - **TV**: Chromecast capability.
      - **Iron and ironing board**: Available on property.

  - category: heating
    heading: Heating
    body: |
      - **Underfloor heating**: Programmed to come on in evenings and mornings — covers ground floor.
      - **Gas fireplace**: Heats immediately with a 1-hour timer. Power switch is on the left side wall (down low) — check it is ON if fireplace won't start. Check controller batteries if remote is unresponsive.
      - **No bedroom heaters** — underfloor heating and the gas fireplace are the only heat sources. Guests (especially from Australia or Auckland) may request portable fan heaters in winter.

  - category: internet
    heading: Internet / Wi-Fi
    body: >
      Network and password are shown in the Quick Reference above. Leave Wi-Fi
      modems running at check-out — do not switch them off.

  - category: location
    heading: Getting Around
    body: |
      - Walk to Queenstown town centre: ~20 minutes downhill (longer uphill).
      - Taxi back from town: ~$10.
      - Nearest supermarket: FreshChoice, ~3 minutes' drive.
      - Closest ski fields: Coronet Peak (closest), The Remarkables (~15 min further).
      - Uber is available in Queenstown.
      - Bicycles available in the garage for guest use.

  - category: outdoor
    heading: Outdoor Areas — BBQ, Spa & Fire Pit
    body: |
      - **BBQ**: Gas-powered. Spare gas bottles in the garage area — check on turnover.
      - **Spa / hot tub**: Always hot (separate heating circuit). Use the plastic key (stored with the garage remote) to unlock the cover. Shower before entering. No bubbles, foaming agents, food, drinks, or glass items in the spa area.
      - **Outdoor fire pit**: Firewood is stacked and available for guest use. Axe for kindling is on top of the garage fridge. Matches are in a drawer inside. Outdoor areas including the spa must observe the 10pm quiet curfew — noise from the spa/outdoor areas can carry to neighbours.
