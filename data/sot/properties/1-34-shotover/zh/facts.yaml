exceptions:
  hazards:
    - description: >
        从地下停车场通往公寓的室外台阶——请注意脚下安全，携带行李时尤需小心。
      severity: minor
    - description: >
        停车场限高2.2米，不适合房车或大型车辆进入。
      severity: info

  house_rules:
    - category: parking
      heading: 停车须知
      bullets:
        - 仅限场外停车（免费）——请先将车停在Shotover Street的装卸区卸下行李，再将车移至对面的地下停车场。
        - 停车场限高2.2米，房车不可进入。
        - 公寓位于二楼，须经由停车场的室外台阶进入。

  access:
    front_door: >
      密码锁位于前门旁边，密码为3411（同时也会在抵达前24小时通过预订平台发送）。
    back_door: ''
    garage: ''
    other: >
      入口位于Shotover Street上Canyon Swing与烤肉串店之间的小巷。谷歌地图无法直接导航至公寓——请参照预订平台发送的图文导览前往。

  notes:
    - 调制解调器位于楼上卧室——如Wi-Fi不稳定，请尝试重启调制解调器。

  usage_sections:
    - category: internet
      heading: 网络／Wi-Fi
      body: >
        网络名称和密码已在上方快速参考中列出。调制解调器位于楼上卧室——如遇连接问题，请尝试重启调制解调器。

    - category: heating
      heading: 暖气
      body: |
        客厅配有热泵供暖，请通过墙壁控制器操作。寒冷天气下请保持门窗关闭，以确保取暖效果。

    - category: location
      heading: 周边出行
      body: |
        - 餐厅、商店及湖滨均步行可达。
        - 皇后镇机场——驾车约20分钟。

    - category: appliances
      heading: 家电使用说明
      body: |
        - **洗衣机**（AEG，位于走廊洗衣房）：仅可洗涤，房内无烘干机，已提供晾衣架。
        - **电烤箱**：须先开启计时器，否则烤箱将无法加热。
        - **热泵**：遥控器放在客厅区域的木梁上，不易察觉，请留意。
        - **油汀电暖器**：每间卧室各配备一台。
        - **熨斗及熨衣板**：置于洗衣房内。
