# yaml-language-server: $schema=../_schemas/facts.json
schema_version: 1
slug: 3-kent-home

# 3-Kent-Home = whole-house listing (combines upstairs + downstairs).
# Insurance + Resource Consent capped: 8 (upstairs) + 4 (downstairs) = 12.
# Solves the upstairs/downstairs sound issue when one party books both.
capacity:
  max_guests: 12
  max_adults: 12
  min_age_lead_guest: 25

bedrooms:
  - name: '上階 — 寝室1（マスター）'
    bed: TBC
    ensuite: false  # TBC
    notes: '上階アパートメント。ベッド構成は次回確認時に決定予定です。'
  - name: '上階 — 寝室2'
    bed: TBC
    ensuite: false
    notes: '上階アパートメント。'
  - name: '上階 — 寝室3'
    bed: TBC
    ensuite: false
    notes: '上階アパートメント。'
  - name: '上階 — 寝室4'
    bed: TBC
    ensuite: false
    notes: '上階アパートメント。'
  - name: '下階 — 寝室1'
    bed: TBC
    ensuite: false
    notes: '下階アパートメント。'
  - name: '下階 — 寝室2'
    bed: TBC
    ensuite: false
    notes: '下階アパートメント。'
  - name: '下階 — 追加ベッドスペース（「.5」）'
    bed: single
    ensuite: false
    notes: >
      窓のないアルコーブにシングルベッドを設置しています（お子様専用、ドアなし）。
      オーナーは「2.5寝室」の「.5」と呼んでいます。
bedroom_count: 6.5
bed_count: 7  # Conservative — actual layout TBC
bathroom_count: TBC
beds_summary: '確認待ち — オーナーによる現地確認が必要です'

amenities:
  - Wi-Fi
  - 無料駐車場
  - 床暖房（全室）
  - ヒートポンプ
  - ガス暖炉
  - 食洗機 × 2台
  - 洗濯機
  - 乾燥機
  - スマートTV
  - Sky TV
  - コーヒーメーカー
  - 庭へのアクセス（クイーンズタウンヒル・ウォーキングトラック）
  - マウンテンビュー
  - オーナー専用施錠収納（一部エリアはお客様のご利用不可）

features:
  - underfloor_heating
  - gas_fireplace
  - garden
  - walking_track_access
  - lockable_owner_storage

parking:
  spaces: 1
  type: 'ドライブウェイ'
  garage: false
  garage_remote: false

check_in:
  start_time: '15:00'
  end_time: '22:00'
  method: 'TBC'  # smart-lock or keypad to be confirmed; current Goodstays uses keypad
  instructions: 'TBC: チェックイン手順は公開前（2026-07-01）に各物件ごとに追加予定です'

check_out:
  time: '10:00'

wifi:
  network: 'Monkeymousewifi'
  password: 'bendalong'

house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 250
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false

booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: moderate
  instant_bookable: true

pricing:
  base_nightly: 0  # TBC — pricing strategy still being negotiated with owners
  cleaning_fee: 0  # TBC
  extra_person_fee: 0
  weekly_discount: null
  monthly_discount: null
  currency: NZD

exceptions:
  hazards:
    - description: >
        上階と下階のアパートメントを結ぶ内階段のある2層構造の住宅です。階層間に音が伝わります
        （コンクリート床は厚めですが、ブーツの足音は聞こえます）。階段の昇降にはご注意いただき、
        お子様からは目を離さないようにしてください。
      severity: minor
    - description: >
        全室に床暖房を完備しており、床面は常に温かい状態です。20°Cに設定されており、
        温度変化には約2日かかります（温まるにも冷めるにも同様）。
        コントロールパネルの操作はご遠慮ください。
      severity: info
    - description: >
        裏庭からクイーンズタウンヒル・ウォーキングトラックに直接アクセスできます。
        トラックは勾配が急ですので、お子様には必ず付き添いをお願いします。
      severity: minor
  house_rules:
    - category: amenity-rules
      heading: アメニティのご利用について（全館共通）
      bullets:
        - "**床暖房は各部屋20°Cに設定されており**、ご滞在中は**調節できません** — システムの温度変化には約2日かかります。"
        - "**一部エリアにオーナー専用の施錠収納**があります。立入禁止エリアへのアクセスはご遠慮ください（明示または施錠されています）。"
        - "**屋外クッション**は夜間に室内へお持ち込みください — 翌日や次のお客様のために、湿気を防ぐためです。"
        - "**ダイニングテーブル**は、備え付けのランチョンマットとコースターをご使用ください — テーブルに直接熱いものを置かないようにお願いします。"
        - "**食洗機用洗剤**は、備え付けの**食洗機専用粉末洗剤のみ**をご使用ください。液体洗剤を使用すると故障の原因となり、修理費用をご請求する場合があります。"
    - category: parking
      heading: 駐車場
      bullets:
        - 敷地内のドライブウェイに駐車可能です。
        - Kent Street 沿いの路上駐車もご利用いただけます。

    - category: outdoor-noise
      heading: 屋外エリアでの騒音について
      bullets:
        - "**屋外エリアは午後10時〜午前7時の間、ご利用をお控えください**（住宅街のため）。"
        - "**屋外での音楽・拡声音は午後8時〜午前8時の間、禁止です。**"
        - "**違反した場合は、利用規約に基づき$1,000の違約金が発生します** — 現在Goodstaysのガイドブックでも適用されており、SnowbirdHQでも継続されます。"
        - 特に夜間の制限時間帯は、常に静かにお過ごしください。

    - category: rubbish-detail
      heading: ゴミ・リサイクル — 物件ごとの詳細
      bullets:
        - "割り当て：**週2枚 × 75Lの黒いゴミ袋**、退去時にハウスキーピングが回収します。"
        - 自治体のゴミ箱は、お客様のご滞在の合間は施錠されています。
        - キッチンのゴミ箱には白いライナーをご使用ください — いっぱいになった白い袋は黒いゴミ袋に入れてください。
        - リサイクル用の黒いオープントレイがあります — 入れる前に**中身をすすいで**ください。
        - 小さなリサイクル品はキッチンカウンターの上か、ゴミ袋の横に置いていただいて構いません。
        - "**ゴミが超過した場合**：**クイーンズタウン・トランスファーステーション（110 Glenda Drive, フランクトン）**へお持ちください（午前8時〜午後5時、年中無休。ただしクリスマスデー、グッドフライデー、アンザックデーは休業） — **または**、ハウスキーピングによる追加75L袋1枚につき$20+GSTにて回収も承ります。"
  access:
    front_door: 'TBC: アクセス手順は公開前（2026-07-01）に各物件ごとに追加予定です。'
    back_door: ''
    garage: ''
    other: ''
  notes:
    - "**消火器**：上階はキッチン奥の**パントリー内**（窓際の右隅）、下階は**キッチンシンク下**にあります。"
    - "**救急箱（下階）**は**キッチンシンク下**にあります。"
    - "**煙感知器**は全館に設置されています — 取り外しはご遠慮ください。"
    - "**ヒューズボックス／配電盤**は**1階（上階）のバスルーム向かいのコートルーム**内にあります。"
    - "**ガス暖炉のアイソレーター**は**暖炉ユニットの裏側**にあります（通常の壁スイッチでは操作できない仕様です）。ヒーターのスイッチパネル（ヒーター上部左）のオン/オフボタンをご使用ください。"
    - "**Wi-Fiエクステンダー**は上階にあります — インターネットの速度が遅い場合は、Wi-Fiをオフにしてから再度オンにしてください。お客様のデバイスが最も強い電波を自動的に選択します。"
    - "**セルフクリーニングオーブン**（上階） — 洗剤は使用しないでください。画面上の指示に従ってセルフクリーニングをご利用ください。"
    - "**クイーンズタウンヒル・ウォーキングトラック**は裏庭からアクセスできます — ハイキング好きのお客様におすすめです。"
    - "**クイーンズタウン空港から**：6.8 km / 約10分 — Sir Henry Wigley Dr → Lucas Pl → ラウンドアバウトを2つ目の出口でSH6へ → Zサービスステーション近くのラウンドアバウトを1つ目の出口でSH6A/Frankton Rd へ → Dublin St を右折 → Hallenstein St を最初の左折 → York St を最初の右折 → Kent St を最初の左折 → 右手2番目のドライブウェイ。"
    - "**電子レンジの取扱説明書**（下階）および**オーブンの取扱説明書**は、**下階TVキャビネットの一番上の引き出し**に入っています。"

