      bullets:
        - 駐車は敷地外のみとなります（無料）。お荷物の積み降ろしはショットオーバー・ストリートのローディングベイをご利用いただき、その後は道路向かいの地下駐車場へ移動してください。
        - 駐車場の高さ制限は2.2mです。キャンピングカーはご利用いただけません。
        - アパートは2階にあり、駐車場からの外部階段よりお上がりください。

  access:
