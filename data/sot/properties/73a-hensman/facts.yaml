    heading: Heating
    body: |
      - **Gas fire**: Indoor fireplace in the main living area. Turn off before checkout.
      - **Heated towel rails**: Present in bathrooms — turn off before checkout.

  - category: location
    heading: Getting Around
    body: |
      - Queenstown town centre is approximately 3 minutes by car or 15–20 minutes walking.
      - The house is on a quiet cul-de-sac on the Queenstown hillside with lake and mountain views.
