# yaml-language-server: $schema=../_schemas/policies.json
schema_version: 1
slug: 7-suburb

# Master access codes — internal only. Per-booking guest codes are generated
# separately via the smart-lock system.
access_codes:
  front_door_master: "2504#"
  garage: ""
  alarm: ""

# Sourced from 7-suburb.owner.md (2026-04-26 audit). Long-single position
# is TBC pending in-person bunk audit.
par_levels:
  - location: bedroom_1_master
    item: king_sheet_set
    par: 2
    notes: Has ensuite
  - location: bedroom_2
    item: queen_sheet_set
    par: 2
  - location: bunk_room
    item: standard_single_sheet_set
    par: 6
    notes: Covers 3 standard single bunks
  - location: bunk_room
    item: long_single_sheet_set
    par: 2
    notes: Covers the 1 long single bunk (position TBC)
  - location: bedroom_1_master
    item: king_pillowcase
    par: 2
  - location: bedroom_2
    item: queen_pillowcase
    par: 2
  - location: bunk_room
    item: standard_pillowcase
    par: 4
    notes: One per bunk

replacement_cycles:
  - item: pillows
    cycle_months: 12
  - item: mattress_topper
    cycle_months: 18
  - item: duvet
    cycle_months: 36
  - item: linens
    cycle_months: 24
  - item: towels
    cycle_months: 12
  - item: small_appliances
    cycle_months: 48
  - item: mattress
    cycle_months: 96

owner_setpoints:
  heating:
    winter_min_temp_c: null
    summer_max_temp_c: null

cleaning_standards_url: ""

known_issues:
  - description: >
      Garage button on the light-switch panel beside the front door is
      sometimes pressed accidentally by guests thinking it's a light switch
      (~8 prior incidents).
    severity: minor
