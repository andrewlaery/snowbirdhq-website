check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: lockbox
  instructions: >
    セルフチェックインはロックボックスをご利用ください。フラットと物置小屋の間を通り、屋外シンクのそばにロックボックスがございます。メインハウス用の別のロックボックスもございますので、ユニット用の正しいロックボックスをご使用ください（メインハウスのドアではございません）。コード1001は、ご到着の3日前に予約プラットフォームを通じてもお送りいたします。
check_out:
  time: '10:00'
wifi:
  network: flat
  password: flat1000
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: 07:00
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false
booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: true
pricing:
  base_nightly: 139.0
  cleaning_fee: 100.0
  extra_person_fee: 50.0
  weekly_discount:
  monthly_discount:
  currency: NZD
exceptions:
  hazards: []

  house_rules:
    - category: parking
      heading: 駐車場
      bullets:
        - 敷地内駐車スペースは車道（ドライブウェイ）に1台分のみとなります。
        - メインハウスの右側、エアコン室外機のそばに駐車してください。
        - 物置小屋の入口を塞がないようにしてください。
    - category: capacity
      heading: 定員
      bullets:
        - 最大2名様までとなります。厳守をお願いいたします。
        - ソファはお休みいただくのに適しておりません。

  access:
    front_door: >
      物置小屋を過ぎてフラットの周りを歩くと、屋外シンクのそばにロックボックスがございます。コードは1001です（ご到着の3日前に予約プラットフォームを通じてもお送りいたします）。
    back_door: ''
    garage: ''
    other: >
      メインハウスにも別のロックボックスがございます。ユニット用の正しいロックボックスをご使用ください。道路から郵便受け#100を目印に、ドライブウェイを上がってお越しください。

  notes:
    - ホスト（PaddyとBethan）は隣のメインハウスに在住しております。ご不明な点がございましたら、予約プラットフォームよりお気軽にお問い合わせください。
    - 日当たりの良い51㎡のワンベッドルームの平屋ユニットです。
    - トラベルコットとハイチェアは収納棚に保管しております。
    - ワードローブに予備の毛布をご用意しております。
    - ユニット内の水道水は安全にお飲みいただけます。
    - "ヘルメット付き自転車2台をお客様にご用意しております。入口付近に吊り下げてあります。敷地内での施錠は不要ですが、町へお出かけの際はご施錠ください。自転車錠の番号：**1990**。タイヤの空気が抜けることがありますので、空気入れが必要になる場合があります。おすすめのルート：川沿いにアローTownまたは自転車専用道を通ってクイーンズタウンまでサイクリングをお楽しみいただけます。"
    - 遅い時間のご到着の際は、到着予定時刻をホストにお知らせください。屋外照明と暖房をつけてお待ちいたします。
    - 停電の際は、Aurora Energyクイーンズタウン停電情報ページをご確認ください。
    - "チェックアウト時のお願い：食器洗い機を起動してください。ゴミは**青いふた（リサイクル）**または**赤いふた（一般ゴミ）**のビンへお入れください。使用済みタオルはシャワーの床に置いてください。すべてのドアと窓を施錠してください。**鍵はユニットのロックボックス（メインハウスのロックボックスではありません）にお返しください**。"

  usage_sections:
    - category: internet
      heading: インターネット／Wi-Fi
      body: |
        ネットワーク名とパスワードは上記のクイックリファレンスをご参照ください。
        光回線 500/100 Mbps（Lightspeed）をご利用いただけます。リモートワークのお客様には、10mのLANケーブルもご用意できますので、ご希望の際はお申し付けください。

    - category: kitchen
      heading: キッチン
      body: |
        フル装備のキッチンです。冷蔵庫、冷凍庫、**ガスコンロ（4口）**、電気オーブン、F&P食器洗い機（引き出しタイプ）、電気ケトル、トースター、鍋、フライパン、ステンレス調理器具をご用意しております。インスタントコーヒーとフィルターコーヒーをご用意しておりますが、エスプレッソマシンやコーヒープランジャーはございません。

        **ガスコンロ／オーブンの電源スイッチ：** 洗濯機の**上**にございます。ガスコンロやオーブンをご使用になる前に、必ずこのスイッチをONにしてください。火がつかない場合は、まずこのスイッチをご確認ください。「ガスがつかない」というお問い合わせの第一の原因となっております。

        **ガスコンロの点火方法：** バーナーのつまみを押し込んで点火し、火がついた後も数秒間押し続けてください。熱電対がガスバルブを開いた状態に保持します。

        **オーブンの点火方法：** 電源スイッチをONにした後、時計マークとその隣のマークを同時に数秒間押し続け、ディスプレイが点灯して点滅が止まるまでお待ちください。その後、機能と温度を設定してください。電源を切った後も冷却ファンが数分間動作することがありますが、正常な動作です。

        **食器洗い機（F&P引き出しタイプ）：** ハンドルを引いて引き出しを開けてください。中央にカトラリーバスケット、ラックに皿やカップをセットします。引き出し内側前面のディスペンサーに洗浄タブレットを入れてください。コース（Eco／Normal／Fast／Heavy）は前面のコントロールパネルで選択できます。引き出しをしっかり閉め、スタートボタンを押してください。チェックアウト前に運転をお願いいたします。**F1エラー**が表示された場合は水漏れを検知しておりますので、壁のコンセントから電源を切り、ホストにご連絡ください。再起動を繰り返さないようにしてください。

    - category: heating
      heading: 暖房・冷房
      body: |
        **リバースサイクルヒートポンプ／エアコン** — 暖房・冷房両方に対応しています。リモコンはユニットのそばまたはダイニングテーブルの上に置いてあります。モード：暖房／冷房／除湿／自動／送風。

        冬季や遅い時間のご到着の際は、ホストが事前に室内を温めております。暖かいお部屋にお入りいただけます。

        **晴れた日のヒント：** 日中はブラインドを開けておいてください。引き戸からの日差しでフラットが自然に温まり、エアコンの稼働を抑えることができます。

    - category: workspace
      heading: ワークスペース
      body: |
        キッチン隣の「スナッグルーム」をワークスペースとしてご利用いただけます。デスク（1500mm × 750mm）をご用意しております。

    - category: location
      heading: 周辺のご案内
      body: |
        - ローワー・ショトーバー — 静かで日当たりが良く、山々の眺めをお楽しみいただけます。
        - クイーンズタウン空港 — 車で10〜15分。空港タクシーは約50〜70ニュージーランドドル。
        - クイーンズタウン市街地 — 車で約10分。
        - バス停 — 徒歩約5分。キッチンの引き出しにBeeカードがある場合があります。
        - 5 Mile Shopping Centre — 車で約7分（携帯ショップ、小売店など）。
        - クイーンズタウンではUberをご利用いただけます。
        - 小規模スーパーマーケット — 徒歩約7分。
        - Frank's Coffee / 11th Avenue by Franks — 坂を少し上がったところにございます。
        - アローTown — 車で10分（カフェ、ショップ、歴史的スポットなど）。
        - Ayrburn — アローTown近郊、食事におすすめです。

    - category: appliances
      heading: 家電のご案内
      body: |
        - **洗濯機**：エコ洗剤をご用意しております。前面のダイヤルでコースを選択し、洗剤を入れてスタートボタンを押してください。部屋干し用の洗濯物干しもご利用いただけます。（なお、ガスコンロとオーブンの電源スイッチは**洗濯機の上**にございます。）
        - **衣類乾燥機**：ユニット内にございます（古い案内に「乾燥機なし」と記載されている場合がありますが、現在はご利用いただけます）。
        - **スマートテレビ**：Netflixを無料でご利用いただけます。ゲスト用プロフィールをご使用いただき、お客様ご自身のアカウントでのサインインはご遠慮ください。テレビにUSBポートがございます。DVDプレーヤーはありません。リモコンは電源、音量、入力切替の標準的な操作に対応しています。
        - **ヒートポンプ／エアコン** — 詳しくは上記「暖房・冷房」のセクションをご参照ください。
