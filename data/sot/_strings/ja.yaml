# UI chrome strings — English (canonical).
#
# Translated to other locales via scripts/translate-property.mjs --file.
# Read by `loadStrings(lang)` in src/lib/sot.ts.
#
# Add a string here whenever a guest-facing word appears in a component
# anywhere outside the SOT data layer. The build CI fails if any UI string
# longer than ~40 chars is found in `src/components/` not sourced via this
# file (Phase D's lint guard).

landing_nav:
  aria_label: 物件ガイドのセクション
  sections:
    welcome_house_rules:
      num: "01"
      eyebrow: ようこそ
      title: ようこそ・ハウスルール
      description: チェックイン、ハウスルール、駐車場、アクセス方法、ご到着時の注意事項についてご案内します。
      cta: ウェルカムガイドを読む
    user_instructions:
      num: "02"
      eyebrow: ご利用案内
      title: ご利用案内
      description: WiFi、家電製品、暖房、入室コード、室内設備の使い方をご説明します。
      cta: 利用ガイドを読む
    critical_info:
      num: "03"
      eyebrow: 重要情報
      title: 重要情報
      description: 緊急連絡先、安全に関する手順、必ずご確認いただきたい重要事項をまとめています。
      cta: 重要ガイドを読む
    queenstown_insights:
      num: "04"
      eyebrow: 地元情報
      title: クイーンズタウン現地情報
      description: 地元のおすすめスポット、穴場情報、レストラン、近隣のアクティビティをご紹介します。
      cta: ローカルガイドを見る
    ask:
      num: "05"
      eyebrow: ご質問
      title: なんでも聞いてください
      description: スパ、WiFi、チェックインなど、この物件についてAIガイドにお気軽にご質問ください。
      cta: チャットを始める

property_landing:
  eyebrow: ゲストガイド
  intro: "{propertyName}へようこそ。ご滞在中に必要な情報は、以下のリンクからご確認ください。"

ask_chat:
  intro: "{propertyName}またはクイーンズタウンについて、何でもお気軽にお尋ねください。この物件のガイドおよびクイーンズタウン現地情報をもとにお答えします。"
  suggested_aria: よくあるご質問
  thinking: 考え中…
  error_generic: エラーが発生しました。しばらくしてからもう一度お試しください。
  placeholder: この物件について質問する…
  send: 送信
  suggestions:
    - スパプールはどのように使いますか？
    - WiFiのパスワードを教えてください。
    - チェックアウトは何時ですか？
    - 食料品はどこで買えますか？

