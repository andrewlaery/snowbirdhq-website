# Property-specific exceptions — facts that don't fit any other field but
# must be surfaced to guests. Renderers consume each subsection:
#   <PropertyHazards slug>          -> exceptions.hazards
#   <PropertyHouseRulesDeltas slug> -> exceptions.house_rules
#   <PropertyAccessInstructions slug> -> exceptions.access
#   <PropertyOperationalNotes slug>  -> exceptions.notes
exceptions:
  hazards:
    - description: >
        Driveway has blind areas when manoeuvring vehicles. Use extreme
        caution and have another person watch for children if needed.
      severity: minor
    - description: >
        Large unfenced drop-off areas in various parts of the garden. Don't
        leave children unsupervised and familiarise yourself with the
        surrounding area on arrival.
      severity: minor
    - description: >
        Driveway and outdoor stairs become very icy after snow as freeze
        and thaw action occurs. Use the driveway with caution; fit snow
        chains if road conditions warrant.
      severity: minor

  house_rules:
    - category: parking
      heading: Parking
      bullets:
        - Park all vehicles within the driveway (avoid street parking).
        - Cars can be parked one behind the other (tandem style); the driveway accommodates up to 3 vehicles.
        - Bus/coach drop-offs or pickups are not permitted at the property.
        - No designated mobility parking space, but the driveway is accessible for loading and unloading. Note the house is accessed via stairs, which may not suit guests with mobility requirements.
    - category: luggage
      heading: Luggage & Equipment
      bullets:
        - Small luggage can be stowed at the foot of the beds; suitcases and larger items can go in the garage.
        - No sports equipment allowed inside the house (golf, snowboards/skis/boots, bicycles, etc.) — please store in the garage.
        - The garage includes a clothes rack for drying ski gear and power points for charging e-bikes.
        - An outdoor sunny clothes rack is located at the rear of the house for additional drying needs.

  access:
    front_door: >
      Unique access code provided as part of your booking information.
      Press # after entering the code.
    garage: Bottom button on the light switch panel beside the front door.
    back_door: >
      Has a separate code. The back-door handle requires firm pressure.
    other: ""

  notes:
    - The house alarm is not in operation during your stay.

  # Property-level operational prose (heating, lighting, internet, kids etc.).
  # Body is Markdown — render via <PropertyUsageSections slug="..." />.
  usage_sections:
    - category: internet
      heading: Internet / Wi-Fi
      body: >
        The Wi-Fi network name is shown above in the Quick Reference. Your
        password is provided on the welcome card at check-in.

    - category: heating
      heading: Heating
      body: |
        Located in New Zealand's Southern Alps, Queenstown's climate can vary
        wildly — 30°C+ one day, near-freezing the next. Achieving the perfect
        temperature in the house can take some doing.

        Wright's Garden has a **Daikin Central Heating System** that provides
        even and consistent temperatures throughout. The system is pre-set at a
        level that suits most people. Several rooms allow temperature
        adjustments — let the host know if anything feels off.

        In cold weather, keep doors and windows closed to retain heat. For
        comfort: adjust clothing first, contact the host if the temperature
        is still wrong.

        When leaving the house for periods of time in cooler weather, please
        ensure all doors and windows are closed so the house stays at a good
        temperature for your return.

        **Underfloor Heating** is installed in both bathrooms and the laundry.
        Each room has an LED panel switch on the wall that controls the
        underfloor heating — press the panel to turn it on.

        **Heated towel rails** in the bathrooms are controlled separately by
        a switch on the wall beside the towel rail itself (not from the LED
        panel). Please switch both the underfloor heating and the heated towel
        rails off when checking out.

    - category: lighting
      heading: Lighting
      body: >
        All lights are controlled by wall switches near their location.
        Several rooms (including bedrooms) have dimmers — if lights flicker,
        press and hold the dimmer switch until it reaches full brightness to
        stop the flickering.

    - category: children
      heading: Children's Amenities
      body: |
        - **Toys:** the variety of children's toys can be found in the cupboard
          in the living room.
        - **Cutlery:** the kitchen comes with a set of children's cutlery — in
          the kitchen drawers.
