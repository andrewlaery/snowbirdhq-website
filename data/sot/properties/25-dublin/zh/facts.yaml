features: []
parking:
  spaces: 4
  type: driveway
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    通过前门智能门锁自助入住。您的专属访问码将在抵达前 24 小时通过预订平台发送。
    如果入住时访问码无法使用，请联系房东——访问码有时需要远程重新激活。
check_out:
  time: '10:00'
wifi:
  network: SnowbirdQT
  password: Namaste99
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'CCTV outside property' per ota-manager booking_specific
  noise_monitor: true  # Minut noise monitor per owner.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: false
pricing:
  base_nightly: 1000.0
  cleaning_fee: 500.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        车道存在盲区，车辆进出时请格外小心，如有儿童在场，请安排另一人在旁监看。
      severity: minor
    - description: >
        花园多处存在较大的无围栏陡降区域。请勿让儿童独自在花园活动；抵达后请先熟悉周边环境。
      severity: minor
    - description: >
        楼梯间——请勿让幼儿在楼梯上玩耍，以免跌落受伤。
      severity: minor
    - description: >
        降雪后，车道及户外台阶因反复冻融极易结冰，请谨慎通行；如道路条件需要，请为车辆安装防滑链。
      severity: minor
    - description: >
        浴缸／水疗浴缸——蓄水时请勿让幼儿独自在旁；使用完毕后请立即放水排空。
      severity: minor
    - description: >
        露台烧烤炉——存在油脂起火风险。请保持炉具清洁，使用期间全程看管，并确保使用后完全熄灭。
      severity: minor
    - description: >
        柴火炉——无人看管时儿童有烫伤风险。请遵照使用手册中的操作说明。
      severity: minor
    - description: >
        窗户／推拉门——请勿将幼儿单独留在可轻易触及窗户或推拉门的房间内。
      severity: minor

  house_rules:
    - category: parking
      heading: 停车
      bullets:
        - 仅限在车道上的指定位置进行场外停车，请停在提供的车位内。
        - 车道及车库合计可停放最多 4 辆车。
    - category: spa-pool
      heading: 水疗泳池／热水浴缸
      bullets:
        - 使用水疗设施须自担风险。
        - "**成人须全程监管儿童**，无论儿童在水疗池内还是池边。"
        - "**不使用时请锁好水疗池盖**——水疗池钥匙的位置及池盖操作方法，请参阅用户说明中的 [水疗泳池／热水浴缸](/docs/properties/25-dublin/user-instructions#appliances-wellness) 部分。"
        - 入池前请先淋浴，以保持水质清洁。
        - "**仅限使用氯消毒剂**——禁止加入气泡剂、发泡剂、浴盐或其他任何物质。"
        - "**禁止在水疗池内及周边放置食物、饮料或玻璃器皿。**"
        - 饮酒后请勿使用水疗设施。

    - category: keys-remotes
      heading: 钥匙与遥控器
      bullets:
        - 退房时，请将所有门禁钥匙及车库遥控器放在厨房操作台上。
        - 如有钥匙或车库遥控器丢失，将收取相应费用。

    - category: wood-burner
      heading: 工作室柴火炉
      bullets:
        - "**柴火炉使用期间请勿离开**——壁炉燃烧时，工作室内须始终有成人在场。"
        - "**火焰燃烧时，成人须全程监管儿童**；炉门、炉玻璃及炉身周围温度极高。"
        - 仅使用房内提供的柴火和引火物——禁止燃烧垃圾、经处理的木材或助燃剂。
        - "**切勿将炉灰倒入垃圾桶或任何通风处**——余烬可能复燃并引发火灾。"
        - 操作说明（点火、炉门操作、炉灰冷却）请参阅 [用户说明 → 工作室柴火炉](/docs/properties/25-dublin/user-instructions#appliances-heating)。

    - category: gas-fire
      heading: 楼上燃气壁炉
      bullets:
        - 仅在人员在场时使用，不建议作为主要供暖热源。
        - "**燃气壁炉开启时，成人须全程监管儿童**；玻璃炉门温度极高。"
        - 壁炉正前方 1 米范围内，请勿放置布料、纸张或其他易燃物品。
        - 操作说明（点火、定时、关闭）请参阅 [用户说明 → 燃气壁炉](/docs/properties/25-dublin/user-instructions#appliances-heating)。

    - category: bbq
      heading: 户外烧烤炉
      bullets:
        - "**仅限在开阔的花园区域户外使用**——严禁在遮盖物下或车库内使用。"
        - 烧烤炉点火后，成人须全程监管儿童。
        - "**烧烤炉点燃期间请勿离开。**"
        - 操作说明（点火、开盖顺序、清洁、关火）请参阅 [用户说明 → Weber Q3200 烧烤炉](/docs/properties/25-dublin/user-instructions#appliances-outdoor)。

    - category: insinkerator
      heading: Insinkerator（厨余垃圾处理器）
      bullets:
        - "**请勿将手伸入处理器内**，即使在关闭状态下也不例外。"
        - "**以下物品严禁投入**：骨头、果核、油脂、蛋壳、咖啡渣、纤维蔬菜（芹菜、玉米皮等）及非食物类物品——这些会导致机器卡塞或损坏，并可能产生维修费用。"
        - 操作说明（冷水使用、开关位置、卡塞处理）请参阅 [用户说明 → Insinkerator](/docs/properties/25-dublin/user-instructions#appliances-kitchen)。

  access:
    front_door: >
      通过智能门锁自助入住。您的专属访问码将在抵达前 24 小时通过预订平台发送。
    garage: 随房提供 1 个车库遥控器，退房时请携带入内归还。
    back_door: ''
    other: >
      水疗池盖专用塑料钥匙随车库遥控器一同提供。

  notes:
    - 房屋警报系统在您入住期间不启用。
    - 急救箱位于厨房储藏柜内（左侧上层搁板）。
    - 灭火器位于厨房水槽下方柜内。
    - 燃气总阀位于入口楼梯间右侧、靠车库一侧。
    - 紧急情况下，请从前门疏散，集合地点为车库外的车道处。
