exceptions:
  hazards:
    - description: 外部階段 — 駐車場からアパートメントまで2階分の階段があります。お荷物をお持ちの際はご注意ください。濡れている場合や凍結している場合は特に慎重にお歩きください。
      severity: minor
    - description: バルコニー — 上層階のバルコニーで、下の共用スペースへの落下の危険があります。通常の注意を払ってご利用ください。
      severity: minor
    - description: 隣接する建設現場（2026年末頃に完工予定）— ゴミ箱への通路が不均一であったり、通行が妨げられる場合があります。平日の午前7時45分頃から午後6時頃にかけて、重機やパイリングリグによる大きな作業音が発生します。耳栓は市内のLife Pharmacy Wilkinsonsにてお求めいただけます。
      severity: minor
    - description: 道路交通騒音 — アパートメントはフランクトン・ロードに面しているため、寝室で交通騒音が聞こえる場合があります（二重窓により軽減されますが、完全には遮断できません）。音に敏感なお客様は耳栓のご使用をお勧めします。
      severity: info
    - description: フライトパス — 物件はクイーンズタウン空港のフライトパス直下に位置しており、日中に航空機の騒音が聞こえる場合があります。
      severity: info
  house_rules:
    - category: parking
      heading: 駐車場
      bullets:
        - "**専用駐車スペース6A**がこのアパートメントに割り当てられています — 無料で、階段の下にございます。"
        - ご到着時に6Aに他の車が駐車されていた場合は、お知らせください。その際は一時的に空いているスペースをご利用ください。
        - "**市街地の駐車場**：レイクフロントに無料駐車場があります（台数限定）。Camp StreetおよびMan Streetには有料駐車場があり、Man Streetには一部無料スペースもあります（青い標識にて時間制限をご確認ください）。"
        - "**その他・日帰り駐車**：Goldfield Heightsには時間制限のない路上駐車スペースがあります。"
    - category: body-corporate
      heading: ボディコーポレート規則
      bullets:
        - "**バルコニーへの洗濯物の干し出し禁止** — ボディコーポレートの規則です。室内の乾燥ラック、または敷地内の別棟にある共用乾燥機をご利用ください。"
        - "**バルコニーでの喫煙・電子タバコの使用禁止** — ボディコーポレートの規則です（室内全面禁煙のルールに加えて適用されます）。"
    - category: rubbish-recycling
      heading: ゴミ・リサイクル
      bullets:
        - ゴミ箱はアパートメントの敷地内にあります。正確な場所はキッチンテーブルの上の黒いブックレットをご覧ください。
        - 緑色のゴミ袋をご用意しています。
        - "**このアパートメント複合施設にはリサイクル設備がありません** — 一般ゴミとしてお出しください。"
    - category: parcel-delivery
      heading: 荷物の受け取り
      bullets:
        - "滞在中に荷物を受け取る必要がある場合は、代わりに次の住所をご利用ください：**Mountain Club, 85 Beach Street, Queenstown 9300**（宛名：**SnowbirdHQ**）。"
        - これにより、宅配業者が開放された共用スペースに荷物を放置することを防ぐことができます。
  access:
    front_door: >
      手順1 — 駐車場から：専用スペース6Aを目印に、右側の階段を上り、さらに2つ目の階段を上ってバルコニーへお進みください。

      手順2 — お部屋の確認：バルコニーに出て右側の最初のドアが6Aです。

      手順3 — 鍵の取り出し：玄関ドアの右側にロックボックスが取り付けられています。ご到着2日前にお送りするアクセスコードを入力し（数字の位置を合わせてください）、スロットを下に引いて鍵を取り出してください。同じ鍵で玄関ドアとバルコニードアの両方を開けることができます。
    back_door: ''
    garage: ''
    other: ''
  notes:
    - 滞在中、アパートメントの警報装置は作動しておりません。
    - 煙感知器と消火器が設置されています。
    - 緊急時は玄関ドアから退出し、2階分の階段を降りてください。集合場所は建物から安全な距離を保った駐車場です。
    - キッチンテーブルの上の黒いブックレットに、Wi-Fi情報、家電の使い方、ゴミ箱の場所が記載されています。
    - "**キッチンテーブルのウェルカムギフト：**Boat Shed Cafeの無料コーヒー券と、Canyonビール券をご用意しております。ぜひお楽しみください。"
    - "**建設工事のお知らせ：**隣接するアパートブロックが現在建設中です（2026年末頃に完工予定）。平日の午前7時45分から午後6時頃にかけて大きな作業音が発生します。また、建設現場はバルコニーから見え、湖の景色の一部が遮られています。"
  usage_sections:
  - category: internet
    heading: インターネット／Wi-Fi
    body: >
      ネットワーク名とパスワードはクイックリファレンスに記載されています。モデムはテレビの右側、グレーのコーナーチェアの下にあります。接続に問題が生じた場合は、電源を入れ直してください。Wi-Fi情報はキッチンテーブルの黒いブックレットにも記載されています。

  - category: heating
    heading: 暖房
    body: |
      - **ヒートポンプ**（ラウンジ）：リモコン操作 — 暖房・冷房にご利用ください。寒い時期はドアと窓を閉めたままご使用ください。
      - **パネルヒーター**は寝室のクローゼット内にあります — 寝室の補助暖房としてご利用ください。
      - 寝室はフランクトン・ロードに面しているため、道路交通騒音が聞こえる場合があります。二重窓により軽減されますが完全には遮断できません。音に敏感なお客様は耳栓やホワイトノイズアプリのご利用をお勧めします。

  - category: location
    heading: 周辺の移動について
    body: |
      - 道路の真向かいにバス停があります（Connectabus — クイーンズタウン市街地まで約10分）。
      - クイーンズタウン空港まで車で約10分。
      - レイクフロント沿いの近隣カフェやCargo Breweryまで徒歩約15分。
      - クイーンズタウン市街地まで：道路沿いの歩道を経由して徒歩約45〜60分。湖畔の遊歩道は現在通行止めです。
      - 市街地までUberで約15〜20ドル。

  - category: appliances
    heading: 家電・設備のご案内
    body: |
      - **洗濯機**（縦型、バスルーム内）：室内に乾燥機はありません — 乾燥ラックをご利用ください。敷地内の別棟にコイン式の共用乾燥機があります。
      - **ガスコンロ**：通常通りご使用ください。
      - **電気オーブン**：キッチン右側の壁にあるメインスイッチをオンにしないとオーブンが加熱されません。グリル設定のラベルが摩耗して読めなくなっている点をご了承ください。
      - **ヒートポンプ**：リモコン操作（暖房・冷房）。ラウンジでご使用ください。
      - **パネルヒーター**：寝室のクローゼット内 — 寝室の補助暖房としてご利用ください。
      - **アイロンとアイロン台**：バスルームにあります。
      - **テレビ**：HDMI 1にFreeviewスティックが接続されています。リモコンは2つあります — 大きいリモコンで電源・入力切替（「Source」→「HDMI 1」を選択）、小さいリモコンでFreeviewおよびNetflixの操作を行います。
      - **掃除機**：ガラス製スライディングバルコニードアの横にあります。
