# yaml-language-server: $schema=../_schemas/facts.json
schema_version: 1
slug: 25-dublin
capacity:
  max_guests: 9
  max_adults: 7
  min_age_lead_guest: 25
# Bed layout per ota-manager listing.md prose (owner-confirmed 2026-04-27).
# Note: BedType schema has no "king_single" — modelled as long_single.
bedrooms:
  - name: Bedroom 1 (Master)
    bed: super_king
    ensuite: true
    notes: Upper level. Walk-in closet.
  - name: Bedroom 2
    ensuite: true
    beds:
      - super_king
      - single
    notes: Main level. Includes a single bunk bed.
  - name: Bedroom 3
    ensuite: true
    beds:
      - super_king
      - long_single
      - single
    notes: >
      Main level. Includes 1 king-single + 1 single trundle. Known issue:
      draft from the bottom of the large window (may feel cooler).
