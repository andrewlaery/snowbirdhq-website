      フロントドア横にロックボックスがございます。コードは3411です（ご到着の24時間前に予約プラットフォームからもお送りいたします）。
    back_door: ''
    garage: ''
    other: >
      ショットオーバー・ストリートのキャニオン・スウィングとケバブショップの間の路地よりお入りください。Googleマップではアパートに直接ナビできない場合がございますので、予約プラットフォームにてお送りした写真付きのご案内に従ってお進みください。

  notes:
    - モデムは上階のベッドルームにございます。Wi-Fiが不安定な場合は、電源を一度切ってから入れ直してください。
