exceptions:
  hazards:
    - description: >
        车道在车辆倒车时存在视野盲区，请格外小心，如有需要请安排他人留意儿童安全。
      severity: minor
    - description: >
        花园多处存在大面积无围栏陡降区域。请勿让儿童单独在此活动；抵达后请自行熟悉周边环境。
      severity: minor
    - description: >
        楼梯间——请勿让幼儿在楼梯上玩耍，以免跌落受伤。
      severity: minor
    - description: >
        车道及户外台阶在下雪后因反复冻融极易结冰，请谨慎使用车道；如路况需要，请为车辆安装防滑链。
      severity: minor
    - description: >
        浴缸／水疗浴缸——当浴缸盛满水时，请勿让幼儿单独使用。使用完毕后请立即放水。
      severity: minor
    - description: >
        甲板上的烧烤炉——存在油脂起火风险。请保持清洁，使用时全程看管，并确保使用后完全熄灭。
      severity: minor
    - description: >
        木柴壁炉——幼儿单独接触存在烫伤风险。请遵照房屋手册中的操作说明使用。
      severity: minor
    - description: >
        窗户／推拉门——请勿将幼儿单独留在可轻易触及窗户或推拉门的房间内。
      severity: minor

  house_rules:
    - category: parking
      heading: 停车须知
      bullets:
        - 仅限在车道上的指定位置停放车辆，请勿在路边停车。
        - 车道及车库共可停放最多4辆车。
    - category: spa-pool
      heading: 水疗泳池／热水浴缸
      bullets:
        - 请使用随车库遥控器一同存放的塑料钥匙解锁水疗池盖。
        - 入池前请先淋浴，以保持水质洁净。
        - 仅可添加氯消毒剂——请勿加入泡泡浴液、发泡剂或其他任何物质。
        - 请勿将食物、饮料或玻璃器皿带入水疗池内或附近区域。
        - 使用完毕后请盖回水疗池盖。
        - 使用须自负风险；请全程看管儿童，并避免在饮酒后使用。
    - category: keys-remotes
      heading: 钥匙与遥控器
      bullets:
        - 退房时，请将所有门禁钥匙及车库遥控器放在厨房台面上。
        - 如有钥匙或车库遥控器丢失，将收取相应赔偿费用。

  access:
    front_door: >
      通过智能门锁自助入住。您的专属访问码将在抵达前24小时通过预订平台发送。
    garage: 提供1个车库遥控器。退房时请将其带至室内放好。
    back_door: ''
    other: >
      水疗池盖塑料钥匙随车库遥控器一同提供。

  notes:
    - 房屋警报系统在您入住期间不运行。
    - 急救箱位于厨房食品柜中（左侧上层搁板）。
    - 灭火器位于厨房水槽下方。
    - 燃气截止阀位于入口楼梯间右侧靠车库一侧。
    - 紧急情况下，请从前门撤离。集合点位于车库外的车道处。

  usage_sections:
    - category: internet
      heading: 网络／Wi-Fi
      body: >
        网络名称和密码已在上方快速参考栏中列出。WiFi速度额定250+ Mbps。

    - category: heating
      heading: 供暖指南
      body: |
        Snowbird 位于新西兰南部阿尔卑斯山区，气温变化幅度极大（从30°C以上到接近冰点）。房屋配备**混凝土地暖板**，可将室内温度保持在舒适的预设水平。墙暖器已集成至全屋供暖系统。

        **重要提示——温度调节需要时间。** 由于供暖通过地板混凝土板运行，调节效果需2至4小时才能显现。请提前规划——如果您感觉寒冷，请尽早联系房东，以便我们进行调整。

        **壁炉与地暖的相互影响。** 在起居室书房使用木柴炉时，地暖系统在一楼卧室的供热输出会有所降低。如您晚间使用壁炉，请关闭卧室门以保留室内热量。壁炉熄灭后，地暖系统会逐渐恢复平衡（因混凝土板蓄热特性，恢复较慢）。

        **保持舒适的建议。** 寒冷时段请关闭所有门窗，以保留蓄热。根据个人偏好适当增减衣物。如需调节温度，请联系房东。

        **外出时。** 天气较凉时，请关闭所有门窗，以便回来时室内仍保持温暖。

        **顶层主卧使用提示。** 由于热气上升，该房间温度调节可能较为困难：
          - 关闭所有卧室门（入口门和浴室门）。
          - 关闭中庭推拉窗／门。
          - 根据需要开启1至3扇窗户进行微调。
          - 使用提供的落地风扇增加空气流通。

        **墙暖器**已与全屋系统完全集成，无需手动调节。

    - category: gas-fire
      heading: 燃气壁炉（楼上客厅）
      body: |
        不建议作为主要热源使用——在楼上客厅使用期间按需开启即可。燃气壁炉通过遥控器操作，遥控器挂在同一房间的墙上。

        1. 按下壁炉遥控器正下方黑色开关上的**顶部按钮**（此操作为燃气壁炉通电）。
        2. 按遥控器上的**电源键**。确认数字显示屏上出现温度数值（若未显示，请再次按电源键）。
        3. 壁炉点火需要几秒钟时间。
        4. 燃气壁炉设有**60分钟定时器**——如需继续使用，请重复上述步骤重新点火。
        5. 使用完毕后请务必关闭燃气壁炉。

    - category: wood-burner
      heading: 书房木柴炉（客厅／餐厅）
      body: |
        - 向上提起把手以开关炉门。
        - 使用木柴箱中提供的引火物点火。
        - 点火初期及玻璃升温过程中，请将炉门稍微留缝（可避免玻璃产生冷凝水）。
        - 火势稳定后关闭炉门并锁好。
        - 请勿将炉门开着不关——过度燃烧会损坏设备。
        - 请使用提供的篮子从车库中收取柴火／引火木。
        - 开关炉门时，请仅触碰正面的木质旋钮。
        - 请勿将灰烬倒入垃圾桶或任何处于大风环境中的区域。
        - 若灰烬堆积过多，请联系房东。

    - category: spa-control
      heading: 水疗控制面板
      body: |
        - 水温已预设至舒适且安全的水平。
        - 按**JETS**键开启／关闭水疗喷射功能。
        - 按**LIGHTS**键开启／关闭水下照明。
        - **若面板显示已锁定**（出现锁形图标或按键无响应）：同时按住**OPTIONS + LIGHTS**键3至5秒。

    - category: bins
      heading: 垃圾与回收
      body: |
        - 红色垃圾桶（普通垃圾）：每周三收取。
        - 蓝色垃圾桶（玻璃）和黄色垃圾桶（混合可回收物）每隔一周的周三交替收取。
        - 请访问以下链接确认具体时间表：
          <https://www.qldc.govt.nz/services/rubbish-recycling/rubbish-recycling-collection/>
          或观察邻居当天放出的是哪种垃圾桶。
        - 请在周三早上7点前或前一天晚上将垃圾桶放至车道旁的路边，并在周三傍晚前将垃圾桶收回。

    - category: gas-hob
      heading: 博世燃气灶
      body: |
        按下烤箱面板上对应的旋钮并旋转，直至灶头点火。根据所需火力大小进行调节。

    - category: insinkerator
      heading: 厨余垃圾处理器
      body: |
        按下水龙头右侧的银色按钮即可启动厨余垃圾处理系统。请确保在使用过程中保持水流畅通。

        该按钮为**气动按钮**——若水槽中的水渗入按钮，可能影响其正常工作。按钮会在数小时后自动恢复正常。

    - category: laundry
      heading: AEG洗衣机 + 烘干机
      body: |
        **AEG洗衣机（下方设备）。**
        - 按**开／关**键启动。
        - 洗涤剂请放入左侧的抽屉托盘。
        - 通过旋转旋钮选择所需洗涤程序。
        - 按**开始／暂停**键。
        - 不使用时请将洗衣机门保持开启状态。
        - 洗衣粉存放在洗衣槽下方。

        **AEG烘干机（上方设备）。**
        - 按**开／关**键启动。
        - 通过旋转旋钮选择烘干程序。
        - 选择所需烘干程度。
        - 按**开始／暂停**键。
        - 每次使用烘干机后，请检查并清洁烘干机门底部内侧的棉絮过滤网。

    - category: ironing
      heading: 熨烫
      body: |
        洗衣房内备有熨斗和熨衣板，供您方便使用。

    - category: children
      heading: 儿童设施
      body: |
        - **玩具、儿童高脚椅、婴儿浴盆、婴儿床、婴儿摇椅：** 存放在入口门附近的橱柜中。
        - **儿童餐具：** 在厨房抽屉内。
        - **Baby Jogger City Elite婴儿车**（存放于车库）。可轻松折叠收纳。视频使用指南：
          <https://www.youtube.com/watch?v=GhoxKWnKyaM>
        - **Baccani CIBO婴儿高脚椅。** 易于组装，易于清洁。组装视频：
          <https://m.facebook.com/baccaniprams/videos/baccani-cibo-high-chair-%EF%B8%8F-easy-convert-to-a-rocking-chair-configuration-in-secon/3572046306188221/>
        - **BabyBjorn旅行婴儿床／折叠床。** 安装视频：
          <https://www.youtube.com/watch?v=o9PFPagfnuk>

    - category: electric-blinds
      heading: 电动百叶窗
      body: |
        如需操作燃气壁炉房间内的两层大型电动百叶窗，请使用窗户右侧艺术品下方的**按压**按钮。这些百叶窗也可在主卧室内进行控制。

    - category: electric-windows
      heading: 电动窗户
      body: |
        如需操作前门附近浴室的电动窗户，请使用与灯光开关同一面板上的**按压**按钮。离开时请确保窗户已关闭。
