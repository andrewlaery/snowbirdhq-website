  usage_sections:
  - category: internet
    heading: 网络 / Wi-Fi
    body: >
      网络名称和密码已在上方"快速参考"部分列出。调制解调器位于电视右侧、灰色转角椅下方——如遇网络连接问题，请将其重启。Wi-Fi 信息也可在厨房桌上的黑色手册中找到。

  - category: heating
    heading: 暖气
    body: |
      - **热泵**（客厅）：遥控操作，可用于制热和制冷。寒冷天气请关好门窗。
      - **电热板**位于卧室橱柜内，可为卧室提供额外供暖。
      - 卧室朝向弗兰克顿路，室内可听到道路交通噪音。双层玻璃有一定隔音效果，但无法完全屏蔽——睡眠较浅的客人可考虑使用耳塞或白噪音应用程序。

  - category: location
    heading: 出行指南
    body: |
      - 公交站就在对面（Connectabus，约10分钟可达皇后镇市中心）。
      - 皇后镇机场距此约10分钟车程。
      - 沿湖畔步行至附近咖啡馆及 Cargo Brewery：约15分钟。
      - 步行至皇后镇市中心：沿路边步道约需45至60分钟。湖边步道目前暂时关闭。
      - 打车（Uber）至市中心约需15至20新西兰元。

  - category: appliances
    heading: 家电使用说明
    body: |
      - **洗衣机**（顶开式，位于浴室内）：房内无烘干机，已提供晾衣架。公用投币烘干机位于园区内另一栋楼。
      - **燃气灶**：正常操作使用即可。
      - **电烤箱**：厨房右侧墙上有一个电源总开关，使用前须确认已开启，否则烤箱将无法加热。请注意烧烤档的标签已磨损脱落。
      - **热泵**：遥控操作（制热及制冷），请在客厅使用。
      - **电热板**：位于卧室橱柜内，提供卧室额外供暖。
      - **熨斗及烫衣板**：位于浴室内。
      - **电视**：Freeview 电视棒连接至 HDMI 1 接口。共有两个遥控器——较大的遥控器用于开关电源及切换信号源（按"信号源"后选择 HDMI 1）；较小的遥控器用于操作 Freeview 及 Netflix。
      - **吸尘器**：位于玻璃推拉阳台门旁。
