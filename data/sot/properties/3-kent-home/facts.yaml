  - name: 'Downstairs — extra bed nook (the ".5")'
    bed: single
    ensuite: false
    notes: >
      Windowless nook with single bed (suitable for kids only — no door).
      Owners refer to this as the ".5" in "2.5 bedrooms".
bedroom_count: 6.5
bed_count: 7  # Conservative — actual layout TBC
