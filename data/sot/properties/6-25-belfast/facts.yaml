parking:
  spaces: 1
  type: garage
  garage: true
  garage_remote: false
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: lockbox
  instructions: >
    Self check-in via key lockbox beside the letterboxes. Use the code
    sent in your check-in documentation to access the lockbox — you'll
    find a FOB and a key. The FOB gives access to the building gate and
    the front door; the key opens the guest lockup in the garage. Wait
    1 second after using the FOB, then gently pull the door towards you
    before opening it. **Only swipe the FOB once per entry** — multiple
    swipes may trigger the building alarm (swipe again to disarm if
    triggered).
check_out:
  time: '10:00'
wifi:
  network: SkyCrest
  password: Namaste25
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: 07:00
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false
booking_terms:
  min_nights: 3
  max_nights: 27
  cancellation_policy: strict
  instant_bookable: false
pricing:
  base_nightly: 3000.0
  cleaning_fee: 300.0
  extra_person_fee: 0.0
  weekly_discount:
  monthly_discount:
  currency: NZD
exceptions:
  hazards:
    - description: >
        Spa pool / hot tub — supervise children at all times. Use is at
        your own risk; avoid use under the influence of alcohol.
      severity: minor
    - description: >
        Sauna — high temperatures. Limit sessions to 15–20 minutes;
        children should always be supervised.
      severity: minor
    - description: >
        Stairs to top floor — watch your footing, especially with
        luggage. A lift serves the main floor.
      severity: info

  house_rules:
    - category: parking
      heading: Parking
      bullets:
        - Single garage access via the FOB. Open from inside via the buttons near the building access door.
    - category: building
      heading: Building Access
      bullets:
        - Only swipe the FOB once per entry — multiple swipes may trigger the building alarm. Swipe again to disarm if triggered.
        - The front-door intercom does NOT work — there's no doorbell from the building gate.

  access:
    front_door: >
      Use the FOB to access the front door. Wait 1 second after using the
      FOB, then gently pull the door towards you before opening it. Only
      swipe once per entry to avoid triggering the building alarm.
    back_door: ''
    garage: >
      Open and close using the FOB outside the door, or the buttons inside
      the garage near the building access door.
    other: >
      The front gate may be locked — use the FOB to gain access.

  notes:
    - The house alarm is not in operation during your stay.
    - Lift serves the main floor; stairs continue to the top floor.
