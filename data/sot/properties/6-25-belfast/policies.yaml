known_issues:
  - 'SAFETY: kitchen knives dangerously dull; largest knife broken at handle/blade junction (Feb 2026) — needs immediate replacement.'
  - Pillow quality below price point — described as 'cheap Kmart' (Feb 2026).
  - Master bedroom doona appears weighted and old.
  - No spare pillowcases for extra pillows stored in wardrobes.
  - No dish cloths/sponges/scrubbers by default — reported by 2 guests (Dec 2025, Feb 2026).
  - FOB access finicky — swipe once and wait 1 second before pulling door.
  - Multiple FOB swipes trigger building alarm; swipe again to disarm.
  - Front door mechanism difficult — pull toward you before pushing.
  - Front door intercom system non-functional.
  - Noise monitor (Minut) can trigger false alerts from normal conversation.
  - Sauna isolation switch (right side, ground level) frequently OFF — most common cause of 'sauna not working'.
  - Sauna light switch at top of stairs must be ON.
  - Cold plunge pump freezes in winter — must be OFF at wall plug May-Sep.
  - Jetted bathtub can discharge pipe residue if not flushed between guests.
  - Oven separate wall power switch — guests struggle to find.
  - Hairdryer casing dirty/sticky — reported by 2 guests (Dec 2025, Feb 2026).
  - QR code house compendium link not working (Dec 2025).
  - Lift subject to outages managed by building management (extended Oct-Nov 2025).
  - Wrong lockbox confusion reported.
  - Parking space occasionally occupied by another vehicle (building-level issue).
  - BBQ gas tank can run empty — check on turnover.
  - Pot/pan handles loosen — tightened Mar 2026, on monitoring checklist.
  - Shower hoses — check every turn for cleanliness/mineral build-up/kinks.
  - Knife/utensil drawer must be returned to tidy state every turn (new steak-knife divider Apr 2026).
  - Upstairs ensuite toilet flush button sticks — resolved Mar 2026 (valve replaced).
  - Conditioner pump (upstairs) replaced Mar 2026 from spare stock.
  - Bedroom 3 ensuite had continuous-flush valve issue — replaced by Pete Mar 2026.
  - Listing mentions 'double oven' but documented appliance is single Bosch combo (HBC86Q650A/02) — verify in person whether a second oven exists.
