    bed: queen
    ensuite: false
    notes: ''
bedroom_count: 1
bed_count: 2
bathroom_count: 1.0
beds_summary: 1张大床 + 客厅1张沙发床（须提前申请，另收$50费用）
amenities:
  - 空调
  - 烤盘
