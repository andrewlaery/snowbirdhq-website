# yaml-language-server: $schema=../_schemas/facts.json
schema_version: 1
slug: 25-dublin
capacity:
  max_guests: 9
  max_adults: 7
  min_age_lead_guest: 25
# Bed layout per ota-manager listing.md prose (owner-confirmed 2026-04-27).
# Note: BedType schema has no "king_single" — modelled as long_single.
bedrooms:
  - name: 卧室 1（主卧）
    bed: super_king
    ensuite: true
    notes: 上层。带步入式衣橱。
  - name: 卧室 2
    ensuite: true
    beds:
      - super_king
      - single
    notes: 主层。含一张单层双床架。
  - name: 卧室 3
    ensuite: true
    beds:
      - super_king
      - long_single
      - single
    notes: >
      主层。含 1 张加长单人床 + 1 张单人拖拉床。已知问题：
      大窗底部有冷风渗入（室内可能偏凉）。
bedroom_count: 3
bed_count: 6
bathroom_count: 3.5
beds_summary: 3 张超大双人床 + 1 张加长单人床 + 1 张单层双床架 + 1 张单人拖拉床
