  garage: true
  garage_remote: false
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: lockbox
  instructions: >
    通过车库右侧墙面上方（垃圾桶上方）的密码锁盒自助入住。钥匙可开启正门（位于车库左侧）。请寻找门牌号#100，沿车道向上绕行至左侧，径直前往前方的灰色房屋。密码锁盒的开锁码将在您抵达前通过预订平台发送。
check_out:
  time: '10:00'
wifi:
  network: Bethan & Paddy
  password: risinghurst
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: 07:00
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false
booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: false
pricing:
  base_nightly: 450.0
  cleaning_fee: 160.0
  extra_person_fee: 0.0
  weekly_discount:
  monthly_discount:
  currency: NZD
exceptions:
  hazards:
  - description: >
      花园设有未围栏的花圃边界——请在户外活动时看管好年幼的孩子。
    severity: minor
  - description: >
      冬季车道可能结冰——请谨慎驾驶，如路况需要请安装防滑链。
    severity: minor

  house_rules:
  - category: parking
    heading: 停车须知
    bullets:
    - 车道仅供1辆车停放——请停在正门/车库门前方左侧靠近玫瑰丛的位置。
    - 请在车道最右侧留出足够空间，供附属单元（100B）的住户使用。
    - 如有额外车辆，可停放在主街道的路边停车位。
  - category: garden
    heading: 花园须知
    bullets:
    - 花园区域开放时间为每天早上7点至晚上10点。
    - 请在晚上10点后遵守安静时段规定。

  access:
    front_door: >
      密码锁盒位于车库右侧墙面垃圾桶上方。开锁码为 2604。钥匙可开启正门（位于车库左侧）。
    back_door: ''
    garage: >
      车库可从屋内进入——用于存放洗衣设备、清洁用品及滑雪装备。
    other: >
      请寻找门牌号#100。沿车道向上绕行至左侧，径直前往前方的灰色房屋。
  notes:
  - 房东（Paddy & Bethan）住在隔壁单元（100B）——如有任何需要，可通过预订平台与他们联系。
  - 车库可从屋内进入，内设洗衣设备。
