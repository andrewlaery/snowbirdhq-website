exceptions:
  hazards:
    - description: >
        Garden has unfenced garden borders — supervise young children
        outdoors.
      severity: minor
    - description: >
        Driveway can become icy in winter — drive carefully and fit
        snow chains if conditions warrant.
      severity: minor

  house_rules:
    - category: parking
      heading: Parking
      bullets:
        - 1 vehicle on the driveway — park in front of the front door /
          garage door, on the left-hand side by the rose bush.
        - Leave room on the far right side of the driveway for the flat
          tenants in the attached unit (100B).
        - Street parking on the main street for additional vehicles.
    - category: garden
      heading: Garden
      bullets:
        - Garden area available between 7am and 10pm.
        - Please respect quiet hours after 10pm.

  access:
    front_door: >
      Lockbox on the right-hand side wall of the garage, above the bins.
      Code 2604. The key opens the front door (to the left of the garage).
    back_door: ''
    garage: >
      The garage is accessible from inside the house — used for laundry,
      cleaning supplies, and ski storage.
    other: >
      Look for postbox #100. Follow the driveway up and around to the
      left to the grey house straight ahead.
  notes:
    - Hosts (Paddy & Bethan) live in the unit next door (100B) — accessible
      via the booking platform if you need anything.
    - Garage is accessible from inside the house and contains the laundry.

  usage_sections:
    - category: internet
      heading: Internet / Wi-Fi
      body: >
        Network and password are shown above in the Quick Reference. The
        Wi-Fi modem lives on the desk in the second lounge room.

    - category: heating
      heading: Heating & Cooling
      body: |
        - Lounge has a **heat pump / A/C** — operate via the wall
          controller.
        - Living room has a **gas heater** for additional warmth.
        - Keep doors and windows closed in cooler weather.

    - category: outdoor
      heading: Outdoor
      body: |
        BBQ available on the patio. Garden area available 7am–10pm.
        Please respect quiet hours after 10pm.

    - category: location
      heading: Getting Around
      body: |
        - Lower Shotover — peaceful mountain-view setting.
        - Queenstown Airport — ~10 minutes by car.
        - Town centre — ~12 minutes by car.
