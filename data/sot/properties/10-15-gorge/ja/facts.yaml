bedrooms:
  - name: ベッドルーム 1
    bed: queen
    ensuite: false
    notes: ''
bedroom_count: 1
bed_count: 1
bathroom_count: 1.0
beds_summary: クイーンベッド 1台
amenities:
  - エアコン
  - ベーキングシート
  - ベビーベッド
  - バルコニー
  - ボディソープ
