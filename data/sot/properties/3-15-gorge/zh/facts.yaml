  max_nights: 365
  cancellation_policy: firm
  instant_bookable: true
pricing:
  base_nightly: 180.0
  cleaning_fee: 150.0
  extra_person_fee: 100.0
  weekly_discount: 0.95
  monthly_discount:
  currency: NZD
exceptions:
  hazards: []

  house_rules:
    - category: parking
      heading: 停车
      bullets:
        - 仅限路边停车——本房源无专属停车位。
    - category: sofa-bed
      heading: 沙发床（可选）
      bullets:
        - 客厅沙发床可供1位额外客人使用。
        - 须提前申请，另收 $50 费用。

  access:
    front_door: >
      前门数字锁（2026年2月安装）。您的入住密码将在抵达前24小时通过预订平台发送。
    back_door: ''
    garage: ''
    other: >
      Whistler Apartments 前台与本房源无任何关联——如有任何问题，请通过预订平台与我们联系。

  notes:
    - 黑色住宅手册放在厨房台面上——退房时请将其留在原处。

  usage_sections:
    - category: internet
      heading: 网络 / Wi-Fi
      body: >
        网络名称和密码已在上方快速参考区显示。路由器位于卧室内——如遇连接问题，请将其关闭后重新开启。由于楼体为混凝土墙结构，客厅的 Wi-Fi 信号可能较弱；信号增强器放置在电视柜后方。

    - category: location
      heading: 出行指南
      body: |
        - 地处市中心——步行即可到达市区。
        - 皇后镇机场——驾车约12分钟。

    - category: appliances
      heading: 家电使用说明
      body: |
        - **洗碗机**（Haier）：旋转旋钮选择程序，按下中央按钮启动。建议使用节能模式。洗碗块放在水槽下方。
        - **烤箱**（Parmco 电烤箱）：共三个旋钮，分别控制温度、定时器和功能。必须拨动定时器旋钮，烤箱才能加热。
        - **炉灶**（电磁炉）：厨房墙面最右侧的总开关（与烤箱共用）。
        - **Insinkerator 食物垃圾处理器**：开关位于厨房右侧墙面，紧靠电热水壶旁。
        - **洗衣机**（顶开式，位于浴室内）：洗衣粉已备好。
        - **烘干机**：公寓楼内共用烘干机，位于楼内晾晒/储藏室——每次 $4（两枚 $2 硬币）。门禁密码见公寓钥匙扣背面。
        - **热泵**（客厅）：可为整个公寓供暖。建议设定温度为23°C。
        - **踢脚板式电暖器**：位于走廊。
        - **地暖**：开关及温度旋钮位于浴室墙面。
        - **便携式电暖器**：可用于卧室——存放在壁橱内。
        - **电热毯**：铺于床上；每侧各有一个遥控器，固定在床侧。
        - **电视**：配有两个遥控器——较大的用于开关机/切换信号源（HDMI 1 用于流媒体播放），较小的用于导航操作。可使用 Freeview 应用。
