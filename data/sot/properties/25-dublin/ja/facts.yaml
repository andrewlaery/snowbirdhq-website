features: []
parking:
  spaces: 4
  type: driveway
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    フロントドアのスマートロックによるセルフチェックインです。固有のアクセスコードは、
    ご到着の24時間前に予約プラットフォームを通じてお送りします。チェックイン時にコードが
    機能しない場合は、ホストにご連絡ください。コードはまれにリモートによる再有効化が
    必要になることがございます。
check_out:
  time: '10:00'
wifi:
  network: SnowbirdQT
  password: Namaste99
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'CCTV outside property' per ota-manager booking_specific
  noise_monitor: true  # Minut noise monitor per owner.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: false
pricing:
  base_nightly: 1000.0
  cleaning_fee: 500.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        車両を操作する際、ドライブウェイには死角があります。十分にご注意いただき、
        お子様がいる場合は別の方に周囲の安全確認をお願いしてください。
      severity: minor
    - description: >
        庭のさまざまな箇所に、柵のない大きな段差・落下危険箇所があります。お子様を
        一人にしないようにし、到着時に周辺エリアをよくご確認ください。
      severity: minor
    - description: >
        階段付近――お子様が階段で遊ばないようにご注意ください。転落による
        怪我のリスクがあります。
      severity: minor
    - description: >
        ドライブウェイおよび屋外階段は、積雪後の凍結・融解によって非常に
        滑りやすくなります。ドライブウェイはご注意の上ご使用いただき、
        路面状況によってはタイヤチェーンを装着してください。
      severity: minor
    - description: >
        バスタブ／スパバスは、水が入っている状態でお子様を一人にしないでください。
        ご使用後はすぐに排水してください。
      severity: minor
    - description: >
        デッキのBBQは、油脂による火災のリスクがあります。清潔な状態を保ち、
        使用中は目を離さず、使用後は完全に消火されていることをご確認ください。
      severity: minor
    - description: >
        薪ストーブは、監督のないお子様には火傷の危険があります。コンペンディアムに
        記載されている操作手順に従ってください。
      severity: minor
    - description: >
        窓／スライドドアは、お子様が容易に触れられる部屋に幼いお子様を
        一人にしないでください。
      severity: minor

  house_rules:
    - category: parking
      heading: 駐車場
      bullets:
        - 駐車はドライブウェイの所定のスペースのみご利用ください。路上駐車はご遠慮ください。
        - ドライブウェイとガレージを合わせて最大4台まで駐車可能です。
    - category: spa-pool
      heading: スパプール／ホットタブ
      bullets:
        - スパのご利用はお客様ご自身の責任においてお願いいたします。
        - "**スパの中または近くにいるお子様には、大人が常に付き添ってください。**"
        - "**使用しない際はスパカバーをロックしてください** — スパキーの保管場所およびカバーの操作方法については、ユーザーインストラクション内の [スパプール／ホットタブ](/docs/properties/25-dublin/user-instructions#appliances-wellness) をご参照ください。"
        - 水質を保つため、入る前にシャワーを浴びてください。
        - "**塩素のみ使用可** — 泡立ち剤、バブルバス、入浴剤、その他の薬剤は使用しないでください。"
        - "**スパの中および周辺では、食べ物・飲み物・ガラス製品はご使用になれません。**"
        - 飲酒後はスパをご利用にならないでください。

    - category: keys-remotes
      heading: 鍵とリモコン
      bullets:
        - チェックアウトの際は、すべてのアクセスキーとガレージリモコンをキッチンのベンチの上に置いてください。
        - 鍵またはガレージリモコンを紛失された場合は、費用をご請求させていただきます。

    - category: wood-burner
      heading: スタジオ薪ストーブ
      bullets:
        - "**薪ストーブから絶対に目を離さないでください** — 火が燃えている間は、大人が常にスタジオ内に在席してください。"
        - "**火が燃えている間は、お子様から大人が目を離さないでください** — ドア、ガラス、および周辺部分は非常に高温になります。"
        - 備え付けの薪と着火剤のみ使用してください。ゴミ、防腐処理された木材、または着火促進剤は使用しないでください。
        - "**灰をゴミ箱や風にさらされる場所に捨てないでください** — 残り火が再燃して火災を引き起こすおそれがあります。"
        - 操作手順（着火・ドア操作・灰の冷却）については、[ユーザーインストラクション → スタジオ薪ストーブ](/docs/properties/25-dublin/user-instructions#appliances-heating) をご参照ください。

    - category: gas-fire
      heading: 上階ガスファイヤー
      bullets:
        - 在室中のみご使用ください。主要暖房としての使用はお控えください。
        - "**ガスファイヤーが点いている間は、お子様から大人が目を離さないでください** — ガラス前面は非常に高温になります。"
        - 暖炉前面から1m以内に布類・紙類・その他可燃物を置かないでください。
        - 操作手順（点火・タイマー・消火）については、[ユーザーインストラクション → ガスファイヤー](/docs/properties/25-dublin/user-instructions#appliances-heating) をご参照ください。

    - category: bbq
      heading: 屋外BBQ
      bullets:
        - "**必ず屋外の開放されたガーデンエリアでのみご使用ください** — 屋根付きエリアやガレージ内での使用は絶対にお止めください。"
        - BBQに火が入っている間は、大人がお子様から目を離さないようにしてください。
        - "**BBQに火が入っている間は、絶対にその場を離れないでください。**"
        - 操作手順（点火・フタの開閉順序・清掃・消火）については、[ユーザーインストラクション → Weber Q3200 BBQ](/docs/properties/25-dublin/user-instructions#appliances-outdoor) をご参照ください。

    - category: insinkerator
      heading: インシンケレーター（生ゴミ処理機）
      bullets:
        - "**電源が切れていても、絶対に処理槽の中に手を入れないでください。**"
        - "**投入禁止物**: 骨、果物の種、油脂類、卵の殻、コーヒーかす、繊維質の野菜（セロリ、とうもろこしの皮など）、食品以外のもの — これらは機器を詰まらせたり破損させたりするおそれがあり、修理費用をご請求する場合がございます。"
        - 操作手順（冷水の使い方・スイッチの位置・詰まり解消）については、[ユーザーインストラクション → インシンケレーター](/docs/properties/25-dublin/user-instructions#appliances-kitchen) をご参照ください。

  access:
    front_door: >
      スマートロックによるセルフチェックインです。固有のアクセスコードは、
      ご到着の24時間前に予約プラットフォームを通じてお送りします。
    garage: ガレージリモコンを1個お渡しします。チェックアウト時は室内に持ち込んでください。
    back_door: ''
    other: >
      スパプールカバー用プラスチックキーは、ガレージリモコンと一緒にお渡しします。

  notes:
    - 滞在中、ホームアラームは作動しておりません。
    - 救急箱はキッチンパントリー内（左側上段棚）にあります。
    - 消火器はキッチンシンク下にあります。
    - ガスの元栓は、入口階段右側のガレージ側にあります。
    - 緊急時はフロントドアから退出してください。集合場所はドライブウェイのガレージ前です。
