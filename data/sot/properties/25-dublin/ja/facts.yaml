features: []
parking:
  spaces: 4
  type: driveway
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    フロントドアのスマートロックによるセルフチェックインとなります。ご到着の24時間前に、ご予約プラットフォームを通じてお客様専用のアクセスコードをお送りします。チェックイン時にコードが作動しない場合は、ホストまでご連絡ください。コードのリモート再有効化が必要になることがございます。
check_out:
  time: '10:00'
wifi:
  network: SnowbirdQT
  password: Namaste99
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'CCTV outside property' per ota-manager booking_specific
  noise_monitor: true  # Minut noise monitor per owner.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: false
pricing:
  base_nightly: 1000.0
  cleaning_fee: 500.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        車両の切り返し時に死角となるエリアがございます。十分にご注意いただき、お子様がいる場合は必ず別の方が周囲を確認するようにしてください。
      severity: minor
    - description: >
        庭園の各所に柵のない段差・落下箇所があります。お子様を一人にせず、ご到着時に周辺の状況をご確認ください。
      severity: minor
    - description: >
        階段のある吹き抜け部分 ― 小さなお子様が階段で遊ばないようにしてください。転落によるけがのおそれがあります。
      severity: minor
    - description: >
        積雪後の融解・再凍結により、ドライブウェイや屋外階段が非常に滑りやすくなります。ドライブウェイをご利用の際は十分にご注意いただき、路面状況に応じてスノーチェーンを装着してください。
      severity: minor
    - description: >
        バスタブ・スパバス ― 水が張られている際は、小さなお子様を一人にしないでください。ご使用後は速やかに水を抜いてください。
      severity: minor
    - description: >
        デッキ上のBBQ ― 油脂による火災のおそれがあります。グリルを清潔に保ち、使用中は目を離さず、使用後は完全に消火してください。
      severity: minor
    - description: >
        薪ストーブ ― 監督なしのお子様には火傷のリスクがあります。コンペンディウムに記載の操作手順に従ってご使用ください。
      severity: minor
    - description: >
        窓・引き戸 ― 小さなお子様が容易に手の届く部屋では、一人にしないようにしてください。
      severity: minor

  house_rules:
    - category: parking
      heading: 駐車場
      bullets:
        - 駐車はドライブウェイ内の所定のスペースのみご利用ください（路上駐車はご遠慮ください）。
        - ドライブウェイとガレージを合わせて最大4台まで駐車可能です。
    - category: spa-pool
      heading: スパプール／ホットタブ
      bullets:
        - ガレージドアリモコンと一緒に保管しているプラスチック製の鍵を使用して、スパカバーをアンロックしてください。
        - 水質を保つため、入る前にシャワーを浴びてください。
        - 添加できるのは塩素系薬剤のみです。泡立て剤・発泡剤・その他の薬品は使用しないでください。
        - スパの中・周辺への食べ物、飲み物、ガラス製品の持ち込みはご遠慮ください。
        - ご使用後はスパカバーを元に戻してください。
        - ご利用はお客様自身の責任において行ってください。お子様から目を離さず、飲酒後のご利用はお控えください。
    - category: keys-remotes
      heading: 鍵・リモコン
      bullets:
        - チェックアウト時は、すべてのアクセスキーとガレージリモコンをキッチンのベンチに置いてください。
        - 鍵またはガレージリモコンを紛失された場合、弁償費用をご請求させていただきます。
    - category: wood-burner
      heading: スタジオ薪ストーブ
      bullets:
        - 薪ストーブを使用する際は、必ず大人がスタジオ内にいる状態でご使用ください。絶対に薪ストーブを無人のまま放置しないでください。
        - 火がついたら扉を**閉めた**状態でご使用ください（薪の追加時のみ短時間開ける。過剰燃焼は機器を損傷させます）。
        - 備え付けの薪と焚き付けのみご使用ください。ゴミ、防腐処理された木材、着火剤は使用しないでください。
        - "**灰をゴミ箱や風の当たる場所に捨てないでください** ― 残り火が再燃するおそれがあります。灰が冷えてから、量が多い場合はホストにご連絡ください。"
        - 火がついている間は常にお子様から目を離さないでください。扉・ガラス・周辺部分は非常に高温になります。

    - category: gas-fire
      heading: 上階ガスファイヤー（Escea）
      bullets:
        - "**ラウンジを離れる際および、チェックアウト時は必ずガスファイヤーをオフにしてください** ― 60分の自動タイマーが設定されている場合も同様です。"
        - 主要暖房としての使用はお控えください。室内にいる間のみご使用ください。
        - ガスファイヤーが点いている間は常にお子様から目を離さないでください。ガラス前面は非常に高温になります。
        - 暖炉前面から1m以内に布製品、紙類、その他可燃物を置かないでください。

    - category: bbq
      heading: 屋外BBQ（Weber Q3200）
      bullets:
        - "**点火前に必ず蓋を開けてください** ― ガスの蓄積を防ぐためです。"
        - "**使用後は必ずBBQをオフにしてください** ― バーナーコントロールとメインガス元栓の両方を閉めてください。"
        - グリルプレートが冷えてからブラシで清掃してください。備え付けのワイヤーブラシをご使用ください。
        - BBQを移動させないでください。また、屋根の下やガレージ内では絶対に使用しないでください。

    - category: insinkerator
      heading: インシンクエレーター（生ゴミディスポーザー）
      bullets:
        - "**ディスポーザーの使用中および使用後10〜15秒間は冷水を流し続けてください** ― 残留物を洗い流し、詰まりを防ぎます。"
        - "**投入できるもの**：野菜の皮、少量の調理済みご飯・パスタ、果物の切れ端など柔らかい生ゴミのみ。"
        - "**絶対に投入しないでください**：骨、果物の種、油脂・グリス、卵の殻、コーヒーかす、繊維質の野菜（セロリ、トウモロコシの皮など）、食品以外のもの。"
        - "**電源が切れていても、ディスポーザーの中に手を入れないでください。**"
        - 詰まった場合はご使用を中止し、ホストまでご連絡ください。


  access:
    front_door: >
      スマートロックによるセルフチェックインです。お客様専用のアクセスコードは、ご到着の24時間前にご予約プラットフォームを通じてお送りします。
    garage: ガレージリモコンを1つご用意しています。チェックアウト時は室内にお持ちください。
    back_door: ''
    other: >
      スパプールカバーのプラスチック製キーはガレージリモコンと一緒にご用意しています。

  notes:
    - 滞在中、ホームアラームは作動しておりません。
    - 救急用品はキッチンのパントリー内（左側の上段棚）に保管されています。
    - 消火器はキッチンシンクの下に設置されています。
    - ガスの元栓は、入口階段の右側（ガレージ側）にあります。
    - 緊急時はフロントドアから退出してください。集合場所はガレージ前のドライブウェイです。
