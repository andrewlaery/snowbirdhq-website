exceptions:
  hazards:
    - description: >
        External steps from the underground carpark up to the apartment —
        watch your footing, especially with luggage.
      severity: minor
    - description: >
        Carpark height restriction is 2.2 m — not suitable for camper vans
        or large vehicles.
      severity: info

  house_rules:
    - category: parking
      heading: Parking
      bullets:
        - Off-site parking only (free) — park in a Shotover Street loading bay to unload, then move to the underground carpark across the road.
        - Carpark height limit 2.2 m — no camper vans.
        - Apartment is on the second floor, accessed via external steps from the carpark.

  access:
    front_door: >
      Lockbox beside the front door. Code 3411 (also sent via the booking
      platform 24 hours before arrival).
    back_door: ''
    garage: ''
    other: >
      Access via the alleyway between Canyon Swing and the Kebab Shop on
      Shotover Street. Google Maps will NOT route directly to the
      apartment — follow the photo walkthrough sent in the booking platform.

  notes:
    - Modem is in the bedrooms upstairs — power-cycle if Wi-Fi is unstable.

  usage_sections:
    - category: internet
      heading: Internet / Wi-Fi
      body: >
        Network and password are shown above in the Quick Reference. The
        modem lives in the bedrooms upstairs — power-cycle if you have
        connectivity issues.

    - category: heating
      heading: Heating
      body: |
        The lounge has a heat pump for warmth — operate via the wall
        controller. Keep doors and windows closed in cold weather.

    - category: location
      heading: Getting Around
      body: |
        - Restaurants, shops, and the lake are all within walking distance.
        - Queenstown Airport — ~20 minutes by car.

    - category: appliances
      heading: Appliances
      body: |
        - **Washing machine** (AEG, hallway laundry room): wash only — no dryer in the unit. Drying racks provided.
        - **Electric oven**: timer must be turned on or the oven won't heat.
        - **Heat pump**: remote sits on the wooden beam in the living area — easy to miss.
        - **Oil heaters**: one in each bedroom.
        - **Iron and ironing board**: in the laundry room.
