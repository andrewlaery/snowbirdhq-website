check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: lockbox
  instructions: >
    自助入住，通过大门旁信箱边的钥匙保险盒办理。请使用入住确认文件中提供的密码打开保险盒——里面有一个门禁卡（FOB）和一把钥匙。门禁卡可开启楼栋大门及前门；钥匙用于开启车库内的宾客储物柜。使用门禁卡后请等待1秒，然后轻轻将门向您的方向拉，再推开。**每次进入仅刷一次门禁卡**——多次刷卡可能触发楼栋警报（如已触发，再刷一次即可解除）。
check_out:
  time: '10:00'
wifi:
  network: SkyCrest
  password: Namaste25
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: 07:00
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false
booking_terms:
  min_nights: 3
  max_nights: 27
  cancellation_policy: strict
  instant_bookable: false
pricing:
  base_nightly: 3000.0
  cleaning_fee: 300.0
  extra_person_fee: 0.0
  weekly_discount:
  monthly_discount:
  currency: NZD
exceptions:
  hazards:
    - description: >
        温泉泳池／热水浴缸——请随时看管儿童。使用风险自负；请勿在饮酒后使用。
      severity: minor
    - description: >
        桑拿房——温度较高。每次使用时间请限制在15至20分钟以内；儿童使用时须全程有大人陪同监督。
      severity: minor
    - description: >
        通往顶层的楼梯——请注意脚下安全，携带行李时尤其小心。电梯通往主层。
      severity: info

  house_rules:
    - category: parking
      heading: 停车
      bullets:
        - 车库由门禁卡开启。在车库内，可通过靠近楼栋入口门旁的按钮开关车库门。
    - category: building
      heading: 楼栋进出
      bullets:
        - 每次进入仅刷一次门禁卡——多次刷卡可能触发楼栋警报。如已触发，再刷一次即可解除。
        - 前门对讲机不可用——从楼栋大门处无法使用门铃。

  access:
    front_door: >
      请使用门禁卡进入前门。刷卡后等待1秒，然后轻轻将门向您的方向拉，再推开。每次进入仅刷一次，以免触发楼栋警报。
    back_door: ''
    garage: >
      可在车库门外使用门禁卡开关车库门，也可在车库内靠近楼栋入口门旁的按钮处操作。
    other: >
      前门大门可能处于锁闭状态——请使用门禁卡进入。

  notes:
    - 入住期间，房屋警报系统不在运行状态。
    - 电梯通往主层；楼梯继续延伸至顶层。

  usage_sections:
    - category: internet
      heading: 网络 / Wi-Fi
      body: >
        网络名称和密码已在上方快速参考栏中注明。

    - category: heating
      heading: 供暖
      body: |
        SkyCrest 两层均设有**地暖**，楼上另配热泵，主客厅设有燃气壁炉。房东建议的地暖温度设定如下：

        - **夏季：** 关闭（或设为10，如需降温）。
        - **秋季 / 春季：** 全屋18–20。
        - **冬季：** 主层约25；顶层18–20，同时开启热泵以达到舒适温度；浴室20（最高25）。

        地暖升温较慢——调整后需数小时才能显效。如您感到寒冷，请尽早联系房东，以便提前调整。

    - category: spa-sauna
      heading: 温泉、桑拿与冷水浴池
      body: |
        SkyCrest 配有温泉池、桑拿房及冷水浴池。请注意以下事项：

        - 进入温泉池前请先淋浴，以保持水质清洁。
        - 温泉池内及周围禁止携带食物、饮品或玻璃器皿。
        - 每次桑拿时间请限制在15至20分钟以内。
        - 使用后请盖好温泉池和冷水浴池的盖子。
        - 使用风险自负；请随时看管儿童。

    - category: location
      heading: 出行指南
      body: |
        - 步行即可抵达皇后镇市中心——距离市区仅需短暂步行。
        - 皇后镇机场——驾车约12分钟。

    - category: appliances
      heading: 家电使用说明
      body: |
        厨房
        - **烤箱／微波炉组合**（Bosch HBC86Q650A/02）：使用前须先打开标有"oven"的独立墙壁电源开关。
        - **燃气灶**（Fisher & Paykel PCH615FAU）：四个灶头，含一个大火力炒锅灶头。
        - **洗碗机**（Fisher & Paykel DishDrawer DS603/DD603）。
        - **咖啡机**（Breville Nespresso Creatista Plus）：使用Nespresso胶囊；内置奶泡机。
        - **电热水壶**（DeLonghi KBI2001.S）。
        - **冰箱／冷冻柜**（Bosch）：配有过滤净水出水口。
        - **水槽内置食物垃圾处理器**：开关位于水槽下方柜内。

        户外
        - **燃气烧烤架**（Rinnai MAXIM X4 PLUS，四灶头）：每次换住时请检查煤气罐余量。
        - **热水浴缸**（HotSpring，顶层露台）：盖子用存放在车库遥控器上的塑料钥匙解锁。
        - **冰浴／冷水浴池**（Alpine SY-08-HC，房屋后方）：每年5月至9月期间，请将水泵的墙壁插头关闭，以防冻结。
        - **桑拿房**（Alpine Barrel，Harvia Vega BC60加热器）：需同时开启三处开关方可运行——隔离开关（地面层右侧）、照明开关（楼梯顶部）及定时旋钮。

        洗衣房
        - **洗衣机**（Smeg S650，6.5公斤，顶开式）——位于洗衣房。
        - **烘干机**（Simpson SDV401，4公斤）——位于洗衣房。
        - **蒸汽熨斗**（Braun TextStyle 6）——位于洗衣房。

        客厅
        - **The Frame 电视**（Samsung 65英寸 QA65LS03FWSXNZ，主客厅）：待机时显示艺术画作模式。
        - **智能电视**（Samsung 58英寸 UA58NU7103）：顶层电视室。
        - **Sonos 音响**：SkyCrest-Living + SkyCrest-UpstairsDeck——始终在线；支持AirPlay及Spotify投放。

        供暖
        - **热泵**（Daikin CTXM25RVMA ×3）：顶层——电视休息区及2号、3号卧室各一台。遥控器挂于墙上。
        - **燃气壁炉**（Escea IB600/IB850）：客厅；遥控器放置于同一房间的桌上。
        - **浴室地暖**（OJ Microline恒温器）：每间浴室各一个，旋钮刻度为1–10。

        其他
        - **卧室风扇**（Shark TurboBlade TF202S，无叶片式 ×3）：每间卧室各一台；遥控器放于床头柜上。
        - **打印机／扫描仪**（Canon FTC3147403）。
        - **望远镜**（KONUS KONUSSPOT-80），配SLIK三脚架。
