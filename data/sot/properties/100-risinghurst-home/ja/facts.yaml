check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: lockbox
  instructions: >
    ガレージ右側の壁、ゴミ箱の上にあるロックボックスからセルフチェックインが可能です。
    鍵はガレージ左隣の玄関ドアを開けます。ポストボックス #100 をお探しください。
    車道を上り、左へ回り込むと、正面にグレーの家が見えてまいります。
    ロックボックスのコードは、ご到着前に予約プラットフォームを通じてお客様へお送りいたします。
