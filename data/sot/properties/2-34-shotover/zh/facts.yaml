exceptions:
  hazards:
    - description: >
        从地下停车场到公寓有室外台阶——请注意脚下安全，携带行李时尤需小心。
      severity: minor
    - description: >
        停车场限高2.2米——露营车不适用。
      severity: info
    - description: >
        阳台无遮阳设施，在阳光直射下温度可能很高——请监护好儿童，避免长时间暴晒。
      severity: info

  house_rules:
    - category: parking
      heading: 停车说明
      bullets:
        - 仅限场外停车（免费）——请先将车停在Shotover Street的装卸区卸下行李，再将车移至对面的地下停车场。
        - 停车场限高2.2米——露营车不可入场。
        - 公寓位于二楼，需通过室外台阶进入。

  access:
    front_door: >
      前门旁设有密码锁箱，开锁码为3422（同时也会在抵达前24小时通过预订平台发送给您）。
    back_door: ''
    garage: ''
    other: >
      入口位于Shotover Street上Canyon Swing与烤肉店之间的小巷。Google地图无法直接导航至本公寓——请按照预订平台发送的图文导览前往。

  notes:
    - 调制解调器位于楼上卧室——如Wi-Fi不稳定，请尝试重启调制解调器。
    - 阳台无遮阳设施——在阳光直射下温度可能较高。

  usage_sections:
    - category: internet
      heading: 网络 / Wi-Fi
      body: >
        网络名称和密码见上方快速参考信息。调制解调器位于楼上卧室——如遇连接问题，请尝试重启调制解调器。

    - category: heating
      heading: 暖气
      body: |
        客厅配有热泵，可通过墙上的控制面板进行操作。寒冷天气下请关好门窗，以保持室内温暖。

    - category: location
      heading: 周边出行
      body: |
        - 餐厅、商店和湖畔均步行可达。
        - 皇后镇机场——驾车约20分钟。
