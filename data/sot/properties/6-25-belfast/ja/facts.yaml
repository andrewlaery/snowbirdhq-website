parking:
  spaces: 1
  type: garage
  garage: true
  garage_remote: false
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: lockbox
  instructions: >
    キーボックスによるセルフチェックインとなります。キーボックスは郵便受けの横に設置されています。チェックイン案内書に記載されたコードを入力してキーボックスを開けると、FOBとキーが入っています。FOBは建物のゲートと玄関ドアへの入場に使用します。キーはガレージ内のゲスト用ロッカーを開けるためのものです。FOBを使用した後、1秒待ってからドアを手前にそっと引いてから開けてください。**FOBは1回の入場につき1度だけかざしてください**――複数回かざすと建物の警報が作動することがあります（万一警報が鳴った場合は、もう一度FOBをかざして解除してください）。
check_out:
  time: '10:00'
wifi:
  network: SkyCrest
  password: Namaste25
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: 07:00
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false
booking_terms:
  min_nights: 3
  max_nights: 27
  cancellation_policy: strict
  instant_bookable: false
pricing:
  base_nightly: 3000.0
  cleaning_fee: 300.0
  extra_person_fee: 0.0
  weekly_discount:
  monthly_discount:
  currency: NZD
exceptions:
  hazards:
    - description: >
        スパプール／ホットタブ――お子様のそばを離れないようにご注意ください。ご利用はお客様ご自身の責任となります。飲酒後のご利用はお控えください。
      severity: minor
    - description: >
        サウナ――高温になります。ご利用は1回15〜20分を目安にしてください。お子様は必ず大人が付き添ってください。
      severity: minor
    - description: >
        最上階への階段――特にお荷物をお持ちの際は足元にご注意ください。メインフロアへはエレベーターをご利用いただけます。
      severity: info

  house_rules:
    - category: parking
      heading: 駐車場
      bullets:
        - FOBを使ってガレージに入れます。建物入口ドア付近のボタンから内側で開閉することもできます。
    - category: building
      heading: 建物へのアクセス
      bullets:
        - FOBは1回の入場につき1度だけかざしてください――複数回かざすと建物の警報が作動することがあります。警報が鳴った場合は、もう一度FOBをかざして解除してください。
        - 玄関のインターコムはご使用いただけません――建物ゲートからの呼び出し機能はございません。

  access:
    front_door: >
      FOBを使って玄関ドアを開けてください。FOBをかざした後、1秒待ってからドアを手前にそっと引いてから開けてください。建物の警報を作動させないよう、1回の入場につき1度だけかざしてください。
    back_door: ''
    garage: >
      ドア外側のFOB、またはガレージ内の建物入口ドア付近のボタンで開閉できます。
    other: >
      正面ゲートが施錠されている場合がありますので、FOBをかざして入場してください。

  notes:
    - 滞在中、家の警報システムは作動しておりません。
    - エレベーターはメインフロアまでご利用いただけます。最上階へは階段をご利用ください。
