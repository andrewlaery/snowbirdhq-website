appliances:     # TODO: catalogue from in-person audit
  - name: Haier dishwasher
    notes: Rotate knob to select programme; press centre button to start. Eco mode recommended. Tablets under the sink.
  - name: Parmco oven (electric)
    notes: 3 knobs — temperature, timer, function. Timer must be on or oven won't heat.
  - name: Electric hob
    notes: Mains switch at far right of kitchen wall (shared with oven).
  - name: Insinkerator
    notes: Switch on the wall right-hand side of kitchen, by the kettle.
  - name: Washing machine (top loader)
    notes: In the bathroom. Washing powder provided.
  - name: Shared dryer (communal)
    notes: In complex's communal drying/storage room. $4 per load (2× $2 coins). Access code on back of apartment keychain.
  - name: Heat pump
    notes: Living area — heats whole apartment. Recommended setting 23°C.
  - name: Panel heater
    notes: In the hallway.
  - name: Underfloor heating (bathroom)
    notes: On/off switch + temperature dial on bathroom wall.
  - name: Portable heater
    notes: Available for bedroom — stored in cupboard.
  - name: Electric blanket
    notes: On the bed. Remote attached to side of bed, one per side.
  - name: TV
    notes: Two remotes — larger for on/off/source (HDMI 1 for streaming). Smaller for navigation. Freeview app available.
