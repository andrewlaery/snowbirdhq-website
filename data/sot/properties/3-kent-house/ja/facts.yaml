  type: 'driveway'
  garage: false
  garage_remote: false

check_in:
  start_time: '15:00'
  end_time: '22:00'
  method: 'TBC'
  instructions: '確認中：各物件のチェックイン方法は、サービス開始前（2026-07-01）に追加いたします'

