features: []
parking:
  spaces: 4
  type: driveway
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    您可通过前门智能门锁自助入住。您的专属入住密码将在抵达前 24 小时通过预订平台发送给您。如在入住时密码无法使用，请立即联系房东——密码有时需要远程重新激活。
check_out:
  time: '10:00'
wifi:
  network: SnowbirdQT
  password: Namaste99
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'CCTV outside property' per ota-manager booking_specific
  noise_monitor: true  # Minut noise monitor per owner.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: false
pricing:
  base_nightly: 1000.0
  cleaning_fee: 500.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        车道在车辆进出时存在盲区，请务必格外小心，如有儿童在场，请安排专人在旁看护。
      severity: minor
    - description: >
        花园内多处存在未设围栏的陡坡落差区域。请勿让儿童单独在花园活动；抵达后请先熟悉周边环境。
      severity: minor
    - description: >
        楼梯区域——请勿让幼儿在楼梯上玩耍，以免跌落受伤。
      severity: minor
    - description: >
        降雪后车道及户外台阶因反复结冰融化，极易形成冰面，请谨慎通行；如路况需要，请为车辆安装雪链。
      severity: minor
    - description: >
        浴缸及水疗浴缸——注水后请勿让幼儿无人看管；使用完毕后请立即排水。
      severity: minor
    - description: >
        露台烧烤炉——存在油脂起火风险。请保持清洁，使用时全程看管，并确保使用后完全熄灭。
      severity: minor
    - description: >
        柴火壁炉——幼儿无人看管时有烫伤风险。请遵照手册中的操作说明使用。
      severity: minor
    - description: >
        窗户及推拉门——请勿将幼儿单独留在可轻易接触窗户的房间内。
      severity: minor

  house_rules:
    - category: parking
      heading: 停车
      bullets:
        - 请仅在车道上的指定区域停车，不得停放于路边或其他位置。
        - 车道及车库共可容纳最多 4 辆车。
    - category: spa-pool
      heading: 水疗泳池 / 热水浴缸
      bullets:
        - 请使用随车库门遥控器一同提供的塑料钥匙解锁水疗池盖。
        - 入池前请先淋浴，以保持水质清洁。
        - 仅可添加氯消毒剂——请勿加入泡泡浴液、发泡剂或其他任何物质。
        - 请勿在水疗池内或附近携带食物、饮料或玻璃器皿。
        - 使用完毕后请盖回水疗池盖。
        - 使用水疗池风险自负；请全程看护儿童，并避免在饮酒后使用。
    - category: keys-remotes
      heading: 钥匙与遥控器
      bullets:
        - 退房时，请将所有门禁钥匙及车库门遥控器放在厨房操作台上。
        - 如有钥匙或车库遥控器丢失，将收取相应赔偿费用。
    - category: wood-burner
      heading: 客房柴火炉
      bullets:
        - 仅在成人陪同的情况下方可使用——请勿将柴火炉在无人看管的状态下燃烧。
        - 火焰稳定后请保持炉门**关闭**（仅在续柴时短暂开启；过度燃烧会损坏炉具）。
        - 请仅使用房内提供的柴火和引火物——请勿燃烧垃圾、经处理的木材或助燃剂。
        - "**切勿将灰烬倒入垃圾桶或任何通风处**——余烬可能复燃。请待灰烬完全冷却后处理；如灰烬堆积过多，请联系房东。"
        - 燃火期间请全程看护儿童；炉门、玻璃及周边区域温度极高，请勿触碰。
    - category: gas-fire
      heading: 楼上燃气壁炉（Escea）
      bullets:
        - "**离开客厅时及退房前，请务必关闭燃气壁炉**——即使 60 分钟自动定时器仍在运行，也请手动关闭。"
        - 不建议将其作为主要取暖设备；请仅在房间内有人时使用。
        - 燃气壁炉开启期间请全程看护儿童；玻璃面板温度极高，请勿触碰。
        - 请勿将布料、纸张或易燃物品放置在壁炉正面 1 米范围内。
    - category: bbq
      heading: 户外烧烤炉（Weber Q3200）
      bullets:
        - "**点火前请务必先打开炉盖**——以防燃气积聚。"
        - "**使用完毕后请务必关闭烧烤炉**，包括燃烧器控制旋钮和主燃气开关。"
        - 请待烤盘冷却后再用配备的钢丝刷清洁——切勿趁热清洁。
        - 请勿移动烧烤炉，且严禁在遮盖物下或车库内使用。
    - category: insinkerator
      heading: 厨余垃圾处理器（Insinkerator）
      bullets:
        - "**使用处理器时及停止使用后，请持续开冷水 10～15 秒**——以冲走残留物并防止堵塞。"
        - "**仅限处理软性厨余**：蔬菜皮、少量熟米饭/意面、果皮等。"
        - "**严禁放入**：骨头、果核、油脂、蛋壳、咖啡渣、纤维类蔬菜（如芹菜、玉米皮）或任何非食物类物品。"
        - "**任何时候请勿将手伸入处理器**，即使在关机状态下也不例外。"
        - 如发生堵塞，请立即停止使用并联系房东。


  access:
    front_door: >
      您可通过智能门锁自助入住。您的专属入住密码将在抵达前 24 小时通过预订平台发送给您。
    garage: 随行提供 1 个车库门遥控器，退房时请携带至室内放置于指定位置。
    back_door: ''
    other: >
      水疗池盖塑料钥匙随车库遥控器一同提供。

  notes:
    - 房屋警报系统在您入住期间不启用。
    - 急救箱位于厨房储藏柜内（左侧上层搁板）。
    - 灭火器位于厨房水槽下方柜内。
    - 燃气截止阀位于入口楼梯间右侧靠车库一侧。
    - 紧急情况下，请从前门撤离，集合点为车库外的车道处。
