# gitleaks config for snowbirdhq-website.
# Wi-Fi credentials in the vendored SOT copy at data/sot/properties/<slug>/
# (and translated overlays at data/sot/properties/<slug>/<lang>/) and in
# the legacy hand-authored user-instructions.mdx files are operational
# facts — communicated to every guest, pushed to OTA listings via Hostaway,
# and intended to be loaded into <PropertyQuickInfo> at build time. Not
# API keys.

[extend]
useDefault = true

[allowlist]
description = "Vendored property SOT (incl. translation overlays) and legacy property MDX files"
paths = [
  '''data/sot/properties/[^/]+/(?:[a-z]{2}/)?(facts|policies)\.yaml''',
  '''data/sot/properties/[^/]+/(?:[a-z]{2}/)?.+\.md''',
  '''content/docs/properties/[^/]+/.+\.mdx''',
]
