# Pre-Airbnb-onboarding access pattern (April 2026): door open on arrival,
# physical key on the kitchen bench. Smart lock will become the long-term
# method once commissioning is finished.
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: keyless_open
  instructions: >
    您到达时，前门将处于未锁状态。厨房台面上放有一把钥匙——请在每次外出时及退房时用它锁好房门，离开时将钥匙留在厨房台面上。
check_out:
  time: '10:00'
wifi:
  network: BaseCamp
  password: ZoeZoe23
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'External security cameras facing street' per listing.md
  noise_monitor: true  # 'Noise monitor in main living area' per listing.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: strict
  instant_bookable: true
pricing:
  base_nightly: 650.0
  cleaning_fee: 300.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        山坡地形——雨天或结冰时，车道和户外台阶会变得湿滑。请小心通行，如路况需要，请为车辆安装防滑链。
      severity: minor
    - description: >
        阳光房为玻璃屋顶——请勿让儿童攀爬玻璃下方的家具。
      severity: minor
    - description: >
        甲板上设有烧烤架——存在油脂起火风险。请保持清洁，使用时全程看管，并确保使用后完全熄灭。
      severity: minor

  house_rules:
    - category: shoes
      heading: 鞋履
      bullets:
        - 请在室内脱鞋，以保持居家整洁。
    - category: parking
      heading: 停车
      bullets:
        - 车道提供免费场外停车位，最多可停3辆车。
        - 请仅使用指定停车位。
    - category: keys
      heading: 钥匙与门禁
      bullets:
        - 您到达时，前门将处于未锁状态，厨房台面上放有一把钥匙。
        - 每次外出及退房时，请用钥匙锁好房门。
        - 退房时，请将钥匙留在厨房台面上。

  access:
    front_door: >
      您到达时，前门将处于未锁状态。厨房台面上放有一把钥匙——请在每次外出时及退房时用它锁好房门。离开时，请将钥匙留在厨房台面上。
    back_door: ''
    garage: ''
    other: ''

  notes:
    - 该房源目前正处于调试阶段（2026年4月）——如发现任何问题或设施故障，请及时联系房东，以便记录并反馈给项目团队。
