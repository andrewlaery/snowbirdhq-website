features: []
parking:
  spaces: 4
  type: driveway
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    フロントドアのスマートロックにてセルフチェックインが可能です。お客様専用のアクセスコードは、
    ご到着の24時間前に予約プラットフォームを通じてお送りします。チェックイン時にコードが
    機能しない場合は、ホストにご連絡ください。コードはまれにリモートで再有効化が必要になることがあります。
check_out:
  time: '10:00'
wifi:
  network: SnowbirdQT
  password: Namaste99
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'CCTV outside property' per ota-manager booking_specific
  noise_monitor: true  # Minut noise monitor per owner.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: false
pricing:
  base_nightly: 1000.0
  cleaning_fee: 500.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        車両の切り返し時に死角が生じる箇所があります。十分にご注意いただき、
        お子様がいる場合は別の方に安全確認をお願いしてください。
      severity: minor
    - description: >
        庭の各所に柵のない急な段差・落下箇所があります。お子様を一人にしないよう
        ご注意いただき、到着後はお早めに周辺の状況をご確認ください。
      severity: minor
    - description: >
        階段付近では、小さなお子様が遊ばないようにしてください。転落による怪我の
        危険性があります。
      severity: minor
    - description: >
        雪が降った後、凍結と融解が繰り返されることでドライブウェイや屋外階段が
        非常に滑りやすくなります。ドライブウェイのご利用には十分ご注意いただき、
        路面状況によってはスノーチェーンをご装着ください。
      severity: minor
    - description: >
        浴槽・スパバスに水を張っている際は、小さなお子様を一人にしないでください。
        ご使用後はすぐに水を抜いてください。
      severity: minor
    - description: >
        デッキのバーベキューグリルは油火災の危険があります。常に清潔に保ち、
        使用中は目を離さず、使用後は完全に消火されていることをご確認ください。
      severity: minor
    - description: >
        薪暖炉は、小さなお子様が一人でいると火傷の危険があります。
        コンペンディアムに記載の取扱い説明に従ってご使用ください。
      severity: minor
    - description: >
        窓・スライドドアの近くに小さなお子様を一人で置かないようにしてください。
      severity: minor

  house_rules:
    - category: parking
      heading: 駐車場について
      bullets:
        - 駐車はドライブウェイの指定スペースのみをご利用ください。路上駐車はご遠慮ください。
        - ドライブウェイとガレージを合わせて最大4台まで駐車可能です。
    - category: spa-pool
      heading: スパプール・ホットタブについて
      bullets:
        - スパのカバーを開けるには、ガレージドアリモコンと一緒に保管されているプラスチック製キーをご使用ください。
        - 入る前にシャワーを浴びて、水質を清潔に保ってください。
        - 添加できるのは塩素のみです。泡立て剤・発泡剤・その他の物質は使用しないでください。
        - スパの中や近くで飲食物・ガラス製品をご使用にならないでください。
        - ご使用後はスパのカバーを元に戻してください。
        - ご利用はお客様自身の責任となります。お子様から目を離さず、飲酒後のご使用はお控えください。
    - category: keys-remotes
      heading: 鍵・リモコンについて
      bullets:
        - チェックアウトの際は、すべてのアクセスキーとガレージリモコンをキッチンのカウンターに置いてください。
        - 鍵またはガレージリモコンを紛失された場合は、費用を請求させていただきます。

  access:
    front_door: >
      スマートロックによるセルフチェックインです。お客様専用のアクセスコードは、
      ご到着の24時間前に予約プラットフォームを通じてお送りします。
    garage: ガレージリモコンを1台ご用意しています。チェックアウト時は室内にお持ちください。
    back_door: ''
    other: >
      スパプールカバー用のプラスチック製キーは、ガレージリモコンと一緒に保管されています。

  notes:
    - 滞在中、家屋の警報システムは作動しておりません。
    - 救急セットはキッチンのパントリー内（左側上段棚）にあります。
    - 消火器はキッチンのシンク下にあります。
    - ガスの元栓は、玄関階段のガレージ側（右手側）にあります。
    - 緊急時はフロントドアからお出になり、ガレージ前のドライブウェイが避難集合場所です。
