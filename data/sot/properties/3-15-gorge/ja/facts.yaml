  - 無線LAN
appliances:
  # Kitchen
  - gorge-electric-hob                   # electric hob
  - gorge-oven                           # Parmco electric oven (timer-must-be-on)
  - gorge-dishwasher                     # Haier dishwasher
  - russell-hobbs-rhmo300                # Russell Hobbs Family Microwave (34 L / 1100 W)
  - insinkerator                         # food waste disposal (right-side wall switch)
  # Heating
  - gorge-heat-pump                      # living area heat pump (23 °C; modes Heat/Cool/Dry/Auto/Fan)
  - gorge-underfloor-heating             # bathroom underfloor (slow warm-up)
  - gorge-towel-rail                     # heated towel rail (separate switch; off at checkout)
  - 3-15-gorge-panel-heater              # hallway panel heater
  - 3-15-gorge-portable-heater           # bedroom portable (stored in wardrobe)
  # Laundry
  - gorge-top-loader-washer              # in-bathroom top-loader (Normal/Quick/Delicate)
  - gorge-shared-dryer                   # complex shared dryer ($4 coin; code on keychain)
  # Tech
  - gorge-tv                             # Samsung Frame TV 55" — single remote (Art Mode)
features:
  - balcony
  - mountain_views
  - laundry
  - central_location
parking:
  spaces: 1
  type: shared_complex
  garage: false
  garage_remote: false
  notes: Whistler Apartmentsの共用駐車場内に1台分のスペースをご利用いただけます（個別指定なし）。
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    玄関ドアのデジタルロックにてセルフチェックインが可能です（2026年2月設置、旧来の鍵・ロックボックス方式より変更）。アクセスコードはご到着の24時間前に予約プラットフォームを通じてお送りします。なお、Whistler Apartmentsのフロントはこの物件とは無関係です。ご不明な点はすべて予約プラットフォームよりホストまでお問い合わせください。
check_out:
  time: '10:00'
wifi:
  network: Unit 3
  password: guest3030
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: 07:00
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: true
pricing:
  base_nightly: 180.0
  cleaning_fee: 150.0
  extra_person_fee: 100.0
  weekly_discount: 0.95
  monthly_discount:
  currency: NZD
exceptions:
  hazards:
    - description: >
        フロントへの急勾配のドライブウェイ：雨天時・凍結時はご注意ください。
      severity: minor
    - description: >
        キッチンのコンロ／オーブン用幹線スイッチ：キッチン右側の壁にあります。オーブンやコンロに電源が入らない場合は、まずこのスイッチをご確認ください。
      severity: info

  house_rules:
    - category: parking
      heading: 駐車場
      bullets:
        - Whistler Apartmentsの共用駐車場内に1台分のスペースをご利用いただけます（個別指定なし）。
    - category: sofa-bed
      heading: ソファベッド（オプション）
      bullets:
        - リビングルームのソファベッドに追加で1名様がご宿泊いただけます。
        - 事前のリクエストが必要です。追加料金$50が発生します。
    - category: balcony
      heading: バルコニー
      bullets:
        - ご利用時間は午前7時〜午後10時のみとなります。
        - バルコニーでの洗濯物の乾燥はご遠慮ください（管理組合規則）。
        - バルコニーへの物の放置・保管はご遠慮ください（管理組合規則）。

  access:
    front_door: >
      玄関ドアのスマートロックにてセルフチェックインが可能です（2026年2月設置）。アクセスコードはご到着の24時間前に予約プラットフォームを通じてお送りします。外出時の施錠は、キーパッドのロゴの上に手をかざすとドアがロックされます。
    back_door: ''
    garage: >
      荷物保管室のドアコードは **C8743** です。フロントから急勾配のドライブウェイを下り、右手のガレージエリアにお進みください。
    other: >
      Whistler Apartmentsのフロントはこの物件とは無関係です。ご不明な点はすべて予約プラットフォームよりホストまでお問い合わせください。

  notes:
    - 黒いハウスマニュアルはキッチンカウンターの上にあります。チェックアウト時はそのままの場所にお置きください。
    - "**建物管理者**（お湯・エレベーター・共用部分に関するお問い合わせのみ）：03 409 0394、またはフロント横の電話をご利用ください。アパート内に関するご用件は、ホストまで直接お問い合わせください。"
    - アパート内の水道水は安全にお飲みいただけます。
    - 停電の際は、Aurora EnergyのクイーンズタウンOutageページをご確認ください。
    - トラベルコット（簡易ベッド）とハイチェアはご要望に応じてご用意します。ご到着前にホストへお知らせください。

  usage_sections:
    - category: internet
      heading: インターネット／Wi-Fi
      body: |
        ネットワーク名とパスワードは上記のクイックリファレンスをご確認ください。ルーターはベッドルームに設置されています。接続に問題が生じた場合は、モデムの電源を一度オフにし（20秒ほどコンセントを抜いてから）再接続してください。建物のコンクリート壁の影響で、ラウンジではWi-Fiの電波が弱くなることがあります。テレビキャビネットの裏側に電波ブースターが設置されています。

    - category: heating
      heading: 暖房
      body: |
        - **ヒートポンプ（リビングエリア）** — 壁掛け式で、アパート全体を暖めます。推奨設定：暖房モードで23℃。リモコンにてHeat／Cool／Dry／Auto／Fanのモード切替が可能です。ベッドルームの暖かさはドアの開閉状況や補助暖房の使用状況によって異なります。ヒント：衣類乾燥ラックの近くでヒートポンプを稼働させると、乾燥が早まります。
        - **バスルーム床暖房** — 電気式。バスルームの壁にオン／オフスイッチと温度調節ダイヤルがあります。温まるまでに時間がかかります。体感できる温度になるまで約30分、十分な暖かさになるまで約1〜2時間かかります。**チェックアウト時は必ずオフにしてください。**
        - **タオルウォーマー（電熱式）** — 壁掛け式。床暖房とは独立した壁のスイッチでオン／オフします。温まるまでに20〜30分かかります。**チェックアウト時は必ずオフにしてください。**
        - **パネルヒーター** — 廊下に設置されています。
        - **ポータブルヒーター** — ベッドルーム用として、クローゼットに保管されています。

    - category: kitchen
      heading: キッチン
      body: |
        - **幹線スイッチ（キッチン右側の壁）** がオンになっていないと、コンロとオーブンは動作しません。「コンロ／オーブンが使えない」というご連絡の最も多い原因です。
        - **電気クッキングヒーター** — ダイヤルでバーナーと火力を選択します。ヒーター素子が十分に温まるまで30〜60秒かかります。調理器具は素子の上にしっかり平らに置いてください。
        - **Parmco電気オーブン** — 3つのノブで温度・タイマー・機能を設定します。**タイマーをオンにしないとオーブンは加熱されません。**「オーブンが温まらない」というご連絡の最も多い原因です。機能モード：上下ヒーター／上段シェルフ＋ファン／ライトのみ／ファン加熱。機能を選択し、温度を設定してから、タイマーダイヤルを希望の時間（またはオートベイク）に合わせてください。
        - **Russell Hobbs Family電子レンジ**（型番RHMO300、34L／1100W） — デジタルプッシュボタンパネル。時間を入力した後、**スタート**ボタンを押してください。数字を入力するだけでは加熱が始まりません（「動かない」というご連絡の最も多い原因です）。ドアはカチッとしっかり閉まるようにしてください。デフォルトの出力は最大です。残り物の温め直しには、まず**出力レベル**を設定し（低めに設定すると穏やかに温まります）、次に時間を設定してからスタートを押してください。重量解凍：**デフロスト**を押し、グラム単位で重量を入力してからスタートを押してください。完全にリセットするには**ストップ／キャンセル**を2回押してください。（コンロと共用の幹線スイッチがオンになっている必要があります。）
        - **Haier食器洗い機** — 洗浄タブレットはシンク下に収納されています。プログラムノブを回してコースを選択し、中央のボタンを押してスタートします。エコモード推奨（最長コースですが、エネルギーと水の使用量が最も少なくなります）。チェックアウト前に運転してください。
        - **インシンクエレーター（生ゴミ処理機）** — キッチン右側の壁、ケトルの隣のスイッチを操作してください。

    - category: location
      heading: 周辺の移動手段
      body: |
        - 中心部に近く、タウンセンターまで徒歩圏内です。
        - クイーンズタウン空港まで車で10〜15分です。
        - **バス** — タウンセンターのFour Squareそばのバス停をご利用ください。料金は現金$5またはBeeカード（Beeカードの方がお得です）。時刻表はTransitアプリまたはorc.govt.nzでご確認ください。
        - **空港バス** — Stanley StreetのSuper Liquorの向かいからRoute 1が出ています。料金は現金$4のみ、空港への直行便です。
        - Uberもご利用いただけます。
        - QTタクシー：03 450 3000

    - category: nearby_shops
      heading: 周辺のショップ
      body: |
        - **Fresh Choice** — 徒歩約5分（道路を渡ったところ）、午後10時まで営業。
        - **Raeward Fresh** — 徒歩約5分（デリ・精肉店）。
        - **Pak'nSave**・**Countdown** — フランクトン、車で約20分。
        - **Four Square** — タウンセンター内。

    - category: storage
      heading: スキー・自転車・荷物の保管
      body: |
        - **スキー保管**：アパート下のスキー／乾燥室をご利用ください。備え付けのスキーロックをお使いください。
        - **自転車ラック**：駐車場の乾燥室外側にあります。自転車用ロックをお使いください。
        - **荷物保管**（チェックイン前／チェックアウト後）：フロント下のガレージエリア内の保管室をご利用ください。フロントから急勾配のドライブウェイを下り、右手のガレージへお進みください。ドアコード：**C8743**
        - 市内での荷物保管はBounce.comもご利用いただけます。

    - category: appliances
      heading: 家電の使い方
      body: |
        - **縦型洗濯機（バスルーム内）**：洗濯用洗剤をご用意しています。ふたを開けて衣類をドラムに入れ、ディスペンサーに洗剤を入れてください。前面のダイヤルでコースを選択します（Normal／Quick／Delicate）。スタートボタンを押してください。乾燥ラックが備え付けてあります。ヒートポンプの近くに設置してヒートポンプをオンにすると、乾燥が早まります。**バルコニーでの洗濯物の乾燥はご遠慮ください**（管理組合規則）。
        - **共用乾燥機（共用乾燥室）**：1回$4（$2硬貨×2枚を投入して起動）。アクセスコードはアパートのキーホルダーの裏面に記載されています。乾燥室は下の駐車場エリアにあります。
        - **Samsung Frame TV（55インチ、リモコン1台）**：スマートTVで各種アプリが内蔵されています。Samsungのリモコン1台ですべての操作が可能です。**アートモード**：電源をオフにするとテレビは黒い画面ではなく絵画を表示します。これは正常な動作であり、故障ではありません（「テレビがオフにならない」というご連絡の最も多い原因です）。電源ボタンの短押しでアートモードとテレビ表示の切替、長押しで完全な電源オフができます。**ホーム**ボタンでアプリ選択画面を表示できます。**Netflix**：お客様ご自身のアカウントでサインインしてください。チェックアウト前に必ずサインアウトしてください。
