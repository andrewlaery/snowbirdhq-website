parking:
  spaces: 1
  type: garage
  garage: true
  garage_remote: false
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: lockbox
  instructions: >
    自助入住，请使用大门信箱旁的钥匙储物箱。请输入入住确认文件中提供的密码打开储物箱——您将找到一个门禁卡和一把钥匙。门禁卡可用于进入楼栋大门及公寓前门；钥匙用于打开车库内的宾客储物柜。使用门禁卡后请等待1秒，然后轻轻将门拉向自己再开门。**每次进入只需刷一次门禁卡**——多次刷卡可能触发楼栋警报（若警报响起，再刷一次即可解除）。
check_out:
  time: '10:00'
wifi:
  network: SkyCrest
  password: Namaste25
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: 07:00
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false
booking_terms:
  min_nights: 3
  max_nights: 27
  cancellation_policy: strict
  instant_bookable: false
pricing:
  base_nightly: 3000.0
  cleaning_fee: 300.0
  extra_person_fee: 0.0
  weekly_discount:
  monthly_discount:
  currency: NZD
exceptions:
  hazards:
    - description: >
        水疗泳池／热水浴缸——请全程看管儿童。使用风险自负；饮酒后请勿使用。
      severity: minor
    - description: >
        桑拿房——温度较高。每次使用时间请控制在15至20分钟以内；儿童须全程在成人陪同下使用。
      severity: minor
    - description: >
        通往顶层的楼梯——请注意脚下安全，携带行李时尤需小心。电梯可通往主楼层。
      severity: info

  house_rules:
    - category: parking
      heading: 停车说明
      bullets:
        - 使用门禁卡进入单车位车库。在车库内靠近楼栋通道门处的按钮可从内部开启车库门。
    - category: building
      heading: 楼栋门禁
      bullets:
        - 每次进入只需刷一次门禁卡——多次刷卡可能触发楼栋警报。若警报响起，再刷一次即可解除。
        - 公寓前门对讲机不可用——从楼栋大门处无法使用门铃功能。

  access:
    front_door: >
      请使用门禁卡进入公寓前门。使用门禁卡后请等待1秒，然后轻轻将门拉向自己再开门。每次进入只需刷一次，以免触发楼栋警报。
    back_door: ''
    garage: >
      可在门外使用门禁卡，或在车库内靠近楼栋通道门处的按钮开关车库门。
    other: >
      前方大门可能处于锁闭状态——请使用门禁卡进入。

  notes:
    - 房屋警报系统在您入住期间不启用。
    - 电梯可通往主楼层；如需前往顶层，请继续走楼梯。
