# yaml-language-server: $schema=../_schemas/facts.json
schema_version: 1
slug: 3-kent-home

# 3-Kent-Home = whole-house listing (combines upstairs + downstairs).
# Insurance + Resource Consent capped: 8 (upstairs) + 4 (downstairs) = 12.
# Solves the upstairs/downstairs sound issue when one party books both.
capacity:
  max_guests: 12
  max_adults: 12
  min_age_lead_guest: 25

bedrooms:
  - name: '楼上 — 卧室1（主卧）'
    bed: TBC
    ensuite: false  # TBC
    notes: '楼上公寓。床型配置待下次盘点后确认。'
  - name: '楼上 — 卧室2'
    bed: TBC
    ensuite: false
    notes: '楼上公寓。'
  - name: '楼上 — 卧室3'
    bed: TBC
    ensuite: false
    notes: '楼上公寓。'
  - name: '楼上 — 卧室4'
    bed: TBC
    ensuite: false
    notes: '楼上公寓。'
  - name: '楼下 — 卧室1'
    bed: TBC
    ensuite: false
    notes: '楼下公寓。'
  - name: '楼下 — 卧室2'
    bed: TBC
    ensuite: false
    notes: '楼下公寓。'
  - name: '楼下 — 额外床位小角落（即"0.5间"）'
    bed: single
    ensuite: false
    notes: >
      无窗小角落，配有单人床（仅适合儿童使用，无门）。
      房东将其称为"2.5间卧室"中的"0.5"。
bedroom_count: 6.5
bed_count: 7  # Conservative — actual layout TBC
bathroom_count: TBC
beds_summary: '待确认 — 房东盘点中'

amenities:
  - Wi-Fi
  - 免费停车
  - 地暖（全屋）
  - 热泵空调
  - 燃气壁炉
  - 2台洗碗机
  - 洗衣机
  - 烘干机
  - 智能电视
  - Sky电视
  - 咖啡机
  - 花园通道（可通往皇后镇山步道）
  - 山景
  - 业主专用上锁储物柜（部分区域不对客人开放）

features:
  - underfloor_heating
  - gas_fireplace
  - garden
  - walking_track_access
  - lockable_owner_storage

parking:
  spaces: 1
  type: '车道'
  garage: false
  garage_remote: false

check_in:
  start_time: '15:00'
  end_time: '22:00'
  method: 'TBC'  # smart-lock or keypad to be confirmed; current Goodstays uses keypad
  instructions: '待确认：各房源入住说明将于正式上线前补充完整（2026-07-01）'

check_out:
  time: '10:00'

wifi:
  network: 'Monkeymousewifi'
  password: 'bendalong'

house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 250
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false

booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: moderate
  instant_bookable: true

pricing:
  base_nightly: 0  # TBC — pricing strategy still being negotiated with owners
  cleaning_fee: 0  # TBC
  extra_person_fee: 0
  weekly_discount: null
  monthly_discount: null
  currency: NZD

exceptions:
  hazards:
    - description: >
        这是一栋上下两层的住宅，楼上与楼下公寓之间设有内部楼梯。楼层之间有一定隔音效果（混凝土地板较厚），但穿鞋走动的声音仍可能传递。上下楼梯时请注意安全，并请看护好儿童。
      severity: minor
    - description: >
        全屋铺设地暖，地板表面会保持温热。地暖恒定设置为20°C，温度变化较慢（升温或降温约需2天）；请勿自行调节控制面板。
      severity: info
    - description: >
        房屋后方紧邻皇后镇山步道，可经后花园直接进入。请看护好儿童；该步道坡度较陡，请注意安全。
      severity: minor
  house_rules:
    - category: amenity-rules
      heading: 设施使用须知（全屋）
      bullets:
        - "**地暖已固定设置为20°C**，在您入住期间**不可调节** — 系统升温或降温约需2天时间。"
        - "部分区域设有**业主专用上锁储物柜**，请勿开启或使用（均有明确标识或已上锁）。"
        - "**户外坐垫**：请每晚将其拿回室内，以免受潮，影响次日使用或下一批客人的体验。"
        - "**餐桌**：请使用房内提供的餐垫和杯垫，切勿将热物直接放置于桌面上。"
        - "**洗碗机洗涤剂**：请仅使用房内提供的**洗碗粉**。使用液体洗涤剂会导致机器故障，由此产生的维修费用将由您承担。"
    - category: parking
      heading: 停车说明
      bullets:
        - 房源设有车道停车位，可供您使用。
        - Kent Street路边亦提供路边停车位。
  access:
    front_door: '待确认：各房源进入说明将于正式上线前补充完整（2026-07-01）。'
    back_door: ''
    garage: ''
    other: ''
  notes:
    - "**灭火器**位于**厨房旁储物间内**，靠近窗户的右侧角落。"
    - "**保险丝箱／断路器板**位于**一楼（楼上）浴室对面的衣帽间内**。"
    - "**燃气壁炉隔离开关**位于**壁炉机组后方**（设计如此，无法通过普通墙壁开关控制）。"
    - "**Wi-Fi扩展器**位于楼上 — 如果网速较慢，请将您的设备Wi-Fi关闭后重新开启，设备将自动连接信号最强的接入点。"
    - "**烤箱具备自清洁功能** — 请勿使用任何化学清洁剂，按照屏幕提示操作即可完成自清洁。"
    - "**皇后镇山步道**可经后花园直接进入，非常适合热爱徒步的您前往探索。"

