# Bed layout per ota-manager listing.md prose (owner-confirmed 2026-04-27).
# Note: BedType schema has no "king_single" — modelled as long_single.
bedrooms:
  - name: 卧室 1（主卧）
    bed: super_king
    ensuite: true
    notes: 上层。带步入式衣橱。
  - name: 卧室 2
    ensuite: true
    beds:
      - super_king
      - single
    notes: 主层。含一张单人双层床。
  - name: 卧室 3
    ensuite: true
    beds:
      - super_king
      - long_single
      - single
    notes: >
      主层。含 1 张加长单人床 + 1 张单人子母床。已知问题：
      大窗底部有冷风渗入（室温可能偏低）。
