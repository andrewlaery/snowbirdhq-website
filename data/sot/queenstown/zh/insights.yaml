          - name: BroBike
            description: 一家深受本地人喜爱的皇后镇单车店，由专业技师团队经营。提供山地车销售（Pivot、Trek、Cannondale、Scott 等品牌）、日租服务及全面维修保养。Aiden 和团队以真诚的建议和优质的服务著称。
            website: https://brobike.co.nz/
          - name: Vertigo Bikes
            description: 皇后镇备受赞誉的单车店，以山地车租借和导览行程著称，同时提供单车保养服务及各类骑行装备销售。
            website: https://www.vertigobikes.co.nz/
          - name: Outside Sports
            description: 提供种类丰富的单车出售或租借服务，包括山地车、公路车和电动车。同时提供单车保养服务，拥有经验丰富的专业团队，满足您的一切骑行需求。
            website: https://www.outsidesports.co.nz/
          - name: EBike Studio（原 Charge About）
            description: 专注于电动单车租借，是希望轻松探索周边地区的游客的理想选择。提供高品质电动单车，并附赠地图和最佳骑行路线建议。
            website: https://ebikestudio.co.nz/
          - name: Bikeaholic
            description: 专注于山地车，Bikeaholic 提供单车销售、租借和专业维修等全方位服务。团队对山地车充满热情，提供出色的建议和服务。
            website: https://www.bikeaholic.co.nz/
          - name: Cycle Higher
            description: 以丰富的单车租借选择著称，包括山地车、公路车和休闲单车。同时提供导览行程和实用的本地路线建议。
            website: https://cyclehigher.com/
          - name: The Bike Lounge
            description: 提供高端单车销售、租借和专业维修服务，专为认真的骑行者和发烧友服务，注重品质与性能。
