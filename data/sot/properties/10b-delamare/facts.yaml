        Garage door swings outward — ensure no vehicle is parked directly
        in front before opening.
      severity: minor

  house_rules:
    - category: parking
      heading: Parking
      bullets:
        - Single garage with remote-controlled door (fob is in the lockbox
          and on the kitchen table).
        - Garage fits small/medium cars only — 7-seaters, SUVs, and
          vehicles with low body kits will NOT fit and may scrape.
        - Larger vehicles — most guests park in front of the garage doors.
        - Street parking also available along the road parallel to the
          driveway.
        - Garage door swings outward — clear the area before opening.

  access:
