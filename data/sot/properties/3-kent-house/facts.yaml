exceptions:
  hazards:
    - description: >
        Two-level home — sound carries to the downstairs apartment if it's also occupied.
        Be considerate of guests below if both units are let.
      severity: minor
    - description: >
        Underfloor heating throughout — surfaces stay warm. Set at 20°C and slow to change
        (~2 days to heat up or cool down); please don't adjust the controls.
      severity: info
    - description: >
        Backs onto the Queenstown Hill walking track. Track access via the back garden — keep
        children supervised; the track itself is steep.
      severity: minor
  house_rules:
    - category: amenity-rules
      heading: Amenity Rules (Upstairs)
      bullets:
        - "**Underfloor heating is set at 20°C** and is **not adjustable** — the system takes ~2 days to change temperature."
        - "**Outdoor cushions**: please bring inside at night."
        - "**Dining table**: please use the placemats and coasters — no hot items directly on the table."
        - "**Dishwasher detergent**: use only the **dishwasher powder provided** — liquid causes a fault and repair fees apply."
        - "**Gas fireplace**: turn off via the switch panel in the top-left corner of the heater. The unit's main isolator is **behind the fire unit by design** — use the panel switch."
    - category: parking
      heading: Parking
      bullets:
        - On-site parking on the driveway.
        - Street parking available on Kent Street.
  access:
    front_door: 'TBC: per-property access instructions to be added before go-live (2026-07-01).'
    back_door: ''
    garage: ''
    other: ''
  notes:
    - "**Fire extinguisher** is in the **pantry off the kitchen**, right-hand corner near the window."
    - "**Fuse box / circuit board** is in the **coat room opposite the bathroom on Level 1**."
    - "**Gas fireplace isolator** is **behind the fire unit** (not switchable from a normal wall switch — by design). Use the on/off button on the top-left of the heater panel."
    - "**Wi-Fi extender** is upstairs — turn Wi-Fi off then on if you're not getting fast internet."
    - "**Self-cleaning oven** — no chemicals; follow the on-screen instructions to self-clean."
    - "**Queenstown Hill walking track** is accessible via the back garden."
    - "**Hard-copy manuals** are available for the dryer, washing machine, TV, and coffee machine — ask the host if you need PDFs."

