schema_version: 1
slug: 10b-delamare
capacity:
  max_guests: 6
  max_adults: 6
  min_age_lead_guest: 25

# From legacy listing.md: 3 bedrooms, 4 beds — 2 queens + 1 split-king
# (which the VRBO 'The Space' prose describes as "one king which can be
# split into two singles"; the Airbnb 'Description' prose describes the
# same configuration as "two single beds"). 2 bathrooms (1 upstairs, 1
# downstairs with shower). All bedrooms upstairs.
bedrooms:
  - name: Bedroom 1 (upstairs)
    bed: queen
    ensuite: false
  - name: Bedroom 2 (upstairs)
    bed: queen
    ensuite: false
  - name: Bedroom 3 (upstairs)
    bed: split_king
    ensuite: false
    notes: King bed that splits into two singles. Counts as 2 beds in OTA listings.
bedroom_count: 3
bed_count: 4
bathroom_count: 2.0
