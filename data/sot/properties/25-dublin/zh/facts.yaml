features: []
parking:
  spaces: 4
  type: driveway
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    通过前门智能门锁自助入住。您的专属门锁密码将在抵达前 24 小时通过预订平台发送。
    如果密码在入住时无法使用，请联系房东——密码偶尔需要远程重新激活。
check_out:
  time: '10:00'
wifi:
  network: SnowbirdQT
  password: Namaste99
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'CCTV outside property' per ota-manager booking_specific
  noise_monitor: true  # Minut noise monitor per owner.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: false
pricing:
  base_nightly: 1000.0
  cleaning_fee: 500.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        车道在车辆进出时存在视线盲区，请格外小心，如有儿童在场，
        请安排另一人在旁协助瞭望。
      severity: minor
    - description: >
        花园多处存在无围栏的大面积落差地带。请勿让儿童单独在此活动；
        抵达后请先熟悉周边环境。
      severity: minor
    - description: >
        楼梯间——请避免年幼儿童在楼梯上玩耍，以防跌落受伤。
      severity: minor
    - description: >
        降雪后，车道及户外台阶因反复冻融极易结冰，请谨慎使用车道；
        如路况需要，请为车辆安装防滑链。
      severity: minor
    - description: >
        浴缸／水疗浴缸——浴缸蓄水时请勿让年幼儿童独处。使用完毕后请立即放水。
      severity: minor
    - description: >
        露台烧烤架——存在油脂起火风险。请保持清洁，使用时全程看管，
        并确保使用后完全熄灭。
      severity: minor
    - description: >
        柴火炉——对无人看管的儿童存在烫伤风险。请遵照使用手册中的操作说明。
      severity: minor
    - description: >
        窗户／推拉门——请勿将年幼儿童单独留在可轻易触及窗户的房间内。
      severity: minor

  house_rules:
    - category: parking
      heading: 停车
      bullets:
        - 请仅在车道上的指定车位停车，禁止在路边停放。
        - 车道及车库共可容纳最多 4 辆车。
    - category: spa-pool
      heading: 水疗泳池／热水浴缸
      bullets:
        - 使用水疗设施须自担风险。
        - "**成人须全程监督儿童**在水疗池内及周边的活动。"
        - "**不使用时请将水疗池盖锁好**——钥匙位置及盖子操作方法，请参阅使用说明中的[水疗泳池／热水浴缸](/docs/properties/25-dublin/user-instructions#appliances-wellness)章节。"
        - 入池前请先淋浴，以保持水质清洁。
        - "**仅限使用氯消毒剂**——禁止加入泡泡浴剂、发泡剂、浴盐或其他任何物质。"
        - "**禁止在水疗池内及周边带入食物、饮料或玻璃器皿。**"
        - 饮酒后请勿使用水疗池。

    - category: keys-remotes
      heading: 钥匙与遥控器
      bullets:
        - "**前门入户**：智能门锁密码将在抵达前 24 小时通过预订平台发送——完整入户步骤请参阅[使用说明](/docs/properties/25-dublin/user-instructions)。"
        - "**车库遥控器**（提供 1 个）：退房时请将遥控器带至室内放好。"
        - "**水疗池塑料钥匙**：与车库遥控器存放在一起。"
        - 退房时，请将所有门禁钥匙及车库遥控器放在厨房操作台上。
        - 如有钥匙或车库遥控器丢失，将收取相应赔偿费用。

    - category: wood-burner
      heading: 会客室柴火炉
      bullets:
        - "**柴火炉点燃期间请勿离人**——火焰燃烧时，室内必须有成人在场。"
        - "**柴火炉点燃期间，成人须全程监督儿童**；炉门、炉门玻璃及周边区域温度极高。"
        - 仅使用房源提供的柴火和引火物——禁止燃烧垃圾、防腐木材或助燃剂。
        - "**切勿将灰烬倒入垃圾桶或任何暴露在风中的地方**——余烬可能复燃并引发火灾。"
        - 点火、炉门操作及灰烬冷却等操作说明，请参阅[使用说明 → 会客室柴火炉](/docs/properties/25-dublin/user-instructions#appliances-heating)。

    - category: gas-fire
      heading: 楼上燃气壁炉
      bullets:
        - 仅限人在室内时使用，不建议作为主要供暖热源。
        - "**燃气壁炉开启期间，成人须全程监督儿童**；壁炉玻璃面板温度极高。"
        - 请勿将布料、纸张或其他易燃物品放置在壁炉正面 1 米范围内。
        - 点火、定时及关闭等操作说明，请参阅[使用说明 → 燃气壁炉](/docs/properties/25-dublin/user-instructions#appliances-heating)。

    - category: bbq
      heading: 户外烧烤架
      bullets:
        - "**仅限在花园开放区域使用**——严禁在遮盖区域下或车库内使用。"
        - 烧烤架点燃期间，成人须全程监督儿童。
        - "**烧烤架点燃期间请勿离人。**"
        - 点火、开盖顺序、清洁及关闭等操作说明，请参阅[使用说明 → Weber Q3200 烧烤架](/docs/properties/25-dublin/user-instructions#appliances-outdoor)。

    - category: insinkerator
      heading: Insinkerator（厨余垃圾处理器）
      bullets:
        - "**请勿将手伸入处理器内**，即使已关闭电源也不例外。"
        - "**严禁投入**：骨头、果核、油脂、蛋壳、咖啡渣、纤维类蔬菜（如芹菜、玉米皮）或任何非食物物品——上述物品会导致设备卡堵或损坏，并可能产生维修费用。"
        - 冷水使用、开关位置及卡堵处理等操作说明，请参阅[使用说明 → Insinkerator](/docs/properties/25-dublin/user-instructions#appliances-kitchen)。

  access:
    front_door: >
      通过智能门锁自助入住。您的专属门锁密码将在抵达前 24 小时通过预订平台发送。
    garage: 提供 1 个车库遥控器。退房时请将遥控器带至室内放好。
    back_door: ''
    other: >
      水疗池盖塑料钥匙与车库遥控器存放在一起。

  notes:
    - 房屋报警系统在您入住期间不启用。
    - 急救箱位于厨房储物间内（左侧上层隔板）。
    - 灭火器位于厨房水槽下方柜内。
    - 燃气总阀位于入口楼梯间右侧，靠车库一侧。
    - 如遇紧急情况，请从前门撤离，集合点位于车库外的车道上。

  usage_sections:
    - category: appliances
      heading: 家电使用说明
      body: |
        厨房
        - **烤箱**：使用烤箱前，请先打开储物间内标有 **Oven Leave On** 的隔离开关。若烤箱无法启动，请首先检查该开关是否已开启。
