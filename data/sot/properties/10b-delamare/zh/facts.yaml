# yaml-language-server: $schema=../_schemas/facts.json
schema_version: 1
slug: 10b-delamare
capacity:
  max_guests: 6
  max_adults: 6
  min_age_lead_guest: 25

# From legacy listing.md: 3 bedrooms, 4 beds — 2 queens + 1 split-king
# (which the VRBO 'The Space' prose describes as "one king which can be
# split into two singles"; the Airbnb 'Description' prose describes the
# same configuration as "two single beds"). 2 bathrooms (1 upstairs, 1
# downstairs with shower). All bedrooms upstairs.
bedrooms:
  - name: 卧室一（楼上）
    bed: queen
    ensuite: false
  - name: 卧室二（楼上）
    bed: queen
    ensuite: false
  - name: 卧室三（楼上）
    bed: split_king
    ensuite: false
    notes: 大床可拆分为两张单人床，在OTA平台房源中计为2张床。
bedroom_count: 3
bed_count: 4
bathroom_count: 2.0
beds_summary: 2张大床（Queen）+ 1张可拆分为2张单人床的King床（共4张床）
