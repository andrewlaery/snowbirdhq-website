# yaml-language-server: $schema=../_schemas/facts.json
schema_version: 1
slug: 3-kent-apartment

# 3-Kent-Apartment = downstairs apartment (2.5 bedrooms — converted double garage / engineer's
# workshop). Insurance + Resource Consent capped at 4 guests. The "0.5" is a windowless nook with
# extra bed for kids — no door. Floor-to-ceiling windows; backs onto Queenstown Hill walking track.
capacity:
  max_guests: 4
  max_adults: 4
  min_age_lead_guest: 25

bedrooms:
  - name: 'Bedroom 1'
    bed: queen
    ensuite: false
    notes: 'Bed configuration TBC at next audit.'
  - name: 'Bedroom 2'
    bed: queen
    ensuite: false
  - name: 'Extra bed nook (the ".5")'
    bed: single
    ensuite: false
    notes: >
      Windowless nook with single bed, suitable for kids only — no door. Counts as 0.5 in the
      "2.5 bedrooms" descriptor; not a fully enclosed sleeping room.
bedroom_count: 2.5
bed_count: 3  # Conservative — actual layout TBC
bathroom_count: TBC
beds_summary: 'TBC — owner audit pending (current Goodstays listing shows queen + queen + single)'

amenities:
  - Wi-Fi
  - Free parking
  - Underfloor heating
  - Daikin heat pump (heat + cool)
  - Blanco cooktop (induction)
  - Blanco oven
  - Bosch dishwasher
  - Electrolux EDC2075GDW washing machine
  - Electrolux dryer
  - Samsung TV
  - Floor-to-ceiling windows
  - Mountain views
  - Walking-track access (Queenstown Hill, via the garden)

features:
  - underfloor_heating
  - heat_pump
  - garden
  - walking_track_access
  - mountain_views
  - large_windows  # Floor-to-ceiling

parking:
  spaces: 1
  type: 'driveway'
  garage: false
  garage_remote: false

check_in:
  start_time: '15:00'
  end_time: '22:00'
  method: 'TBC'
  instructions: 'TBC: per-property check-in instructions to be added before go-live (2026-07-01)'

check_out:
  time: '10:00'

wifi:
  network: 'Monkeymousewifi'
  password: 'bendalong'

house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 250
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false

booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: moderate
  instant_bookable: true

pricing:
  base_nightly: 0  # TBC
  cleaning_fee: 0
  extra_person_fee: 0
  weekly_discount: null
  monthly_discount: null
  currency: NZD

exceptions:
  hazards:
    - description: >
        Two-level home — the upstairs apartment may be occupied during your stay. Sound carries
        between levels (concrete floor between thick but not soundproof). Be considerate.
      severity: minor
    - description: >
        Underfloor heating throughout — surfaces stay warm. Set at 20°C and slow to change
        (~2 days to heat up or cool down); please don't adjust the controls.
      severity: info
    - description: >
        Backs onto the Queenstown Hill walking track. Track access via the back garden —
        keep children supervised; the track itself is steep.
      severity: minor
    - description: >
        Extra-bed nook (the ".5") is windowless and has no door — suitable only for older
        children at parents' discretion. Not a fully enclosed sleeping room.
      severity: info
  house_rules:
    - category: amenity-rules
      heading: Amenity Rules (Downstairs Apartment)
      bullets:
        - "**Underfloor heating is set at 20°C** and is **not adjustable** — the system takes ~2 days to change temperature."
        - "**Outdoor cushions**: please bring inside at night."
        - "**Dishwasher detergent**: use only the **dishwasher powder provided** — liquid causes a fault and repair fees apply."
        - "**Dryer is non-vented**: open the laundry window when running it to let out steam."
    - category: parking
      heading: Parking
      bullets:
        - On-site parking on the driveway (shared if both upstairs + downstairs are let).
        - Street parking available on Kent Street.
  access:
    front_door: 'TBC: per-property access instructions to be added before go-live (2026-07-01).'
    back_door: ''
    garage: ''
    other: ''
  notes:
    - "**Smoke detector + fire extinguisher** locations TBC pre go-live."
    - "**Fuse box** is in the upstairs apartment (coat room opposite the bathroom on Level 1) — contact host if power trips."
    - "**Wi-Fi extender** is upstairs — turn Wi-Fi off then on if signal is weak; the device will pick the strongest source."

# See data/sot/_appliances/3-kent-apartment-*.md (per the owner user guide):
# - Daikin heat pump (remote in cradle on wall next to main light switch — green ON button)
# - Blanco cooktop (induction; isolator left of hob, white square switch above GPO)
# - Blanco oven (isolator above GPO left of cooktop; manual in top draw of TV cabinet)
# - Bosch dishwasher (isolator bottom rear of left cupboard)
# - Kitchen extractor fan (isolator on wall left of sink, between GPO switches)
# - Electrolux EDC2075GDW washing machine
# - Electrolux dryer (non-vented — open laundry window)
# - Samsung TV (LIVE TV from menu)
appliances:
  # Tech (AV)
  - 3-kent-apartment-tv                    # Samsung
  # Heating
  - 3-kent-apartment-underfloor-heating    # 20°C constant, not adjustable
  # Climate
  - 3-kent-apartment-heat-pump             # Daikin (heat + cool); remote in wall cradle
  # Kitchen
  - 3-kent-apartment-cooktop               # Blanco induction
  - 3-kent-apartment-oven                  # Blanco (manual in TV cabinet top drawer)
  - 3-kent-apartment-dishwasher            # Bosch (POWDER ONLY)
  - 3-kent-apartment-extractor-fan
  # Laundry
  - 3-kent-apartment-washer                # Electrolux EDC2075GDW (LIQUID OK)
  - 3-kent-apartment-dryer                 # Electrolux
