# yaml-language-server: $schema=../_schemas/facts.json
schema_version: 1
slug: 3-kent-house

# 3-Kent-House = upstairs apartment (4 bedrooms).
# Insurance + Resource Consent capped at 8 guests. The "premium" listing.
# Upstairs has best views.
capacity:
  max_guests: 8
  max_adults: 8
  min_age_lead_guest: 25

bedrooms:
  - name: '寝室1（マスターベッドルーム）'
    bed: TBC
    ensuite: false
    notes: 'ベッドの構成は次回の確認時に決定いたします。'
  - name: '寝室2'
    bed: TBC
    ensuite: false
  - name: '寝室3'
    bed: TBC
    ensuite: false
  - name: '寝室4'
    bed: TBC
    ensuite: false
bedroom_count: 4
bed_count: 4  # Conservative — actual layout TBC
bathroom_count: TBC
beds_summary: '未定 — オーナーによる確認作業中'

amenities:
  - Wi-Fi
  - 無料駐車場
  - 床暖房（全室）
  - 三菱製シーリングヒートポンプ（ダイニングルーム）
  - リンナイ製ガス暖炉
  - Fisher & Paykel製クッキングトップ
  - Electrolux製ダブルオーブン（セルフクリーニング機能付き）
  - Fisher & Paykel製DishDrawer食洗機
  - Samsung製洗濯機
  - Fisher & Paykel製7kgドライヤー（非排気式）
  - LG OLED 55インチ スマートテレビ
  - Sky TV
  - コーヒーメーカー
  - マウンテンビュー
  - ガーデンアクセス（クイーンズタウンヒル・ウォーキングトラック）

features:
  - underfloor_heating
  - gas_fireplace
  - garden
  - walking_track_access
  - mountain_views

parking:
  spaces: 1
  type: 'driveway'
  garage: false
  garage_remote: false

check_in:
  start_time: '15:00'
  end_time: '22:00'
  method: 'TBC'
  instructions: '未定：物件ごとのチェックイン案内は、サービス開始前（2026-07-01）に追加いたします。'

check_out:
  time: '10:00'

wifi:
  network: 'Monkeymousewifi'
  password: 'bendalong'

house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 250
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false

booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: moderate
  instant_bookable: true

pricing:
  base_nightly: 0  # TBC
  cleaning_fee: 0
  extra_person_fee: 0
  weekly_discount: null
  monthly_discount: null
  currency: NZD

exceptions:
  hazards:
    - description: >
        2階建ての住宅のため、下の階のアパートメントが同時に使用されている場合、音が伝わることがあります。
        両ユニットがご利用中の場合は、下階のお客様へのご配慮をお願いいたします。
      severity: minor
    - description: >
        全室に床暖房を設置しております。床面は常に温かい状態です。設定温度は20°Cで、温度変化には約2日かかります。
        コントロールパネルの操作はご遠慮ください。
      severity: info
    - description: >
        クイーンズタウンヒル・ウォーキングトラックに隣接しています。トラックへは裏庭からアクセスできます。
        お子様から目を離さないようにご注意ください。トラックは急勾配となっております。
      severity: minor
  house_rules:
    - category: amenity-rules
      heading: アメニティご利用のルール（上階）
      bullets:
        - "**床暖房は20°Cに設定されており**、**温度調節はできません** — システムの温度変化には約2日かかります。"
        - "**屋外用クッション**：夜間は室内にお持ちください。"
        - "**ダイニングテーブル**：プレースマットとコースターをご使用ください。テーブルに直接熱いものを置かないようお願いいたします。"
        - "**食洗機用洗剤**：**備え付けの食洗機用粉末洗剤**のみをご使用ください — 液体洗剤を使用すると故障の原因となり、修理費用が発生いたします。"
        - "**ガス暖炉**：ヒーター左上のスイッチパネルで電源をお切りください。本体のメインアイソレーターは**設計上、暖炉ユニットの裏側**にあります — パネルのスイッチをご使用ください。"
    - category: parking
      heading: 駐車場
      bullets:
        - 敷地内の車道に駐車スペースがございます。
        - Kent Streetの路上駐車もご利用いただけます。
  access:
    front_door: '未定：物件ごとのアクセス案内は、サービス開始前（2026-07-01）に追加いたします。'
    back_door: ''
    garage: ''
    other: ''
  notes:
    - "**消火器**は**キッチン脇のパントリー**内、窓の近くの右手奥にございます。"
    - "**ヒューズボックス／配電盤**は**1階、バスルーム向かいのコートルーム**内にございます。"
    - "**ガス暖炉のアイソレーター**は**暖炉ユニットの裏側**にあります（通常の壁スイッチでは操作できない設計となっております）。ヒーターパネル左上のオン/オフボタンをご使用ください。"
    - "**Wi-Fi中継器**は上階にあります — インターネットの速度が遅い場合は、Wi-Fiをオフにしてから再度オンにしてください。"
    - "**セルフクリーニングオーブン** — 洗剤は使用しないでください。セルフクリーニングの際は画面の指示に従って操作してください。"
    - "**クイーンズタウンヒル・ウォーキングトラック**へは裏庭からアクセスできます。"
    - "**紙のマニュアル**として、ドライヤー、洗濯機、テレビ、コーヒーメーカーの取扱説明書をご用意しております。PDFが必要な場合はホストまでお申し付けください。"

