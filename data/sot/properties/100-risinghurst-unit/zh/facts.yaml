  cleaning_fee: 100.0
  extra_person_fee: 50.0
  weekly_discount:
  monthly_discount:
  currency: NZD
exceptions:
  hazards: []

  house_rules:
    - category: parking
      heading: 停车
      bullets:
        - 仅提供一个路外停车位，位于车道内。
        - 请将车停在主屋右侧，空调机组旁边。
        - 请勿堵塞储物间出入通道。
    - category: capacity
      heading: 入住人数
      bullets:
        - 最多入住 2 位宾客，严格执行。
        - 沙发不适合用于睡眠。

  access:
    front_door: >
      密码锁箱位于公寓与储物间之间的室外水槽旁。密码为 1001（也将在抵达前 3 天通过订房平台发送给您）。
    back_door: ''
    garage: ''
    other: >
      主屋处还有第二个密码锁箱，请务必确认您使用的是公寓专用的那个。从街道找到 #100 信箱后，沿车道进入即可。

  notes:
    - 房东（Paddy 和 Bethan）住在隔壁主屋，如有任何需要，可通过订房平台与他们联系。
    - 房源提供两辆自行车及头盔，供您免费使用。
    - 如您深夜抵达，请提前告知房东您的预计到达时间，他们可为您开启室外灯光并提前开启暖气。
