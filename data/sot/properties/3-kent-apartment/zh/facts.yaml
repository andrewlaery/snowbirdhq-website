# yaml-language-server: $schema=../_schemas/facts.json
schema_version: 1
slug: 3-kent-apartment

# 3-Kent-Apartment = downstairs apartment (2.5 bedrooms — converted double garage / engineer's
# workshop). Insurance + Resource Consent capped at 4 guests. The "0.5" is a windowless nook with
# extra bed for kids — no door. Floor-to-ceiling windows; backs onto Queenstown Hill walking track.
capacity:
  max_guests: 4
  max_adults: 4
  min_age_lead_guest: 25

bedrooms:
  - name: '卧室一'
    bed: queen
    ensuite: false
    notes: '床型配置待下次核查后确认。'
  - name: '卧室二'
    bed: queen
    ensuite: false
  - name: '额外床位小角落（即"0.5间"）'
    bed: single
    ensuite: false
    notes: >
      无窗小角落，配有单人床，仅适合儿童使用——无门。在"2.5间卧室"的描述中计为0.5间；并非完全封闭的独立睡眠空间。
bedroom_count: 2.5
bed_count: 3  # Conservative — actual layout TBC
bathroom_count: TBC
beds_summary: '待确认——房东核查尚未完成（当前Goodstays房源显示：大床 + 大床 + 单人床）'

amenities:
  - Wi-Fi
  - 免费停车
  - 地暖
  - 大金冷暖空调（可制热及制冷）
  - Blanco电磁炉灶
  - Blanco烤箱
  - 博世洗碗机
  - Electrolux EDC2075GDW洗衣机
  - Electrolux烘干机
  - 三星电视
  - 落地窗
  - 山景
  - 皇后镇山步道直达（经花园）

features:
  - underfloor_heating
  - heat_pump
  - garden
  - walking_track_access
  - mountain_views
  - large_windows  # Floor-to-ceiling

parking:
  spaces: 1
  type: 'driveway'
  garage: false
  garage_remote: false

check_in:
  start_time: '15:00'
  end_time: '22:00'
  method: '待确认'
  instructions: '待确认：各房源入住说明将于上线前补充完整（2026-07-01）'

check_out:
  time: '10:00'

wifi:
  network: 'Monkeymousewifi'
  password: 'bendalong'

house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 250
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false

booking_terms:
  min_nights: 2
  max_nights: 365
  cancellation_policy: moderate
  instant_bookable: true

pricing:
  base_nightly: 0  # TBC
  cleaning_fee: 0
  extra_person_fee: 0
  weekly_discount: null
  monthly_discount: null
  currency: NZD

exceptions:
  hazards:
    - description: >
        这是一栋两层住宅——入住期间楼上公寓可能有其他住客。楼层之间隔音有限（混凝土地板虽有一定厚度，但并非完全隔音），请相互体谅。
      severity: minor
    - description: >
        全屋铺设地暖，地面会保持温热。温度设定为20°C，升温或降温约需2天时间，请勿自行调节温控装置。
      severity: info
    - description: >
        房屋背面紧邻皇后镇山步道，可经后花园直接进入。请注意看管儿童，步道坡度较陡。
      severity: minor
    - description: >
        额外床位小角落（即"0.5间"）无窗且无门，仅适合年龄较大的儿童使用，具体由家长自行判断。该空间并非完全封闭的独立睡眠房间。
      severity: info
  house_rules:
    - category: amenity-rules
      heading: 设施使用规则（楼下公寓）
      bullets:
        - "**地暖温度设定为20°C**，**不可自行调节**——温度变化约需2天时间。"
        - "**户外坐垫**：请于每晚收回室内。"
        - "**洗碗机用洗涤剂**：请仅使用房内**提供的洗碗粉**——使用液体洗涤剂会导致故障，届时维修费用将由您承担。"
        - "**烘干机为无排气管式**：使用时请打开洗衣房窗户以排出水蒸气。"
    - category: parking
      heading: 停车
      bullets:
        - 房屋前院车道提供停车位（若楼上与楼下同时出租，车位共用）。
        - Kent Street路边亦有路边停车位可供使用。

    - category: outdoor-noise
      heading: 户外区域——噪音规定
      bullets:
        - "**晚上10点至早上7点，请勿在户外区域逗留**（本房源位于住宅区）。"
        - "**晚上8点至早上8点，禁止在户外使用扩音设备或播放音乐。**"
        - "**违规将按照条款与条件收取$1000罚款**——此规定在Goodstays指南中已执行，并将在SnowbirdHQ平台继续适用。"
        - 请随时保持低噪音，尤其是在上述宵禁时段内。

    - category: rubbish-detail
      heading: 垃圾与回收——房源具体规定
      bullets:
        - "每周垃圾配额：**2个75升黑色垃圾袋**，由保洁人员在退房时统一收走。"
        - 公共垃圾桶在住客入住期间锁闭保管。
        - 厨房垃圾桶请使用白色内袋——装满后将白色袋放入黑色垃圾袋中。
        - 黑色开口回收箱用于可回收物——投放前请**冲洗干净**。
        - 小件可回收物可放在厨房台面或垃圾袋旁。
        - "**超出配额的垃圾**：请自行送往**皇后镇垃圾转运站，地址：110 Glenda Drive, Frankton**（每天8am–5pm，全周开放；圣诞节、耶稣受难日及澳新军团日休息）——**或**按每个额外75升袋$20+GST的收费由保洁代为处理。"
  access:
    front_door: '待确认：各房源进入说明将于上线前补充完整（2026-07-01）。'
    back_door: ''
    garage: ''
    other: ''
  notes:
    - "**灭火器**位于**厨房水槽下方柜内**。"
    - "**急救箱**位于**厨房水槽下方柜内**。"
    - "**烟雾报警器**已安装于全屋各处——请勿拆除。"
    - "**电箱**位于楼上公寓（一楼浴室对面的衣帽间内）——如遇断电，请联系房东。"
    - "**Wi-Fi扩展器**位于楼上——如信号较弱，请将Wi-Fi关闭后重新开启，设备将自动连接最强信号源。"
    - "**微波炉说明书**放在**电视柜顶层抽屉**内。"
    - "**烤箱功能符号说明书**放在**电视柜顶层抽屉**内。"
    - "**从皇后镇机场出发**：全程约6.8公里，车程约10分钟——沿Sir Henry Wigley Dr → Lucas Pl → 环形交叉口取第二出口上SH6 → 至Z加油站附近环形交叉口取第一出口上SH6A/Frankton Rd → 在Dublin St右转 → 第一个左转进入Hallenstein St → 第一个右转进入York St → 第一个左转进入Kent St → 右侧第二条车道即到。"
    - "**停车**：仅限一辆标准车型；请停在共用车道靠右侧、最靠近一楼入口处——请勿堵塞车道出入口。"

