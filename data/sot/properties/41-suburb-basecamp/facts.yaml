# 'Property Highlights' lake/mountain claim); bedrooms 2+3 are queens
# with lake and mountain views.
bedrooms:
  - name: Bedroom 1 (Master)
    bed: king
    ensuite: true
    notes: Garden views.
  - name: Bedroom 2
    bed: queen
    ensuite: false
    notes: Lake and mountain views.
  - name: Bedroom 3
    bed: queen
    ensuite: false
    notes: Lake and mountain views.
