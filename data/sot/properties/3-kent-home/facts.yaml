  - name: 'Upstairs — Bedroom 1 (Master)'
    bed: TBC
    ensuite: false  # TBC
    notes: 'Upstairs apartment. Bed configuration TBC at next audit.'
  - name: 'Upstairs — Bedroom 2'
    bed: TBC
    ensuite: false
    notes: 'Upstairs apartment.'
  - name: 'Upstairs — Bedroom 3'
    bed: TBC
    ensuite: false
    notes: 'Upstairs apartment.'
  - name: 'Upstairs — Bedroom 4'
    bed: TBC
    ensuite: false
