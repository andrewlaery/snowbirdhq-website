  start_time: '15:00'
  end_time: '23:00'
  method: keyless_open
  instructions: >
    The front door will be unlocked when you arrive. A key is left on the
    kitchen bench — please use it to lock the home whenever you go out and
    again at checkout, and leave the key on the kitchen bench when you
    leave.
