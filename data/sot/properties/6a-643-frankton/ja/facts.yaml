exceptions:
  hazards:
    - description: 屋外階段 — 駐車場からアパートまで2階分の階段があります。お荷物をお持ちの際はご注意ください。また、濡れている場合や凍結している場合は特に足元にお気をつけください。
      severity: minor
    - description: バルコニー — 上階のバルコニーから複合施設の下方への落差があります。通常の安全にご注意ください。
      severity: minor
    - description: 隣接する建設現場（2026年末頃に完了予定） — ゴミ箱へ向かう通路が不均一になっていたり、通行が妨げられる場合があります。また、平日の午前7時45分頃から午後6時頃にかけて、重機やパイリングリグによる大きな昼間の騒音が発生します。耳栓は町内のLife Pharmacy Wilkinsonsにてご購入いただけます。
      severity: minor
    - description: 道路交通騒音 — アパートはフランクトン・ロードに面しており、ベッドルームまで交通騒音が聞こえることがあります（二重窓で軽減されますが、完全には遮断されません）。睡眠が浅い方は耳栓をお持ちになることをお勧めします。
      severity: info
    - description: フライトパス — 物件はクイーンズタウン空港のフライトパス直下に位置しており、日中に航空機の騒音が聞こえることがあります。
      severity: info
  house_rules:
    - category: parking
      heading: 駐車場
      bullets:
        - "**専用駐車スペース6A**がこのアパート専用として確保されています — 階段の手前、無料でご利用いただけます。"
        - ご到着時に6Aに他の車が駐車していた場合は、お知らせください。それまでの間は空いているスペースを一時的にご利用ください。
        - "**タウンセンターの駐車場**: 湖畔の無料駐車場（台数に限りがあります）、Camp StreetおよびMan Streetの有料駐車場、Man Streetの一部無料スペース（青い標識で時間制限をご確認ください）。"
        - "**臨時・日帰り駐車場**: Goldfield Heightsには時間制限のない路上駐車スペースがあります。"
    - category: body-corporate
      heading: 管理組合規則
      bullets:
        - "**バルコニーへの洗濯物の干し禁止** — 管理組合の規則です。室内の乾燥ラック、または敷地内の別棟にある共用乾燥機をご利用ください。"
        - "**バルコニーでの喫煙・電子タバコの使用禁止** — 管理組合の規則です（室内全面禁煙のルールに加えて適用されます）。"
    - category: rubbish-recycling
      heading: ゴミ・リサイクル
      bullets:
        - ゴミ箱はアパート敷地内にあります — 正確な場所はキッチンテーブルの上の黒いブックレットをご参照ください。
        - 緑色のゴミ袋をご用意しています。
        - "**このアパート複合施設にはリサイクル施設がなくなりました** — 一般ゴミのみとなります。"
    - category: parcel-delivery
      heading: 荷物の配送
      bullets:
        - "滞在中に荷物を受け取る必要がある場合は、代わりにこちらの住所をご利用ください：**Mountain Club, 85 Beach Street, Queenstown 9300**（宛名：**SnowbirdHQ**）。"
        - これにより、宅配業者が開放された敷地内に荷物を放置することを防ぐことができます。
  access:
    front_door: >
      ステップ1 — 駐車場から：専用駐車スペース6Aを見つけ、右側の階段を上り、さらに2つ目の階段を上がってバルコニーへ進んでください。

      ステップ2 — お部屋を確認：バルコニーに出て最初の右側のドアが6Aです。

      ステップ3 — 鍵の取り出し：フロントドアの右側にロックボックスが設置されています。到着2日前にお送りするアクセスコードを入力し（数字が正しく揃っているか確認してください）、スロットを下に引いて鍵を取り出してください。同じ鍵でフロントドアとバルコニードアの両方を開けることができます。
    back_door: ''
    garage: ''
    other: ''
  notes:
    - 滞在中、アパートのアラームは作動しておりません。
    - 煙感知器と消火器が設置されています。
    - 緊急時はフロントドアから退出し、2階分の階段を降りてください。集合場所は建物から安全な距離をとった駐車場です。
    - キッチンテーブルの上の黒いブックレットに、Wi-Fi情報、家電の使用説明、およびゴミ箱の場所が記載されています。
    - "**キッチンテーブルのウェルカムギフト：** Boat Shed Cafeの無料コーヒーバウチャーとCanyonビールのバウチャーをご用意しております — ぜひお楽しみください。"
    - "**建設工事に関するお知らせ：** 隣接するアパートブロックで建設工事が進行中です（2026年末頃完了予定）。平日の午前7時45分から午後6時にかけて大きな昼間の騒音が発生します。また、建設現場はバルコニーから見え、湖の眺望の一部が遮られます。"
  usage_sections:
  - category: internet
    heading: インターネット／Wi-Fi
    body: >
      ネットワーク名とパスワードは上記のクイックリファレンスに記載されています。モデムはテレビの右側、グレーのコーナーチェアの下にあります。接続に問題が生じた場合は電源を入れ直してください。Wi-Fi情報はキッチンテーブルの上の黒いブックレットにも記載されています。

  - category: heating
    heading: 暖房
    body: |
      - **ヒートポンプ**（ラウンジ）：リモコン操作 — 暖房と冷房にご利用ください。寒い季節はドアと窓を閉めた状態でご使用ください。
      - **パネルヒーター**はベッドルームのクローゼット内にあります — ベッドルームの補助暖房としてご利用ください。
      - ベッドルームではフランクトン・ロードに面しているため、道路交通騒音が聞こえることがあります。二重窓で軽減されますが完全には遮断されません — 睡眠が浅い方は耳栓やホワイトノイズアプリのご使用をお勧めします。

  - category: location
    heading: 周辺のご案内
    body: |
      - 道路を挟んで真向かいにバス停があります（Connectabus — クイーンズタウンタウンセンターまで約10分）。
      - クイーンズタウン空港まで車で約10分。
      - 近隣のカフェやCargo Breweryへは湖畔沿いに徒歩約15分。
      - クイーンズタウンタウンセンターへは道路沿いの歩道を徒歩で約45〜60分。現在、湖畔の遊歩道は通行止めです。
      - タウンセンターまでUberで約15〜20ドル。

  - category: appliances
    heading: 家電・設備のご案内
    body: |
      - **洗濯機**（トップローダー、バスルーム内）：室内に乾燥機はありません — 乾燥ラックをご利用ください。敷地内の別棟にコイン式の共用乾燥機もご利用いただけます。
      - **ガスコンロ**：通常の操作でご使用ください。
      - **電気オーブン**：キッチン右側の壁にあるメインスイッチをオンにしないとオーブンが加熱されません。グリル設定のラベルが剥がれていますのでご注意ください。
      - **ヒートポンプ**：リモコン操作（暖房・冷房）。ラウンジでご使用ください。
      - **パネルヒーター**：ベッドルームのクローゼット内 — ベッドルームの補助暖房です。
      - **アイロンとアイロン台**：バスルーム内にあります。
      - **テレビ**：HDMI 1にFreeviewスティックが接続されています。リモコンは2本あります — 大きい方のリモコンで電源・入力切替（Sourceボタンを押してHDMI 1を選択）、小さい方のリモコンでFreeviewとNetflixの操作を行います。
      - **掃除機**：ガラス製スライドバルコニードアの横にあります。
