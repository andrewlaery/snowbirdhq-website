features: []
parking:
  spaces: 4
  type: driveway
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    通过前门智能锁自助入住。您的专属门锁密码将在抵达前 24 小时通过预订平台发送。
    若入住时密码无法使用，请联系房东——密码有时需要远程重新激活。
check_out:
  time: '10:00'
wifi:
  network: SnowbirdQT
  password: Namaste99
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'CCTV outside property' per ota-manager booking_specific
  noise_monitor: true  # Minut noise monitor per owner.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: false
pricing:
  base_nightly: 1000.0
  cleaning_fee: 500.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        车道存在视线盲区，车辆进出时请格外小心，如有儿童在场，请安排另一名成人负责看护。
      severity: minor
    - description: >
        花园多处存在未设围栏的较大落差区域。请勿让儿童独自活动；抵达后请先熟悉周边环境。
      severity: minor
    - description: >
        楼梯间——请避免年幼儿童在楼梯上玩耍，以防跌落受伤。
      severity: minor
    - description: >
        降雪后，车道及户外台阶因反复冻融极易结冰，请谨慎使用车道；如路况需要，请为车辆安装防滑链。
      severity: minor
    - description: >
        浴缸／水疗浴缸——蓄水时请勿让年幼儿童无人看管。使用后请立即放水。
      severity: minor
    - description: >
        露台烧烤架——存在油脂起火风险。请保持清洁，使用期间全程监看，并确保使用后完全熄灭。
      severity: minor
    - description: >
        燃木炉——对无人看管的儿童存在烫伤风险。请遵照手册中的操作说明使用。
      severity: minor
    - description: >
        窗户／推拉门——请勿将年幼儿童单独留在可轻易接触到窗户或推拉门的房间内。
      severity: minor

  house_rules:
    - category: parking
      heading: 停车
      bullets:
        - 仅限在车道上使用场外停车位——请停放在指定位置。
        - 车道及车库合计可停放最多 4 辆车。
    - category: spa-pool
      heading: 水疗泳池／温泉浴缸
      bullets:
        - 使用水疗设施，风险自负。
        - "**成人须全程看护儿童**，无论其在水疗池内还是池边。"
        - "**不使用时请锁好水疗池盖**——水疗钥匙的位置及池盖操作方法，请参阅《使用说明》中的 [水疗泳池／温泉浴缸](/docs/properties/25-dublin/user-instructions#appliances-wellness) 部分。"
        - 入池前请先淋浴，以保持水质清洁。
        - "**仅限使用氯消毒剂**——禁止加入泡泡浴剂、发泡剂、浴盐或其他任何物质。"
        - "**禁止在水疗池内或周围携带食物、饮料或玻璃器皿。**"
        - 饮酒后请勿使用水疗设施。

    - category: keys-remotes
      heading: 钥匙与遥控器
      bullets:
        - "**前门入户**：智能锁密码将在抵达前 24 小时通过预订平台发送——完整入住步骤请参阅《[使用说明](/docs/properties/25-dublin/user-instructions)》。"
        - "**车库遥控器**（提供 1 个）：退房时请带回室内放好。"
        - "**水疗池塑料钥匙**：与车库遥控器存放在一起。"
        - 退房时，请将所有门禁钥匙及车库遥控器放在厨房操作台上。
        - 如有钥匙或车库遥控器遗失，将收取相应费用。

    - category: wood-burner
      heading: 工作室燃木炉
      bullets:
        - "**请勿在无人看管的情况下使用燃木炉**——炉火燃烧期间，工作室内必须始终有成人在场。"
        - "**炉火燃烧期间，成人须全程看护儿童**；炉门、玻璃及周围区域温度极高。"
        - 仅限使用房内提供的柴火和引火物——禁止燃烧垃圾、经过处理的木材或助燃剂。
        - "**切勿将灰烬倒入垃圾桶或任何有风的地方**——余烬可能复燃引发火灾。"
        - 操作说明（点火、炉门操作、灰烬冷却）请参阅《[使用说明 → 工作室燃木炉](/docs/properties/25-dublin/user-instructions#appliances-heating)》。

    - category: gas-fire
      heading: 楼上燃气壁炉
      bullets:
        - 仅限在室内有人时使用，不建议作为主要供暖热源。
        - "**燃气壁炉开启时，成人须全程看护儿童**；玻璃炉门温度极高。"
        - 请勿将布料、纸张或其他易燃物品放置在壁炉正面 1 米范围以内。
        - 操作说明（点火、定时、关闭）请参阅《[使用说明 → 燃气壁炉](/docs/properties/25-dublin/user-instructions#appliances-heating)》。

    - category: bbq
      heading: 户外烧烤架
      bullets:
        - "**仅限在室外开放花园区域使用**——禁止在遮蔽处或车库内使用。"
        - 烧烤架点火期间，成人须全程看护儿童。
        - "**烧烤架点火后请勿离开**，须全程在场监看。"
        - 操作说明（点火、盖子顺序、清洁、关闭）请参阅《[使用说明 → Weber Q3200 烧烤架](/docs/properties/25-dublin/user-instructions#appliances-outdoor)》。

    - category: insinkerator
      heading: Insinkerator（厨余垃圾处理器）
      bullets:
        - "**请勿将手伸入处理器内**，即便已关闭电源也不例外。"
        - "**以下物品绝对禁止放入**：骨头、果核、油脂、蛋壳、咖啡渣、纤维类蔬菜（芹菜、玉米皮等）及任何非食物类物品——这些会导致设备卡死或损坏，可能产生维修费用。"
        - 操作说明（冷水使用、开关位置、卡机处理）请参阅《[使用说明 → Insinkerator](/docs/properties/25-dublin/user-instructions#appliances-kitchen)》。

  access:
    front_door: >
      通过智能锁自助入住。您的专属门锁密码将在抵达前 24 小时通过预订平台发送。
    garage: 提供 1 个车库遥控器。退房时请带回室内放好。
    back_door: ''
    other: >
      水疗池盖塑料钥匙与车库遥控器存放在一起。

  notes:
    - 房屋警报系统在您入住期间不启用。
    - 急救箱放置在厨房储藏柜内（左侧上层搁板）。
    - 灭火器放置在厨房水槽下方。
    - 燃气截止阀位于入口楼梯间右侧，靠车库一侧。
    - 紧急情况下，请从前门撤离。集合点位于车库外的车道处。
