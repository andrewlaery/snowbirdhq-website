exceptions:
  hazards:
    - description: >
        Internal stairs to the upper bedroom level — please supervise children
        carefully.
      severity: info
    - description: >
        Outdoor spa: an unsupervised spa is a drowning risk for young children.
        Keep the spa cover on when not in use and supervise children closely.
      severity: major
    - description: >
        Outdoor fire pit: keep children away when lit. Do not leave the fire
        unattended. Ensure it is fully extinguished before going inside.
      severity: major
