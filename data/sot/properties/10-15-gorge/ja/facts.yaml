appliances:
  # Kitchen
  - gorge-electric-hob                   # electric hob
  - gorge-oven                           # Parmco electric oven (timer-must-be-on)
  - gorge-dishwasher                     # Haier dishwasher
  # Heating
  - gorge-heat-pump                      # living area heat pump
  - gorge-underfloor-heating             # bathroom underfloor
  - gorge-towel-rail                     # heated towel rail
  # Laundry
  - gorge-top-loader-washer              # in-bathroom washer
  - gorge-shared-dryer                   # complex shared dryer ($4 coin)
features:
  - balcony
  - central_location
  - laundry
parking:
  spaces: 1
  type: shared_complex
  garage: false
  garage_remote: false
  notes: ウィスラーアパートメンツ共用駐車場内に1台分のスペースをご利用いただけます（個別割り当てではございません）。
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: lockbox
  instructions: >
    セルフチェックインはロックボックスをご利用ください。アクセスコードは、ご到着の24時間前に予約プラットフォームを通じてお客様へお送りいたします。
check_out:
  time: '10:00'
wifi:
  network: SnowbirdU10
  password: Snowbird1010
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: 07:00
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: false
    locations: []
  noise_monitor: false
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: true
pricing:
  base_nightly: 180.0
  cleaning_fee: 150.0
  extra_person_fee: 100.0
  weekly_discount: 0.95
  monthly_discount:
  currency: NZD
exceptions:
  hazards: []

  house_rules:
    - category: parking
      heading: 駐車場について
      bullets:
        - 路上駐車のみとなります。専用駐車スペースはございません。

  access:
    front_door: >
      セルフチェックインはロックボックスをご利用ください。アクセスコードは、ご到着の24時間前に予約プラットフォームを通じてお客様へお送りいたします。
    back_door: ''
    garage: ''
    other: ''

  notes:
    - コンパクトなワンベッドルームのお部屋です。カップルまたはお一人様でのご滞在に最適です。
