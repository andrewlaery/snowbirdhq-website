  max_nights: 365
  cancellation_policy: moderate
  instant_bookable: true

pricing:
  base_nightly: 0  # TBC — pricing strategy still being negotiated with owners
  cleaning_fee: 0  # TBC
  extra_person_fee: 0
  weekly_discount: null
  monthly_discount: null
  currency: NZD

exceptions:
  hazards:
    - description: >
        Two-level home with internal stairs between upstairs and downstairs apartments. Sound
        carries between levels (concrete floors thick but boots audible). Take care on stairs;
        supervise children.
      severity: minor
    - description: >
        Underfloor heating throughout — surfaces stay warm. Set at 20°C and slow to change
        (~2 days to heat up or cool down); please don't adjust the controls.
      severity: info
    - description: >
        Backs onto the Queenstown Hill walking track. Track access via the back garden — keep
        children supervised; the track itself is steep.
      severity: minor
  house_rules:
    - category: amenity-rules
      heading: Amenity Rules (Whole House)
      bullets:
        - "**Underfloor heating is set at 20°C** in each room and is **not adjustable** during your stay — the system takes ~2 days to heat up or cool down."
        - "**Lockable owner cupboards** in some areas are off-limits — please respect these (clearly marked or locked)."
        - "**Outdoor cushions**: please bring inside at night so they're not damp for the next day or for the next guests."
        - "**Dining table**: please use the placemats and coasters provided — no hot items directly on the table."
        - "**Dishwasher detergent**: use only the **dishwasher powder provided**. Liquid will cause a fault — repair fees apply."
    - category: parking
      heading: Parking
      bullets:
        - On-site parking on the driveway.
        - Street parking available on Kent Street.

    - category: outdoor-noise
      heading: Outdoor Areas — Noise
      bullets:
        - "**Outdoor areas must be vacated 10pm–7am** (this is a residential neighbourhood)."
        - "**No amplified sound or music outdoors 8pm–8am.**"
        - "**Breach incurs a $1000 charge** per Terms & Conditions — this is enforced by Goodstays' guidebook today and continues under SnowbirdHQ."
        - Keep noise low at all times, especially during the curfew window above.

    - category: rubbish-detail
      heading: Rubbish & Recycling — Property Specifics
      bullets:
        - "Allocation: **2 × 75L black rubbish bags per week**, collected by housekeeping on departure."
        - Council bins are kept locked between guests.
        - White liners for the kitchen bin — place full white bags into the black rubbish bags.
        - Black open tub for recycling — please **rinse items** before placing.
        - Small recycling can sit on the kitchen bench or beside the rubbish bags.
        - "**Excess rubbish:** take to the **Queenstown Transfer Station, 110 Glenda Drive, Frankton** (8am–5pm, 7 days; closed Christmas Day, Good Friday, Anzac Day) — **OR** $20+GST per extra 75L bag for housekeeping collection."
  access:
    front_door: 'TBC: per-property access instructions to be added before go-live (2026-07-01).'
    back_door: ''
    garage: ''
    other: ''
  notes:
    - "**Fire extinguishers**: upstairs is in the **pantry off the kitchen** (right-hand corner near the window); downstairs is **under the kitchen sink**."
    - "**First aid kit (downstairs)** is **under the kitchen sink**."
    - "**Smoke detectors** are installed throughout — please don't disconnect."
    - "**Fuse box / circuit board** is in the **coat room opposite the bathroom on Level 1** (upstairs)."
    - "**Gas fireplace isolator** is **behind the fire unit** (not switchable from a normal wall switch — by design); use the on/off button on the heater's switch panel (top-left of the heater)."
    - "**Wi-Fi extender** is upstairs — turn Wi-Fi off then on if you're not getting fast internet, your device will pick the strongest signal."
    - "**Self-cleaning oven** (upstairs) — no chemicals; follow the on-screen instructions to self-clean."
    - "**Queenstown Hill walking track** is accessible via the back garden — recommended for keen walkers."
    - "**From Queenstown Airport**: 6.8 km / ~10 min — Sir Henry Wigley Dr → Lucas Pl → roundabout 2nd exit onto SH6 → roundabout near Z service station 1st exit onto SH6A/Frankton Rd → right at Dublin St → first left onto Hallenstein St → first right onto York St → first left onto Kent St → 2nd driveway on right."
    - "**Microwave manual** (downstairs) and **oven manual** are in the **top drawer of the TV cabinet (downstairs)**."

