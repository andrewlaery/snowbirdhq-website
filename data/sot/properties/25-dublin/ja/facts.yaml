features: []
parking:
  spaces: 4
  type: driveway
  garage: true
  garage_remote: true
check_in:
  start_time: '15:00'
  end_time: '23:00'
  method: smart_lock
  instructions: >
    フロントドアのスマートロックにてセルフチェックインが可能です。固有のアクセスコードは、
    ご到着の24時間前に予約プラットフォームよりお送りします。チェックイン時にコードが
    機能しない場合は、ホストまでご連絡ください。コードのリモート再有効化が必要な場合がございます。
check_out:
  time: '10:00'
wifi:
  network: SnowbirdQT
  password: Namaste99
house_rules:
  no_smoking: true
  no_parties: true
  pets_allowed: false
  noise_curfew_start: '22:00'
  noise_curfew_end: '07:00'
  fees:
    smoking_violation: 200
    noise_violation: 100
  cctv:
    has_cameras: true
    locations:
      - exterior  # 'CCTV outside property' per ota-manager booking_specific
  noise_monitor: true  # Minut noise monitor per owner.md
booking_terms:
  min_nights: 3
  max_nights: 365
  cancellation_policy: firm
  instant_bookable: false
pricing:
  base_nightly: 1000.0
  cleaning_fee: 500.0
  extra_person_fee: 0.0
  weekly_discount: null
  monthly_discount: null
  currency: NZD
exceptions:
  hazards:
    - description: >
        車両の切り返し時に死角が生じる箇所があります。十分にご注意いただき、
        お子様がいる場合は別の方が周囲を確認するようにしてください。
      severity: minor
    - description: >
        庭の各所に柵のない段差・落下箇所があります。お子様をひとりにしないでください。
        ご到着の際は周辺の状況をご確認ください。
      severity: minor
    - description: >
        階段付近では、幼いお子様が遊ばないようにご注意ください。転落によるけがの恐れがあります。
      severity: minor
    - description: >
        降雪後の凍結・融解により、ドライブウェイと屋外の階段が非常に滑りやすくなります。
        ドライブウェイは慎重にご利用ください。道路状況によっては、スノーチェーンを装着してください。
      severity: minor
    - description: >
        バスタブ・スパバスに水を溜めている間は、幼いお子様をひとりにしないでください。
        ご使用後はすぐに排水してください。
      severity: minor
    - description: >
        デッキのバーベキューグリルは、油脂への引火にご注意ください。こまめに清掃し、使用中は目を離さず、
        使用後は完全に消火したことを確認してください。
      severity: minor
    - description: >
        薪ストーブは、監督のないお子様に火傷の危険があります。
        コンペンディウムに記載の操作手順に従ってください。
      severity: minor
    - description: >
        窓・スライディングドア付近では、幼いお子様をひとりにしないでください。
      severity: minor

  house_rules:
    - category: parking
      heading: 駐車場
      bullets:
        - 駐車はドライブウェイの所定のスペースのみご利用ください。路上駐車はご遠慮ください。
        - ドライブウェイとガレージを合わせて最大4台駐車可能です。
    - category: spa-pool
      heading: スパプール／ホットタブ
      bullets:
        - スパのご利用はお客様ご自身の責任でお願いいたします。
        - "**スパ内外でお子様のそばを離れないようにしてください（大人による常時監督が必要です）。**"
        - "**不使用時はスパカバーを必ずロックしてください。** スパキーの保管場所および蓋の操作方法は、ユーザーインストラクションの[スパプール／ホットタブ](/docs/properties/25-dublin/user-instructions#appliances-wellness)をご参照ください。"
        - 入水前にシャワーを浴び、水質を清潔に保ってください。
        - "**塩素系薬剤のみ使用可** — 泡立て剤、入浴剤、バスソルト、その他の物質の使用はお断りします。"
        - "**スパ内外への飲食物・ガラス製品の持ち込みはご遠慮ください。**"
        - アルコールを摂取した状態でのスパのご利用はお控えください。

    - category: keys-remotes
      heading: 鍵・リモコン
      bullets:
        - "**フロントドアの入室**：スマートロックのコードはご到着の24時間前に予約プラットフォームよりお送りします。入室手順の詳細は[ユーザーインストラクション](/docs/properties/25-dublin/user-instructions)をご参照ください。"
        - "**ガレージリモコン**（1個提供）：チェックアウト時に室内へお持ちください。"
        - "**スパプール用プラスチックキー**：ガレージリモコンと一緒に保管しています。"
        - チェックアウトの際は、すべてのアクセスキーとガレージリモコンをキッチンカウンターの上に置いてください。
        - 鍵またはガレージリモコンを紛失された場合は、実費をご請求させていただきます。

    - category: wood-burner
      heading: スタジオの薪ストーブ
      bullets:
        - "**薪ストーブを絶対にその場に放置しないでください。** 火がついている間は、大人が常にスタジオに在室してください。"
        - "**お子様のそばを離れないようにしてください（大人による常時監督が必要です）。** 火がついている間は、扉・ガラス・周囲が非常に高温になります。"
        - 備え付けの薪と着火材のみご使用ください。ゴミ、防腐処理木材、着火促進剤の使用は禁止です。
        - "**灰をゴミ箱や風にさらされる場所へ捨てないでください。** 残り火が再燃し、火災の原因となる可能性があります。"
        - 操作手順（着火・ドア操作・灰の冷却）は、[ユーザーインストラクション → スタジオ薪ストーブ](/docs/properties/25-dublin/user-instructions#appliances-heating)をご参照ください。

    - category: gas-fire
      heading: 上階のガスファイヤー
      bullets:
        - ご在室中のみご使用ください。主要な暖房器具としての使用はお控えください。
        - "**お子様のそばを離れないようにしてください（大人による常時監督が必要です）。** ガスファイヤーの使用中、ガラス前面は非常に高温になります。"
        - 暖炉前面から1m以内に布類・紙類・その他可燃物を置かないでください。
        - 操作手順（点火・タイマー・消火）は、[ユーザーインストラクション → ガスファイヤー](/docs/properties/25-dublin/user-instructions#appliances-heating)をご参照ください。

    - category: bbq
      heading: 屋外バーベキュー
      bullets:
        - "**必ず屋外のオープンスペースでのみご使用ください。** 屋根付きスペースやガレージ内での使用は絶対にお控えください。"
        - バーベキュー使用中は、大人がお子様のそばを離れないようにしてください。
        - "**点火中はバーベキューから目を離さないでください。**"
        - 操作手順（点火・蓋の開閉順序・清掃・消火）は、[ユーザーインストラクション → Weber Q3200 BBQ](/docs/properties/25-dublin/user-instructions#appliances-outdoor)をご参照ください。

    - category: insinkerator
      heading: インシンクエレーター（生ごみ処理機）
      bullets:
        - "**電源を切っている場合でも、処理機の投入口に絶対に手を入れないでください。**"
        - "**以下のものは絶対に投入しないでください**：骨、果物の種、油脂類、卵の殻、コーヒーかす、繊維質の野菜（セロリ、とうもろこしの皮など）、食品以外のもの。詰まりや故障の原因となり、修理費用をご請求する場合があります。"
        - 操作手順（冷水の流し方・スイッチの位置・詰まり解消方法）は、[ユーザーインストラクション → インシンクエレーター](/docs/properties/25-dublin/user-instructions#appliances-kitchen)をご参照ください。

  access:
    front_door: >
      スマートロックによるセルフチェックインです。固有のアクセスコードは、
      ご到着の24時間前に予約プラットフォームよりお送りします。
    garage: ガレージリモコンを1個ご用意しています。チェックアウト時に室内へお持ちください。
    back_door: ''
    other: >
      スパプールカバー用のプラスチックキーは、ガレージリモコンと一緒に保管しています。

  notes:
    - 滞在中、ホームアラームは作動しておりません。
    - 救急セットはキッチンパントリー内（左側上段棚）にあります。
    - 消火器はキッチンシンク下に設置されています。
    - ガスの元栓は、入口階段横（ガレージ側）の右手にあります。
    - 緊急時はフロントドアから退避してください。集合場所はガレージ前のドライブウェイです。
